<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" role="img" aria-labelledby="t d">
  <title id="t">Four steps to watching pro pickleball tonight</title>
  <desc id="d">Four numbered step cards. Step one, pick a tour rather than a channel: individual pros, city teams, or the forty-and-over league. Step two, open that tour's own watch page, which lists what is live right now. Step three, go free first, because the stream that costs nothing is the one to start with. Step four, watch the feet: pick one player and follow only them for a whole game. A band across the bottom notes that none of the four steps costs anything.</desc>

  <rect width="1200" height="470" rx="42" fill="#0f5a46"/>

  <text x="600" y="60" fill="#ffffff" font-family="Arial, sans-serif" font-size="40" font-weight="800" text-anchor="middle">FOUR STEPS, TONIGHT</text>
  <text x="600" y="96" fill="#d7ff3f" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">FROM NEVER HAVING SEEN A PRO POINT TO WATCHING ONE PROPERLY</text>

  <g font-family="Arial, sans-serif">

    <!-- STEP 1 -->
    <rect x="50" y="132" width="250" height="232" rx="20" fill="#0d7a5c"/>
    <circle cx="86" cy="176" r="22" fill="#d7ff3f"/>
    <text x="86" y="184" fill="#0f5a46" font-size="22" font-weight="800" text-anchor="middle">1</text>
    <text x="72" y="234" fill="#d7ff3f" font-size="20" font-weight="800">PICK A TOUR</text>
    <text x="72" y="268" fill="#ffffff" font-size="17">Not a channel. Do you</text>
    <text x="72" y="292" fill="#ffffff" font-size="17">want individual pros,</text>
    <text x="72" y="316" fill="#ffffff" font-size="17">city teams, or the</text>
    <text x="72" y="340" fill="#ffffff" font-size="17">40-and-over league?</text>

    <!-- STEP 2 -->
    <rect x="333" y="132" width="250" height="232" rx="20" fill="#0d7a5c"/>
    <circle cx="369" cy="176" r="22" fill="#d7ff3f"/>
    <text x="369" y="184" fill="#0f5a46" font-size="22" font-weight="800" text-anchor="middle">2</text>
    <text x="355" y="234" fill="#d7ff3f" font-size="20" font-weight="800">OPEN ITS PAGE</text>
    <text x="355" y="268" fill="#ffffff" font-size="17">Every tour keeps a</text>
    <text x="355" y="292" fill="#ffffff" font-size="17">watch page. It lists</text>
    <text x="355" y="316" fill="#ffffff" font-size="17">what is live right</text>
    <text x="355" y="340" fill="#ffffff" font-size="17">now, and on what.</text>

    <!-- STEP 3 -->
    <rect x="617" y="132" width="250" height="232" rx="20" fill="#0d7a5c"/>
    <circle cx="653" cy="176" r="22" fill="#d7ff3f"/>
    <text x="653" y="184" fill="#0f5a46" font-size="22" font-weight="800" text-anchor="middle">3</text>
    <text x="639" y="234" fill="#d7ff3f" font-size="20" font-weight="800">GO FREE FIRST</text>
    <text x="639" y="268" fill="#ffffff" font-size="17">Start with the stream</text>
    <text x="639" y="292" fill="#ffffff" font-size="17">that costs nothing.</text>
    <text x="639" y="316" fill="#ffffff" font-size="17">You can decide about</text>
    <text x="639" y="340" fill="#ffffff" font-size="17">paying much later.</text>

    <!-- STEP 4 -->
    <rect x="900" y="132" width="250" height="232" rx="20" fill="#0d7a5c" stroke="#ff3f8e" stroke-width="3"/>
    <circle cx="936" cy="176" r="22" fill="#ff3f8e"/>
    <text x="936" y="184" fill="#ffffff" font-size="22" font-weight="800" text-anchor="middle">4</text>
    <text x="922" y="234" fill="#ff3f8e" font-size="20" font-weight="800">WATCH THE FEET</text>
    <text x="922" y="268" fill="#ffffff" font-size="17">Pick one player and</text>
    <text x="922" y="292" fill="#ffffff" font-size="17">follow only them for</text>
    <text x="922" y="316" fill="#ffffff" font-size="17">one whole game. Let</text>
    <text x="922" y="340" fill="#ffffff" font-size="17">the ball go.</text>

    <!-- BOTTOM BAND -->
    <rect x="50" y="386" width="1100" height="48" rx="18" fill="#0d7a5c"/>
    <text x="600" y="417" fill="#ffffff" font-size="21" font-weight="800" text-anchor="middle">Not one of these four steps costs a dollar.</text>
  </g>
</svg>
