<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" role="img" aria-labelledby="t d">
  <title id="t">The slinky drill, drawn on a pickleball court</title>
  <desc id="d">A top-down view of your half of a pickleball court, from your baseline at the bottom up to the net at the top, with the kitchen and the transition zone marked. Your partner feeds firm balls from across the net. You start at the baseline and climb the middle in four steps: a third shot drop from the baseline, a reset in the transition zone, another reset closer in, and a dink once you reach the kitchen line. Then you swap roles and stretch back out, for fifteen to twenty minutes.</desc>
  <rect width="1200" height="740" rx="42" fill="#0f5a46"/>

  <defs>
    <marker id="ahUp" markerWidth="14" markerHeight="14" refX="5" refY="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d7ff3f" transform="rotate(-90 5 5)"/>
    </marker>
  </defs>

  <text x="600" y="62" fill="#d7ff3f" font-family="Arial, sans-serif" font-size="40" font-weight="800" text-anchor="middle">THE SLINKY DRILL</text>
  <text x="600" y="100" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">The whole soft game in one drill: drop, reset, footwork, patience.</text>

  <g font-family="Arial, sans-serif">
    <!-- court (your half: net at top, baseline at bottom) -->
    <rect x="360" y="200" width="480" height="400" rx="6" fill="#0d7a5c" stroke="#ffffff" stroke-width="4"/>
    <!-- kitchen band -->
    <rect x="360" y="200" width="480" height="62" fill="#0a4a3a" stroke="#d7ff3f" stroke-width="2" stroke-dasharray="8 7"/>
    <!-- kitchen line -->
    <line x1="360" y1="262" x2="840" y2="262" stroke="#ffffff" stroke-width="3"/>
    <!-- net (top edge) -->
    <line x1="360" y1="200" x2="840" y2="200" stroke="#ffffff" stroke-width="6"/>
    <!-- center line -->
    <line x1="600" y1="262" x2="600" y2="600" stroke="#ffffff" stroke-width="2" opacity=".5"/>

    <!-- partner across the net -->
    <circle cx="600" cy="168" r="15" fill="#d7ff3f"/>
    <text x="626" y="174" fill="#d7ff3f" font-size="16" font-weight="800">PARTNER feeds firm balls</text>

    <!-- climb path -->
    <path d="M600,566 L600,300" fill="none" stroke="#d7ff3f" stroke-width="4" stroke-dasharray="3 9" stroke-linecap="round" marker-end="url(#ahUp)"/>

    <!-- your four positions -->
    <g>
      <circle cx="600" cy="566" r="17" fill="#ff3f8e"/>
      <text x="600" y="573" fill="#ffffff" font-size="18" font-weight="800" text-anchor="middle">1</text>
      <circle cx="600" cy="470" r="17" fill="#ff3f8e"/>
      <text x="600" y="477" fill="#ffffff" font-size="18" font-weight="800" text-anchor="middle">2</text>
      <circle cx="600" cy="374" r="17" fill="#ff3f8e"/>
      <text x="600" y="381" fill="#ffffff" font-size="18" font-weight="800" text-anchor="middle">3</text>
      <circle cx="600" cy="290" r="17" fill="#ff3f8e"/>
      <text x="600" y="297" fill="#ffffff" font-size="18" font-weight="800" text-anchor="middle">4</text>
    </g>

    <!-- step labels (right margin) -->
    <text x="872" y="572" fill="#ffffff" font-size="18" font-weight="800">DROP <tspan fill="#ffffff" font-weight="700" opacity=".8">from the baseline</tspan></text>
    <text x="872" y="476" fill="#ffffff" font-size="18" font-weight="800">RESET <tspan fill="#ffffff" font-weight="700" opacity=".8">climbing in</tspan></text>
    <text x="872" y="380" fill="#ffffff" font-size="18" font-weight="800">RESET <tspan fill="#ffffff" font-weight="700" opacity=".8">almost there</tspan></text>
    <text x="872" y="296" fill="#ffffff" font-size="18" font-weight="800">DINK <tspan fill="#ffffff" font-weight="700" opacity=".8">you made it</tspan></text>

    <!-- zone labels (left margin) -->
    <text x="120" y="237" fill="#d7ff3f" font-size="16" font-weight="800">KITCHEN</text>
    <text x="120" y="432" fill="#ffffff" font-size="16" font-weight="800">TRANSITION</text>
    <text x="120" y="454" fill="#ffffff" font-size="16" font-weight="800">ZONE</text>
    <text x="120" y="588" fill="#ffffff" font-size="16" font-weight="800">BASELINE</text>
  </g>

  <text x="600" y="702" fill="#d7ff3f" font-family="Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle">Walk in with drops and resets. Then swap and stretch back out. 15 to 20 minutes.</text>
</svg>
