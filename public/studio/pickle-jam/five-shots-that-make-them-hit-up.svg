<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-labelledby="t d">
  <title id="t">The five pickleball shots that force your opponents to hit the ball up</title>
  <desc id="d">Five numbered rows listing the shots that force opponents to lift the ball. One, the deep serve, hit when starting the point, pins them behind their own baseline. Two, the deep return, hit after they serve, keeps them out of the kitchen. Three, the third shot drop, hit when you are back and they are up, forces them to hit up and buys you the walk forward. Four, the dink, hit when everyone is at the net, gives them nothing to attack. Five, the reset, hit when the point has gone wrong, buys the net back. All five do the same job: put the ball below the height of the net tape.</desc>
  <rect width="1200" height="780" rx="42" fill="#0f5a46"/>

  <text x="600" y="62" fill="#ffffff" font-family="Arial, sans-serif" font-size="42" font-weight="800" text-anchor="middle">THE FIVE SHOTS THAT MAKE THEM HIT UP</text>
  <text x="600" y="100" fill="#d7ff3f" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">NONE OF THEM ARE HARD. ALL OF THEM DO THE SAME JOB.</text>

  <g font-family="Arial, sans-serif">

    <!-- 1 -->
    <g>
      <rect x="60" y="140" width="1080" height="90" rx="14" fill="#0d7a5c"/>
      <circle cx="102" cy="185" r="20" fill="#ff3f8e"/>
      <text x="102" y="192" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">1</text>
      <text x="142" y="178" fill="#d7ff3f" font-size="22" font-weight="800">DEEP SERVE</text>
      <text x="142" y="204" fill="#ffffff" font-size="14" font-weight="700" opacity=".85">When you are starting the point</text>
      <text x="600" y="192" fill="#ffffff" font-size="16" font-weight="700">Pins them behind their own baseline.</text>
    </g>

    <!-- 2 -->
    <g>
      <rect x="60" y="240" width="1080" height="90" rx="14" fill="#0d7a5c"/>
      <circle cx="102" cy="285" r="20" fill="#ff3f8e"/>
      <text x="102" y="292" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">2</text>
      <text x="142" y="278" fill="#d7ff3f" font-size="22" font-weight="800">DEEP RETURN</text>
      <text x="142" y="304" fill="#ffffff" font-size="14" font-weight="700" opacity=".85">When they have just served</text>
      <text x="600" y="292" fill="#ffffff" font-size="16" font-weight="700">Keeps them out of the kitchen.</text>
    </g>

    <!-- 3 -->
    <g>
      <rect x="60" y="340" width="1080" height="90" rx="14" fill="#0d7a5c"/>
      <circle cx="102" cy="385" r="20" fill="#ff3f8e"/>
      <text x="102" y="392" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">3</text>
      <text x="142" y="378" fill="#d7ff3f" font-size="22" font-weight="800">THIRD SHOT DROP</text>
      <text x="142" y="404" fill="#ffffff" font-size="14" font-weight="700" opacity=".85">When you are back and they are up</text>
      <text x="600" y="392" fill="#ffffff" font-size="16" font-weight="700">Forces them to hit up, and buys you the walk in.</text>
    </g>

    <!-- 4 -->
    <g>
      <rect x="60" y="440" width="1080" height="90" rx="14" fill="#0d7a5c"/>
      <circle cx="102" cy="485" r="20" fill="#ff3f8e"/>
      <text x="102" y="492" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">4</text>
      <text x="142" y="478" fill="#d7ff3f" font-size="22" font-weight="800">DINK</text>
      <text x="142" y="504" fill="#ffffff" font-size="14" font-weight="700" opacity=".85">When everyone is at the net</text>
      <text x="600" y="492" fill="#ffffff" font-size="16" font-weight="700">Gives them nothing to attack. Patience gets paid here.</text>
    </g>

    <!-- 5 -->
    <g>
      <rect x="60" y="540" width="1080" height="90" rx="14" fill="#0d7a5c"/>
      <circle cx="102" cy="585" r="20" fill="#ff3f8e"/>
      <text x="102" y="592" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">5</text>
      <text x="142" y="578" fill="#d7ff3f" font-size="22" font-weight="800">RESET</text>
      <text x="142" y="604" fill="#ffffff" font-size="14" font-weight="700" opacity=".85">When the point has already gone wrong</text>
      <text x="600" y="592" fill="#ffffff" font-size="16" font-weight="700">Buys the net back. Two in a row usually does it.</text>
    </g>

    <!-- takeaway -->
    <g>
      <rect x="60" y="650" width="1080" height="80" rx="20" fill="#0d7a5c"/>
      <text x="600" y="686" fill="#d7ff3f" font-size="22" font-weight="800" text-anchor="middle">ALL FIVE DO ONE JOB: PUT THE BALL UNDER THE TAPE.</text>
      <text x="600" y="714" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">Not one of them requires you to swing hard. That is the point.</text>
    </g>

  </g>
</svg>
