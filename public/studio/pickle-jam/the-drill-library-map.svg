<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" role="img" aria-labelledby="t d">
  <title id="t">The pickleball drill library, mapped by skill</title>
  <desc id="d">Seven skill cards, each naming a skill, the leak it fixes, and drills for it. One, dink: fixes soft control at the net, drilled with the figure 8 and the 100-ball rally. Two, drop: fixes the walk up to the net, drilled with baseline drops and wall drops. Three, reset: fixes surviving the transition zone, drilled with the slinky and midcourt resets. Four, hands: fixes the net firefight, drilled with the volley battle and dead-dink hands. Five, serve and return: fixes free points and deep returns, drilled by serving to a target. Six, footwork: fixes getting there early and balanced, drilled with the shuffle and figure-8 feet. Seven, solo and wall: fixes practicing with no partner, drilled with wall dinking and target practice. The last card states the rule: find your leak, pick one drill, count your reps.</desc>
  <rect width="1200" height="880" rx="42" fill="#0f5a46"/>

  <text x="600" y="66" fill="#d7ff3f" font-family="Arial, sans-serif" font-size="44" font-weight="800" text-anchor="middle">THE DRILL LIBRARY</text>
  <text x="600" y="106" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Find the one shot losing you points. Go to its card. Steal the drill.</text>

  <g font-family="Arial, sans-serif">
    <!-- Card 1: DINK (col1 row0) -->
    <g>
      <rect x="60" y="150" width="520" height="158" rx="20" fill="#0d7a5c"/>
      <circle cx="104" cy="192" r="20" fill="#ff3f8e"/>
      <text x="104" y="199" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">1</text>
      <text x="140" y="200" fill="#d7ff3f" font-size="26" font-weight="800">DINK</text>
      <text x="88" y="244" fill="#ffffff" font-size="17" font-weight="700">Fixes: soft control at the net</text>
      <text x="88" y="278" fill="#ffffff" font-size="16" font-weight="700" opacity=".85">Drill: figure 8, 100-ball rally</text>
    </g>
    <!-- Card 2: DROP (col2 row0) -->
    <g>
      <rect x="620" y="150" width="520" height="158" rx="20" fill="#0d7a5c"/>
      <circle cx="664" cy="192" r="20" fill="#ff3f8e"/>
      <text x="664" y="199" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">2</text>
      <text x="700" y="200" fill="#d7ff3f" font-size="26" font-weight="800">DROP</text>
      <text x="648" y="244" fill="#ffffff" font-size="17" font-weight="700">Fixes: the walk up to the net</text>
      <text x="648" y="278" fill="#ffffff" font-size="16" font-weight="700" opacity=".85">Drill: baseline drops, wall drops</text>
    </g>
    <!-- Card 3: RESET (col1 row1) -->
    <g>
      <rect x="60" y="328" width="520" height="158" rx="20" fill="#0d7a5c"/>
      <circle cx="104" cy="370" r="20" fill="#ff3f8e"/>
      <text x="104" y="377" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">3</text>
      <text x="140" y="378" fill="#d7ff3f" font-size="26" font-weight="800">RESET</text>
      <text x="88" y="422" fill="#ffffff" font-size="17" font-weight="700">Fixes: surviving the transition zone</text>
      <text x="88" y="456" fill="#ffffff" font-size="16" font-weight="700" opacity=".85">Drill: the slinky, midcourt resets</text>
    </g>
    <!-- Card 4: HANDS (col2 row1) -->
    <g>
      <rect x="620" y="328" width="520" height="158" rx="20" fill="#0d7a5c"/>
      <circle cx="664" cy="370" r="20" fill="#ff3f8e"/>
      <text x="664" y="377" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">4</text>
      <text x="700" y="378" fill="#d7ff3f" font-size="26" font-weight="800">HANDS</text>
      <text x="648" y="422" fill="#ffffff" font-size="17" font-weight="700">Fixes: the net firefight</text>
      <text x="648" y="456" fill="#ffffff" font-size="16" font-weight="700" opacity=".85">Drill: volley battle, dead-dink hands</text>
    </g>
    <!-- Card 5: SERVE + RETURN (col1 row2) -->
    <g>
      <rect x="60" y="506" width="520" height="158" rx="20" fill="#0d7a5c"/>
      <circle cx="104" cy="548" r="20" fill="#ff3f8e"/>
      <text x="104" y="555" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">5</text>
      <text x="140" y="556" fill="#d7ff3f" font-size="26" font-weight="800">SERVE + RETURN</text>
      <text x="88" y="600" fill="#ffffff" font-size="17" font-weight="700">Fixes: free points, deep returns</text>
      <text x="88" y="634" fill="#ffffff" font-size="16" font-weight="700" opacity=".85">Drill: serve to a target</text>
    </g>
    <!-- Card 6: FOOTWORK (col2 row2) -->
    <g>
      <rect x="620" y="506" width="520" height="158" rx="20" fill="#0d7a5c"/>
      <circle cx="664" cy="548" r="20" fill="#ff3f8e"/>
      <text x="664" y="555" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">6</text>
      <text x="700" y="556" fill="#d7ff3f" font-size="26" font-weight="800">FOOTWORK</text>
      <text x="648" y="600" fill="#ffffff" font-size="17" font-weight="700">Fixes: getting there early, balanced</text>
      <text x="648" y="634" fill="#ffffff" font-size="16" font-weight="700" opacity=".85">Drill: shuffle, figure-8 feet</text>
    </g>
    <!-- Card 7: SOLO + WALL (col1 row3) -->
    <g>
      <rect x="60" y="684" width="520" height="158" rx="20" fill="#0d7a5c"/>
      <circle cx="104" cy="726" r="20" fill="#ff3f8e"/>
      <text x="104" y="733" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">7</text>
      <text x="140" y="734" fill="#d7ff3f" font-size="26" font-weight="800">SOLO + WALL</text>
      <text x="88" y="778" fill="#ffffff" font-size="17" font-weight="700">Fixes: practice with no partner</text>
      <text x="88" y="812" fill="#ffffff" font-size="16" font-weight="700" opacity=".85">Drill: wall dinking, target practice</text>
    </g>
    <!-- Card 8: THE RULE (col2 row3) -->
    <g>
      <rect x="620" y="684" width="520" height="158" rx="20" fill="#0f5a46" stroke="#d7ff3f" stroke-width="3"/>
      <text x="880" y="738" fill="#d7ff3f" font-size="24" font-weight="800" text-anchor="middle">THE ONLY RULE</text>
      <text x="880" y="778" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">Find your leak. Pick ONE drill.</text>
      <text x="880" y="808" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">Count your reps. Repeat.</text>
    </g>
  </g>
</svg>
