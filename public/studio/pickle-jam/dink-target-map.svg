<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="t d">
  <title id="t">Where to aim a dink: four targets in your opponent's kitchen</title>
  <desc id="d">An overhead schematic of a pickleball court showing your kitchen, the net, and your opponent's kitchen. Four numbered targets sit in the opponent's non-volley zone. One is the outside corner straight ahead of you, near the net and near the sideline. Two is the middle seam between the two opponents. Three is the cross-court corner, reached by the longest diagonal path. Four is deep at their feet on their kitchen line, which forces them to decide whether to take the ball out of the air or let it bounce. Two dotted lines show the straight-ahead path and the much longer cross-court path from your position.</desc>

  <rect width="1200" height="900" rx="42" fill="#0f5a46"/>

  <text x="600" y="60" fill="#ffffff" font-family="Arial, sans-serif" font-size="40" font-weight="800" text-anchor="middle">DINK TO A SPOT, NOT TO A PERSON</text>
  <text x="600" y="96" fill="#d7ff3f" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">FOUR TARGETS IN THEIR KITCHEN, RANKED BY HOW MUCH TROUBLE THEY CAUSE</text>

  <!-- their court beyond the kitchen -->
  <rect x="240" y="125" width="720" height="215" fill="#0b4a3a"/>
  <!-- their kitchen -->
  <rect x="240" y="340" width="720" height="130" fill="#0d7a5c"/>
  <!-- your kitchen -->
  <rect x="240" y="484" width="720" height="130" fill="#0d7a5c"/>
  <!-- your court sliver -->
  <rect x="240" y="614" width="720" height="76" fill="#0b4a3a"/>

  <!-- lines -->
  <line x1="240" y1="340" x2="960" y2="340" stroke="#ffffff" stroke-width="4"/>
  <line x1="240" y1="614" x2="960" y2="614" stroke="#ffffff" stroke-width="4"/>
  <line x1="600" y1="125" x2="600" y2="340" stroke="#ffffff" stroke-opacity="0.55" stroke-width="3"/>
  <line x1="600" y1="614" x2="600" y2="690" stroke="#ffffff" stroke-opacity="0.55" stroke-width="3"/>
  <rect x="240" y="125" width="720" height="565" fill="none" stroke="#ffffff" stroke-width="4"/>

  <!-- net -->
  <rect x="228" y="470" width="744" height="14" rx="4" fill="#ffffff"/>
  <circle cx="228" cy="477" r="10" fill="#ffffff"/>
  <circle cx="972" cy="477" r="10" fill="#ffffff"/>
  <text x="1000" y="483" fill="#ffffff" fill-opacity="0.75" font-family="Arial, sans-serif" font-size="17" font-weight="800">NET</text>
  <text x="1000" y="345" fill="#ffffff" fill-opacity="0.75" font-family="Arial, sans-serif" font-size="15" font-weight="700">THEIR KITCHEN LINE</text>
  <text x="1000" y="620" fill="#ffffff" fill-opacity="0.75" font-family="Arial, sans-serif" font-size="15" font-weight="700">YOUR KITCHEN LINE</text>

  <!-- shot paths -->
  <line x1="330" y1="622" x2="330" y2="466" stroke="#d7ff3f" stroke-width="5" stroke-dasharray="12 10" stroke-linecap="round"/>
  <line x1="352" y1="628" x2="856" y2="454" stroke="#d7ff3f" stroke-width="5" stroke-dasharray="12 10" stroke-linecap="round"/>

  <!-- you -->
  <circle cx="330" cy="642" r="16" fill="#ffffff"/>
  <rect x="306" y="656" width="48" height="24" rx="12" fill="#ffffff"/>
  <rect x="360" y="648" width="24" height="17" rx="7" fill="#ffffff" fill-opacity="0.6"/>
  <text x="330" y="716" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle">YOU</text>

  <!-- targets -->
  <circle cx="320" cy="440" r="26" fill="#ff3f8e"/>
  <text x="320" y="449" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">1</text>

  <circle cx="600" cy="440" r="26" fill="#ff3f8e"/>
  <text x="600" y="449" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">2</text>

  <circle cx="880" cy="440" r="26" fill="#ff3f8e"/>
  <text x="880" y="449" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">3</text>

  <circle cx="700" cy="368" r="26" fill="#ff3f8e"/>
  <text x="700" y="377" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">4</text>

  <!-- legend -->
  <g font-family="Arial, sans-serif">
    <circle cx="86" cy="742" r="15" fill="#ff3f8e"/>
    <text x="86" y="749" fill="#ffffff" font-size="16" font-weight="800" text-anchor="middle">1</text>
    <text x="116" y="748" fill="#ffffff" font-size="18" font-weight="700">The outside corner, straight ahead. Shortest path, so it needs the most touch.</text>

    <circle cx="86" cy="784" r="15" fill="#ff3f8e"/>
    <text x="86" y="791" fill="#ffffff" font-size="16" font-weight="800" text-anchor="middle">2</text>
    <text x="116" y="790" fill="#ffffff" font-size="18" font-weight="700">The middle seam. Underused, and a speed-up out of the middle has to come back through it.</text>

    <circle cx="86" cy="826" r="15" fill="#ff3f8e"/>
    <text x="86" y="833" fill="#ffffff" font-size="16" font-weight="800" text-anchor="middle">3</text>
    <text x="116" y="832" fill="#ffffff" font-size="18" font-weight="700">The cross-court corner. Longest path, lowest part of the net, most margin. The workhorse.</text>

    <circle cx="86" cy="868" r="15" fill="#ff3f8e"/>
    <text x="86" y="875" fill="#ffffff" font-size="16" font-weight="800" text-anchor="middle">4</text>
    <text x="116" y="874" fill="#ffffff" font-size="18" font-weight="700">Deep at their feet, on their kitchen line. Forces the air-or-bounce decision on them.</text>
  </g>
</svg>
