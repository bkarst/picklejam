<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">Why twenty minutes of drilling beats two hours of playing</title>
  <desc id="d">A two-panel comparison. On the left, two hours of rec play: you hit your weak shot only about four times, each from a different spot, with the score in your head, so the leak stays. On the right, twenty minutes of drilling: you hit the same shot fifty times in a row, at a target, with no score, so the leak gets fixed. The bottom line reads: games find the leak, drilling fixes it.</desc>
  <rect width="1200" height="620" rx="42" fill="#0f5a46"/>

  <text x="600" y="66" fill="#ffffff" font-family="Arial, sans-serif" font-size="40" font-weight="800" text-anchor="middle">DRILLING BEATS PLAYING</text>
  <text x="600" y="104" fill="#d7ff3f" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">SAME HOUR ON A COURT, VERY DIFFERENT RESULT</text>

  <g font-family="Arial, sans-serif">
    <!-- LEFT: playing -->
    <g>
      <rect x="60" y="140" width="520" height="400" rx="22" fill="#0d7a5c"/>
      <text x="320" y="192" fill="#ffffff" font-size="24" font-weight="800" text-anchor="middle">2 HOURS OF REC PLAY</text>

      <circle cx="104" cy="252" r="9" fill="#ff3f8e"/>
      <text x="130" y="259" fill="#ffffff" font-size="18" font-weight="700">You hit your weak shot ~4 times</text>
      <circle cx="104" cy="304" r="9" fill="#ff3f8e"/>
      <text x="130" y="311" fill="#ffffff" font-size="18" font-weight="700">Each one from a different spot</text>
      <circle cx="104" cy="356" r="9" fill="#ff3f8e"/>
      <text x="130" y="363" fill="#ffffff" font-size="18" font-weight="700">The score is stuck in your head</text>
      <circle cx="104" cy="408" r="9" fill="#ff3f8e"/>
      <text x="130" y="415" fill="#ffffff" font-size="18" font-weight="700">The bad shot never gets isolated</text>

      <rect x="100" y="454" width="440" height="58" rx="16" fill="#0f5a46"/>
      <text x="320" y="491" fill="#ff8fc0" font-size="22" font-weight="800" text-anchor="middle">RESULT: THE LEAK STAYS</text>
    </g>

    <!-- RIGHT: drilling -->
    <g>
      <rect x="620" y="140" width="520" height="400" rx="22" fill="#0d7a5c"/>
      <rect x="620" y="140" width="520" height="400" rx="22" fill="none" stroke="#d7ff3f" stroke-width="3"/>
      <text x="880" y="192" fill="#d7ff3f" font-size="24" font-weight="800" text-anchor="middle">20 MINUTES OF DRILLING</text>

      <circle cx="664" cy="252" r="9" fill="#d7ff3f"/>
      <text x="690" y="259" fill="#ffffff" font-size="18" font-weight="700">You hit ONE shot 50 times in a row</text>
      <circle cx="664" cy="304" r="9" fill="#d7ff3f"/>
      <text x="690" y="311" fill="#ffffff" font-size="18" font-weight="700">Same spot, aimed at a target</text>
      <circle cx="664" cy="356" r="9" fill="#d7ff3f"/>
      <text x="690" y="363" fill="#ffffff" font-size="18" font-weight="700">No score, just clean reps</text>
      <circle cx="664" cy="408" r="9" fill="#d7ff3f"/>
      <text x="690" y="415" fill="#ffffff" font-size="18" font-weight="700">Your hand learns it without asking</text>

      <rect x="660" y="454" width="440" height="58" rx="16" fill="#0f5a46"/>
      <text x="880" y="491" fill="#d7ff3f" font-size="22" font-weight="800" text-anchor="middle">RESULT: THE LEAK GETS FIXED</text>
    </g>

    <text x="600" y="588" fill="#ffffff" font-size="22" font-weight="800" text-anchor="middle">Games find the leak. Drilling is the only place you fix it.</text>
  </g>
</svg>
