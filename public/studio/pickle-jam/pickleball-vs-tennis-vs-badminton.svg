<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="t d">
  <title id="t">Pickleball versus badminton versus tennis court size</title>
  <desc id="d">A to-scale PickleJam comparison: a pickleball court (20 by 44 feet, 880 square feet) shares the exact footprint of a doubles badminton court and fits comfortably inside a doubles tennis court (36 by 78 feet, 2,808 square feet).</desc>
  <rect width="1200" height="720" rx="42" fill="#0f5a46"/>
  <circle cx="1132" cy="54" r="86" fill="#d7ff3f" opacity=".9"/>
  <circle cx="96" cy="640" r="120" fill="#ff3f8e" opacity=".9"/>

  <text x="600" y="66" fill="#ffffff" font-family="Arial, sans-serif" font-size="44" font-weight="800" text-anchor="middle">SMALL COURT, BIG REASON</text>
  <text x="600" y="108" fill="#d7ff3f" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">DRAWN TO SCALE · A BADMINTON COURT WEARING NEW LINES</text>

  <g font-family="Arial, sans-serif">
    <!-- tennis court (doubles 78 x 36) at 12 px/ft: 936 x 432 -->
    <rect x="150" y="200" width="936" height="432" rx="6" fill="#0b4a3a" stroke="#9fe6c9" stroke-width="4"/>
    <line x1="618" y1="200" x2="618" y2="632" stroke="#9fe6c9" stroke-width="3" stroke-dasharray="4 8"/>
    <text x="618" y="612" fill="#9fe6c9" font-size="22" font-weight="800" text-anchor="middle">TENNIS COURT · 36 × 78 FT · 2,808 SQ FT</text>

    <!-- pickleball court (44 x 20) at 12 px/ft: 528 x 240, top-left inside tennis -->
    <rect x="150" y="200" width="528" height="240" rx="6" fill="#0d7a5c" stroke="#ffffff" stroke-width="5"/>
    <!-- kitchen -->
    <rect x="330" y="200" width="168" height="240" fill="#ff3f8e" opacity=".92"/>
    <line x1="330" y1="200" x2="330" y2="440" stroke="#ffffff" stroke-width="4"/>
    <line x1="498" y1="200" x2="498" y2="440" stroke="#ffffff" stroke-width="4"/>
    <line x1="414" y1="188" x2="414" y2="452" stroke="#ffffff" stroke-width="5" stroke-dasharray="2 6"/>
    <text x="240" y="326" fill="#ffffff" font-size="21" font-weight="800" text-anchor="middle">PICKLEBALL</text>
    <text x="240" y="352" fill="#d7ff3f" font-size="16" font-weight="700" text-anchor="middle">20 × 44 FT · 880 SQ FT</text>
  </g>

  <!-- stat row -->
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(150 660)">
      <rect width="300" height="44" rx="14" fill="#ffffff"/>
      <text x="150" y="29" fill="#0f5a46" font-size="18" font-weight="800">PICKLEBALL: 880 SQ FT</text>
    </g>
    <g transform="translate(468 660)">
      <rect width="300" height="44" rx="14" fill="#d7ff3f"/>
      <text x="150" y="29" fill="#0f5a46" font-size="18" font-weight="800">BADMINTON: 880 SQ FT</text>
    </g>
    <g transform="translate(786 660)">
      <rect width="300" height="44" rx="14" fill="#ff3f8e"/>
      <text x="150" y="29" fill="#ffffff" font-size="18" font-weight="800">TENNIS: 2,808 SQ FT</text>
    </g>
  </g>
</svg>
