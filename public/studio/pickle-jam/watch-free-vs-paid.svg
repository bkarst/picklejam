<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="t d">
  <title id="t">What zero dollars gets you in pro pickleball, and what paying actually adds</title>
  <desc id="d">Two panels compared side by side. The larger left panel, headed "What $0 gets you", lists seven things a viewer can watch for nothing: full APP Tour tournaments live on YouTube, Major League Pickleball matches on YouTube, the PPA's championship court free on the web, full days from the MLP Champions Series with its 40+, 50+ and 60+ divisions, the US Open's championship court on YouTube, free around-the-clock pickleball channels on smart TVs, and years of full matches on demand. The smaller right panel, headed "What paying adds", lists three things: the PPA's other courts live, watching up to six courts at once, and rewind, pause and the full archive. A band across the bottom notes that you can follow pro pickleball for years without entering a card number.</desc>

  <rect width="1200" height="720" rx="42" fill="#0f5a46"/>

  <text x="600" y="64" fill="#ffffff" font-family="Arial, sans-serif" font-size="42" font-weight="800" text-anchor="middle">THE FREE TIER IS THE BIG ONE</text>
  <text x="600" y="102" fill="#d7ff3f" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">MOST OF PROFESSIONAL PICKLEBALL COSTS NOTHING. HERE IS THE SPLIT.</text>

  <g font-family="Arial, sans-serif">

    <!-- ============ LEFT PANEL: FREE ============ -->
    <rect x="50" y="140" width="690" height="490" rx="20" fill="#0d7a5c"/>
    <text x="80" y="192" fill="#d7ff3f" font-size="30" font-weight="800">WHAT $0 GETS YOU</text>

    <g>
      <circle cx="98" cy="242" r="15" fill="#d7ff3f"/>
      <text x="98" y="249" fill="#0f5a46" font-size="18" font-weight="800" text-anchor="middle">1</text>
      <text x="130" y="249" fill="#ffffff" font-size="20">Full APP Tour tournaments, live on YouTube</text>

      <circle cx="98" cy="298" r="15" fill="#d7ff3f"/>
      <text x="98" y="305" fill="#0f5a46" font-size="18" font-weight="800" text-anchor="middle">2</text>
      <text x="130" y="305" fill="#ffffff" font-size="20">Major League Pickleball matches on YouTube</text>

      <circle cx="98" cy="354" r="15" fill="#d7ff3f"/>
      <text x="98" y="361" fill="#0f5a46" font-size="18" font-weight="800" text-anchor="middle">3</text>
      <text x="130" y="361" fill="#ffffff" font-size="20">The PPA's championship court, free on the web</text>

      <circle cx="98" cy="410" r="15" fill="#d7ff3f"/>
      <text x="98" y="417" fill="#0f5a46" font-size="18" font-weight="800" text-anchor="middle">4</text>
      <text x="130" y="417" fill="#ffffff" font-size="20">Full days from the 40+, 50+ and 60+ league</text>

      <circle cx="98" cy="466" r="15" fill="#d7ff3f"/>
      <text x="98" y="473" fill="#0f5a46" font-size="18" font-weight="800" text-anchor="middle">5</text>
      <text x="130" y="473" fill="#ffffff" font-size="20">The US Open's championship court, on YouTube</text>

      <circle cx="98" cy="522" r="15" fill="#d7ff3f"/>
      <text x="98" y="529" fill="#0f5a46" font-size="18" font-weight="800" text-anchor="middle">6</text>
      <text x="130" y="529" fill="#ffffff" font-size="20">Free 24/7 pickleball channels on smart TVs</text>

      <circle cx="98" cy="578" r="15" fill="#d7ff3f"/>
      <text x="98" y="585" fill="#0f5a46" font-size="18" font-weight="800" text-anchor="middle">7</text>
      <text x="130" y="585" fill="#ffffff" font-size="20">Years of finished matches, on demand</text>
    </g>

    <!-- ============ RIGHT PANEL: PAID ============ -->
    <rect x="770" y="140" width="380" height="490" rx="20" fill="#0d7a5c" stroke="#ff3f8e" stroke-width="3"/>
    <text x="798" y="192" fill="#ff3f8e" font-size="27" font-weight="800">WHAT PAYING ADDS</text>

    <g>
      <circle cx="816" cy="244" r="13" fill="#ff3f8e"/>
      <text x="846" y="250" fill="#ffffff" font-size="19">The PPA's other courts,</text>
      <text x="846" y="274" fill="#ffffff" font-size="19">live instead of later</text>

      <circle cx="816" cy="326" r="13" fill="#ff3f8e"/>
      <text x="846" y="332" fill="#ffffff" font-size="19">Up to six courts at</text>
      <text x="846" y="356" fill="#ffffff" font-size="19">once, on one screen</text>

      <circle cx="816" cy="408" r="13" fill="#ff3f8e"/>
      <text x="846" y="414" fill="#ffffff" font-size="19">Rewind, pause, and</text>
      <text x="846" y="438" fill="#ffffff" font-size="19">the full back catalog</text>
    </g>

    <line x1="798" y1="486" x2="1122" y2="486" stroke="#ffffff" stroke-width="1.5" opacity=".3"/>
    <text x="798" y="524" fill="#d7ff3f" font-size="15" font-weight="800">THE PRICE</text>
    <text x="798" y="554" fill="#ffffff" font-size="19">Less per month than one</text>
    <text x="798" y="578" fill="#ffffff" font-size="19">can of outdoor balls. Check</text>
    <text x="798" y="602" fill="#ffffff" font-size="19">the app before you assume.</text>

    <!-- ============ BOTTOM BAND ============ -->
    <rect x="50" y="654" width="1100" height="48" rx="18" fill="#0d7a5c"/>
    <text x="600" y="685" fill="#ffffff" font-size="21" font-weight="800" text-anchor="middle">You can follow pro pickleball for years and never enter a card number.</text>
  </g>
</svg>
