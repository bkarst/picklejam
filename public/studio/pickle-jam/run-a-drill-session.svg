<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
  <title id="t">How to run a 45-minute pickleball drill session</title>
  <desc id="d">A timeline of a drill session: a short warm-up, then three fifteen-minute blocks of dinks, resets, and drops, each done straight-ahead first and then crosscourt on the forehand and backhand sides, then a few live points to finish. Three rules sit underneath: chase a number such as 25 in a row or 40 of 50 on target, change only one thing per session, and end on a make so your hand remembers the good one.</desc>
  <rect width="1200" height="560" rx="42" fill="#0f5a46"/>

  <text x="600" y="60" fill="#d7ff3f" font-family="Arial, sans-serif" font-size="40" font-weight="800" text-anchor="middle">A 45-MINUTE DRILL SESSION</text>
  <text x="600" y="98" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Three 15-minute blocks, bookended by a warm-up and a few live points.</text>

  <g font-family="Arial, sans-serif">
    <!-- timeline segments -->
    <!-- warm-up -->
    <rect x="60" y="150" width="98" height="92" rx="12" fill="#0a4a3a"/>
    <text x="109" y="192" fill="#ffffff" font-size="14" font-weight="800" text-anchor="middle">WARM-UP</text>
    <text x="109" y="216" fill="#d7ff3f" font-size="14" font-weight="700" text-anchor="middle">~5 min</text>
    <!-- dinks -->
    <rect x="166" y="150" width="290" height="92" rx="12" fill="#0d7a5c"/>
    <rect x="166" y="150" width="290" height="8" rx="4" fill="#d7ff3f"/>
    <text x="311" y="196" fill="#ffffff" font-size="24" font-weight="800" text-anchor="middle">DINKS</text>
    <text x="311" y="222" fill="#d7ff3f" font-size="15" font-weight="800" text-anchor="middle">15 min</text>
    <!-- resets -->
    <rect x="464" y="150" width="290" height="92" rx="12" fill="#0d7a5c"/>
    <rect x="464" y="150" width="290" height="8" rx="4" fill="#d7ff3f"/>
    <text x="609" y="196" fill="#ffffff" font-size="24" font-weight="800" text-anchor="middle">RESETS</text>
    <text x="609" y="222" fill="#d7ff3f" font-size="15" font-weight="800" text-anchor="middle">15 min</text>
    <!-- drops -->
    <rect x="762" y="150" width="290" height="92" rx="12" fill="#0d7a5c"/>
    <rect x="762" y="150" width="290" height="8" rx="4" fill="#d7ff3f"/>
    <text x="907" y="196" fill="#ffffff" font-size="24" font-weight="800" text-anchor="middle">DROPS</text>
    <text x="907" y="222" fill="#d7ff3f" font-size="15" font-weight="800" text-anchor="middle">15 min</text>
    <!-- live points -->
    <rect x="1060" y="150" width="80" height="92" rx="12" fill="#0a4a3a"/>
    <text x="1100" y="192" fill="#ffffff" font-size="14" font-weight="800" text-anchor="middle">LIVE</text>
    <text x="1100" y="216" fill="#d7ff3f" font-size="14" font-weight="700" text-anchor="middle">points</text>

    <text x="609" y="284" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">Each block: straight-ahead first, then crosscourt forehand and backhand.</text>

    <!-- rules -->
    <g>
      <rect x="60" y="330" width="340" height="160" rx="20" fill="#0d7a5c"/>
      <text x="230" y="378" fill="#d7ff3f" font-size="22" font-weight="800" text-anchor="middle">CHASE A NUMBER</text>
      <text x="230" y="418" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">25 in a row, or 40 of 50</text>
      <text x="230" y="444" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">on target. Then you know</text>
      <text x="230" y="470" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">if you improved.</text>

      <rect x="430" y="330" width="340" height="160" rx="20" fill="#0d7a5c"/>
      <text x="600" y="378" fill="#d7ff3f" font-size="22" font-weight="800" text-anchor="middle">CHANGE ONE THING</text>
      <text x="600" y="418" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">One grip cue, one target,</text>
      <text x="600" y="444" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">one shot per session.</text>
      <text x="600" y="470" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">Not five.</text>

      <rect x="800" y="330" width="340" height="160" rx="20" fill="#0d7a5c"/>
      <text x="970" y="378" fill="#d7ff3f" font-size="22" font-weight="800" text-anchor="middle">END ON A MAKE</text>
      <text x="970" y="418" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">Finish on a good one,</text>
      <text x="970" y="444" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">so your hand walks away</text>
      <text x="970" y="470" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">remembering it.</text>
    </g>
  </g>
</svg>
