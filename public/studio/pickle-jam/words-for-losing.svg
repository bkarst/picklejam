<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="t d">
  <title id="t">Ten pickleball words for losing, and what each one means</title>
  <desc id="d">A PickleJam-branded infographic listing the ten pickleball slang terms for losing or being embarrassed on court, each numbered and defined in one line: pickled, golden pickle, bagel, body bag, fly swatter, lettuced, chicken wing, pop-up, nutmeg, and the yips.</desc>
  <rect width="1200" height="820" rx="42" fill="#0f5a46"/>

  <text x="600" y="62" fill="#ffffff" font-family="Arial, sans-serif" font-size="44" font-weight="800" text-anchor="middle">TEN WAYS TO LOSE, NAMED WITH LOVE</text>
  <text x="600" y="100" fill="#d7ff3f" font-family="Arial, sans-serif" font-size="21" font-weight="700" text-anchor="middle">PICKLEBALL HAS A WORD FOR EVERY ONE OF YOUR WORST MOMENTS.</text>

  <g font-family="Arial, sans-serif">

    <!-- ============ COLUMN 1 ============ -->
    <g>
      <rect x="60" y="150" width="520" height="100" rx="16" fill="#0d7a5c"/>
      <circle cx="102" cy="190" r="20" fill="#d7ff3f"/>
      <text x="102" y="198" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">1</text>
      <text x="140" y="192" fill="#d7ff3f" font-size="22" font-weight="800">PICKLED</text>
      <text x="140" y="222" fill="#ffffff" font-size="14" font-weight="700">You lost 11-0.</text>

      <rect x="60" y="265" width="520" height="100" rx="16" fill="#0d7a5c"/>
      <circle cx="102" cy="305" r="20" fill="#d7ff3f"/>
      <text x="102" y="313" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">2</text>
      <text x="140" y="307" fill="#d7ff3f" font-size="22" font-weight="800">GOLDEN PICKLE</text>
      <text x="140" y="337" fill="#ffffff" font-size="14" font-weight="700">Lost 11-0 and never once got to serve.</text>

      <rect x="60" y="380" width="520" height="100" rx="16" fill="#0d7a5c"/>
      <circle cx="102" cy="420" r="20" fill="#d7ff3f"/>
      <text x="102" y="428" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">3</text>
      <text x="140" y="422" fill="#d7ff3f" font-size="22" font-weight="800">BAGEL</text>
      <text x="140" y="452" fill="#ffffff" font-size="14" font-weight="700">Same as pickled, borrowed from tennis.</text>

      <rect x="60" y="495" width="520" height="100" rx="16" fill="#0d7a5c"/>
      <circle cx="102" cy="535" r="20" fill="#ff3f8e"/>
      <text x="102" y="543" fill="#ffffff" font-size="21" font-weight="800" text-anchor="middle">4</text>
      <text x="140" y="537" fill="#ff3f8e" font-size="22" font-weight="800">BODY BAG</text>
      <text x="140" y="567" fill="#ffffff" font-size="14" font-weight="700">They hit you with the ball, on purpose, and won.</text>

      <rect x="60" y="610" width="520" height="100" rx="16" fill="#0d7a5c"/>
      <circle cx="102" cy="650" r="20" fill="#d7ff3f"/>
      <text x="102" y="658" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">5</text>
      <text x="140" y="652" fill="#d7ff3f" font-size="22" font-weight="800">FLY SWATTER</text>
      <text x="140" y="682" fill="#ffffff" font-size="14" font-weight="700">You had a sitter and swatted it into the net.</text>
    </g>

    <!-- ============ COLUMN 2 ============ -->
    <g>
      <rect x="620" y="150" width="520" height="100" rx="16" fill="#0d7a5c"/>
      <circle cx="662" cy="190" r="20" fill="#d7ff3f"/>
      <text x="662" y="198" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">6</text>
      <text x="700" y="192" fill="#d7ff3f" font-size="22" font-weight="800">LETTUCED</text>
      <text x="700" y="222" fill="#ffffff" font-size="14" font-weight="700">Their serve clipped the net, landed in, you missed.</text>

      <rect x="620" y="265" width="520" height="100" rx="16" fill="#0d7a5c"/>
      <circle cx="662" cy="305" r="20" fill="#d7ff3f"/>
      <text x="662" y="313" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">7</text>
      <text x="700" y="307" fill="#d7ff3f" font-size="22" font-weight="800">CHICKEN WING</text>
      <text x="700" y="337" fill="#ffffff" font-size="14" font-weight="700">Ball at your shoulder, elbow flew up like a wing.</text>

      <rect x="620" y="380" width="520" height="100" rx="16" fill="#0d7a5c"/>
      <circle cx="662" cy="420" r="20" fill="#d7ff3f"/>
      <text x="662" y="428" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">8</text>
      <text x="700" y="422" fill="#d7ff3f" font-size="22" font-weight="800">POP-UP</text>
      <text x="700" y="452" fill="#ffffff" font-size="14" font-weight="700">You hit it high and soft. They licked their chops.</text>

      <rect x="620" y="495" width="520" height="100" rx="16" fill="#0d7a5c"/>
      <circle cx="662" cy="535" r="20" fill="#d7ff3f"/>
      <text x="662" y="543" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">9</text>
      <text x="700" y="537" fill="#d7ff3f" font-size="22" font-weight="800">NUTMEG</text>
      <text x="700" y="567" fill="#ffffff" font-size="14" font-weight="700">It went between your legs.</text>

      <rect x="620" y="610" width="520" height="100" rx="16" fill="#0d7a5c"/>
      <circle cx="662" cy="650" r="20" fill="#d7ff3f"/>
      <text x="662" y="658" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">10</text>
      <text x="700" y="652" fill="#d7ff3f" font-size="22" font-weight="800">THE YIPS</text>
      <text x="700" y="682" fill="#ffffff" font-size="14" font-weight="700">Your muscle memory left, and took your serve.</text>
    </g>

    <text x="600" y="770" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">Definitions sourced from The Dink and Selkirk Sport. Every one of these is said by somebody who wants you back Thursday.</text>
  </g>
</svg>
