<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
  <title id="t">The pickleball points nobody earns: unforced errors decide games</title>
  <desc id="d">A row of eighteen dots stands for the points scored in a typical pickleball game. Six of them are highlighted to show the points that came off unforced errors rather than being earned. Three statistics from a count of 4.0-and-above games follow: an average of sixteen unforced errors per game, about six of a game's points coming off those errors, and the team with fewer unforced errors winning about seventy percent of the time.</desc>
  <rect width="1200" height="560" rx="42" fill="#0f5a46"/>

  <text x="600" y="62" fill="#ffffff" font-family="Arial, sans-serif" font-size="44" font-weight="800" text-anchor="middle">THE POINTS NOBODY EARNS</text>
  <text x="600" y="100" fill="#d7ff3f" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">ONE GAME'S SCORING, AND WHERE THE POINTS ACTUALLY CAME FROM.</text>

  <g font-family="Arial, sans-serif">

    <!-- 18 points: 6 donated (lime), 12 earned (faint white) -->
    <g>
      <circle cx="166" cy="165" r="17" fill="#ffffff" opacity=".35"/>
      <circle cx="217" cy="165" r="17" fill="#d7ff3f"/>
      <circle cx="268" cy="165" r="17" fill="#ffffff" opacity=".35"/>
      <circle cx="319" cy="165" r="17" fill="#ffffff" opacity=".35"/>
      <circle cx="370" cy="165" r="17" fill="#d7ff3f"/>
      <circle cx="421" cy="165" r="17" fill="#ffffff" opacity=".35"/>
      <circle cx="472" cy="165" r="17" fill="#ffffff" opacity=".35"/>
      <circle cx="523" cy="165" r="17" fill="#d7ff3f"/>
      <circle cx="574" cy="165" r="17" fill="#ffffff" opacity=".35"/>
      <circle cx="625" cy="165" r="17" fill="#ffffff" opacity=".35"/>
      <circle cx="676" cy="165" r="17" fill="#d7ff3f"/>
      <circle cx="727" cy="165" r="17" fill="#ffffff" opacity=".35"/>
      <circle cx="778" cy="165" r="17" fill="#ffffff" opacity=".35"/>
      <circle cx="829" cy="165" r="17" fill="#d7ff3f"/>
      <circle cx="880" cy="165" r="17" fill="#ffffff" opacity=".35"/>
      <circle cx="931" cy="165" r="17" fill="#ffffff" opacity=".35"/>
      <circle cx="982" cy="165" r="17" fill="#d7ff3f"/>
      <circle cx="1033" cy="165" r="17" fill="#ffffff" opacity=".35"/>
    </g>

    <!-- legend -->
    <circle cx="300" cy="228" r="10" fill="#d7ff3f"/>
    <text x="320" y="234" fill="#ffffff" font-size="15" font-weight="700">Donated. Came off an unforced error.</text>
    <circle cx="700" cy="228" r="10" fill="#ffffff" opacity=".35"/>
    <text x="720" y="234" fill="#ffffff" font-size="15" font-weight="700">Earned. Somebody actually won it.</text>

    <!-- three stats -->
    <g>
      <rect x="60" y="280" width="340" height="160" rx="16" fill="#0d7a5c"/>
      <text x="230" y="348" fill="#d7ff3f" font-size="54" font-weight="800" text-anchor="middle">16</text>
      <text x="230" y="386" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">unforced errors in the</text>
      <text x="230" y="408" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">average game</text>

      <rect x="430" y="280" width="340" height="160" rx="16" fill="#0d7a5c"/>
      <text x="600" y="348" fill="#d7ff3f" font-size="54" font-weight="800" text-anchor="middle">6</text>
      <text x="600" y="386" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">of a game's points come</text>
      <text x="600" y="408" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">off those errors</text>

      <rect x="800" y="280" width="340" height="160" rx="16" fill="#0d7a5c"/>
      <text x="970" y="348" fill="#d7ff3f" font-size="54" font-weight="800" text-anchor="middle">70%</text>
      <text x="970" y="386" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">of the time, the team with</text>
      <text x="970" y="408" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">fewer of them wins</text>
    </g>

    <text x="600" y="486" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle" opacity=".75">From Noel White's hand count of 4.0-and-above games, as summarized by the Gaithersburg Pickleball Club.</text>

  </g>
</svg>
