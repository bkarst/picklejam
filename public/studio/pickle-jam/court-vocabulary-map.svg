<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 960" role="img" aria-labelledby="t d">
  <title id="t">Every line on a pickleball court has a name</title>
  <desc id="d">A top-down PickleJam-branded map of a 20-by-44-foot pickleball court with each line and zone numbered and named: the sidelines, the baseline, the centerline, the kitchen line (non-volley line), the kitchen (non-volley zone), the service courts, the transition zone (no man's land), and the net.</desc>
  <rect width="1200" height="960" rx="42" fill="#0f5a46"/>

  <text x="600" y="66" fill="#ffffff" font-family="Arial, sans-serif" font-size="46" font-weight="800" text-anchor="middle">EVERY LINE HAS A NAME</text>
  <text x="600" y="106" fill="#d7ff3f" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">THE PICKLEBALL COURT, IN THE WORDS PLAYERS ACTUALLY USE</text>

  <g font-family="Arial, sans-serif">
    <!-- court surface -->
    <rect x="170" y="160" width="860" height="390" fill="#0d7a5c" stroke="#ffffff" stroke-width="5"/>

    <!-- kitchen, both sides of the net -->
    <rect x="463" y="160" width="274" height="390" fill="#ff3f8e" opacity=".9"/>
    <line x1="463" y1="160" x2="463" y2="550" stroke="#ffffff" stroke-width="5"/>
    <line x1="737" y1="160" x2="737" y2="550" stroke="#ffffff" stroke-width="5"/>

    <!-- centerlines, kitchen line out to baseline -->
    <line x1="170" y1="355" x2="463" y2="355" stroke="#ffffff" stroke-width="4"/>
    <line x1="737" y1="355" x2="1030" y2="355" stroke="#ffffff" stroke-width="4"/>

    <!-- net -->
    <line x1="600" y1="138" x2="600" y2="572" stroke="#0b3f31" stroke-width="9"/>
    <line x1="600" y1="138" x2="600" y2="572" stroke="#ffffff" stroke-width="9" stroke-dasharray="2 7"/>
    <circle cx="600" cy="138" r="7" fill="#d7ff3f"/>
    <circle cx="600" cy="572" r="7" fill="#d7ff3f"/>

    <!-- numbered badges -->
    <g>
      <line x1="880" y1="550" x2="880" y2="594" stroke="#d7ff3f" stroke-width="3"/>
      <circle cx="880" cy="612" r="18" fill="#d7ff3f"/>
      <text x="880" y="619" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">1</text>

      <line x1="1030" y1="480" x2="1074" y2="480" stroke="#d7ff3f" stroke-width="3"/>
      <circle cx="1092" cy="480" r="18" fill="#d7ff3f"/>
      <text x="1092" y="487" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">2</text>

      <circle cx="250" cy="322" r="18" fill="#d7ff3f"/>
      <text x="250" y="329" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">3</text>

      <line x1="463" y1="550" x2="463" y2="594" stroke="#d7ff3f" stroke-width="3"/>
      <circle cx="463" cy="612" r="18" fill="#d7ff3f"/>
      <text x="463" y="619" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">4</text>

      <circle cx="530" cy="240" r="18" fill="#0b3f31"/>
      <text x="530" y="247" fill="#ff3f8e" font-size="21" font-weight="800" text-anchor="middle">5</text>

      <circle cx="316" cy="240" r="18" fill="#d7ff3f"/>
      <text x="316" y="247" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">6</text>

      <circle cx="884" cy="452" r="18" fill="#d7ff3f"/>
      <text x="884" y="459" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">7</text>

      <line x1="600" y1="572" x2="600" y2="594" stroke="#d7ff3f" stroke-width="3"/>
      <circle cx="600" cy="612" r="18" fill="#d7ff3f"/>
      <text x="600" y="619" fill="#0b3f31" font-size="21" font-weight="800" text-anchor="middle">8</text>
    </g>
  </g>

  <!-- legend: two columns, four rows each -->
  <g font-family="Arial, sans-serif">
    <text x="80" y="700" fill="#d7ff3f" font-size="22" font-weight="800">1  SIDELINE</text>
    <text x="80" y="726" fill="#ffffff" font-size="16" font-weight="700">The long edges. The whole court is 20 ft by 44 ft.</text>

    <text x="80" y="784" fill="#d7ff3f" font-size="22" font-weight="800">2  BASELINE</text>
    <text x="80" y="810" fill="#ffffff" font-size="16" font-weight="700">The back line, 22 ft from the net. Serve behind it.</text>

    <text x="80" y="868" fill="#d7ff3f" font-size="22" font-weight="800">3  CENTERLINE</text>
    <text x="80" y="894" fill="#ffffff" font-size="16" font-weight="700">Splits the two service courts.</text>

    <text x="640" y="700" fill="#d7ff3f" font-size="22" font-weight="800">4  KITCHEN LINE</text>
    <text x="640" y="726" fill="#ffffff" font-size="16" font-weight="700">The non-volley line. A serve landing on it is OUT.</text>

    <text x="640" y="784" fill="#ff3f8e" font-size="22" font-weight="800">5  THE KITCHEN</text>
    <text x="640" y="810" fill="#ffffff" font-size="16" font-weight="700">The non-volley zone, 7 ft by 20 ft. Never volley in it.</text>

    <text x="640" y="868" fill="#d7ff3f" font-size="22" font-weight="800">6  SERVICE COURT</text>
    <text x="640" y="894" fill="#ffffff" font-size="16" font-weight="700">Where a serve must land, diagonally across.</text>

    <text x="80" y="932" fill="#d7ff3f" font-size="22" font-weight="800">7  TRANSITION ZONE</text>
    <text x="325" y="932" fill="#ffffff" font-size="16" font-weight="700">Also called no man's land.</text>

    <text x="640" y="932" fill="#d7ff3f" font-size="22" font-weight="800">8  NET</text>
    <text x="740" y="932" fill="#ffffff" font-size="16" font-weight="700">Splits the court. Everything is measured from it.</text>
  </g>
</svg>
