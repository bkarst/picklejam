keyTakeaways:
- A dink is not a soft shot. It is a low shot, and what decides the rally is how high the ball is when it reaches them.
- 'The kitchen is why it works: nobody may volley inside the seven feet either side of the net, so a ball landing there has to be lifted from below.'
- Take the energy out of the shot. Loose grip, contact in front, almost no backswing, push from the shoulder, then recover to the line.
- Dink to a spot rather than to a person, and let the other team be the one who gets bored first.
faq:
- question: What exactly counts as a dink?
  answer: A soft shot, usually hit from at or near your kitchen line, that lands in your opponent's non-volley zone so it cannot be volleyed and has to be lifted. If it lands past their kitchen line, it was a drop or a groundstroke, not a dink.
- question: How high should a dink cross the net?
  answer: High enough to clear the tape comfortably, low enough that it is under net height when it reaches them. Coaches genuinely disagree about the margin, so give yourself more room if you keep finding the net and less if you keep getting attacked.
- question: Cross-court or straight ahead?
  answer: Cross-court by default, because the diagonal is longer and the net is lowest in the middle. Straight ahead is your bailout when their angle has pulled you off the court.
- question: Do I need topspin on my dinks?
  answer: No. Add it once you are already consistent, and use it on purpose rather than on every ball.
- question: What is a dead dink?
  answer: A flat dink with no meaningful spin or pace. Kept shallow it is one of the hardest balls in pickleball to attack, which is exactly what you want against a team looking to speed things up.
- question: Why do I keep popping them up?
  answer: Almost always grip pressure, contact behind your body, or a backswing you did not know you were taking. Work back through the ten symptoms above and find the one that matches what the ball actually did.
- question: How long is a normal dink rally?
  answer: Shorter than you think. Rallies in professional men's doubles average under nine shots, and women's doubles a little under ten, so the 97-shot marathon is an outlier even at the top.
- question: What is the longest pickleball rally ever?
  answer: Angelo and Ettore Rossetti rallied a pickleball 16,046 times in Rocky Hill, Connecticut, on a single day in October. They are identical twins, and it took them six hours and eleven minutes. Nobody was trying to win, which is sort of the point.
body: |
  On championship point, four of the best pickleball players on earth hit the ball softly at each other eighty-five times in a row.

  This is on the record, shot by shot. In a men's doubles final at a PPA Tour Grand Slam in Mesa, Arizona, Ben Johns hit 29 of those soft shots. Matt Wright hit 22, Riley Newman 21, Collin Johns 13, and the whole point ran 97 shots and a minute and forty-five seconds ([PPA Tour](https://ppatour.com/97-shots-an-inside-look-at-a-mesmerizing-rally-on-championship-point/)).

  Then it ended, and it did not end on a dink. It ended when somebody finally hit the ball hard and put it just past the corner.

  You have felt the other side of that. You get to the kitchen line, you tap four balls back politely, and the fifth one floats up like a wrapped gift, and somebody hits it so hard you hear it before you see it.

  The trouble is that "hit it softer" is the wrong instruction. A dink is not a soft shot. It is a low shot, and softness is only the cheapest way to make it arrive under the tape.

  ## The short answer

  A dink is a soft shot, hit from at or near your kitchen line, that lands in your opponent's kitchen: the seven-foot non-volley zone on their side of the net ([USA Pickleball](https://usapickleball.org/rules/summary/)). Because nobody may volley inside that zone, they have to let it bounce and lift it back up to you.

  That is the whole job. A dink wins nothing by itself. What it does is take away every shot they could have won the point with, and then wait.

  > **The one idea to keep:** Stop trying to hit a nice soft dink. Try to arrive low at their end. Everything else in this guide is a way of doing that.

  ## The rule that invented the dink

  The dink is a shot the rulebook forced into existence, and the rule that did it is the kitchen.

  The non-volley zone runs seven feet back from the net on both sides. Volleying is prohibited inside it, and it is a fault to touch it while volleying, or to be carried into it by your own momentum afterward ([USA Pickleball](https://usapickleball.org/rules/summary/)).

  Read that as a player instead of a lawyer and it says something simpler. A ball that lands in there cannot be smashed. It has to be allowed to bounce, and then it has to be picked up off the floor from below.

  Now add the net. It stands 36 inches at the sidelines and sags to 34 inches in the middle ([USA Pickleball](https://usapickleball.org/what-is-pickleball/)). A ball that reaches you below that line cannot be hit downward, because downward is into the net.

  Coaches Barrett and Danea Bass put it about as plainly as it can be put: there are only two shots in pickleball, the one where you hit up on the ball and the one where you hit down on it ([PlayPickleball](https://www.playpickleball.com/pickleball-dinking-master-class-with-drills/)). The dink exists to make sure the person hitting up is not you.

  ![A side view of a pickleball net with two shots drawn: a green one that clears the tape with room to spare, lands short in the kitchen, and reaches the opponent below net height, and a pink one that floats higher, lands deeper, and kicks up above the tape where it can be attacked](/studio/pickle-jam/dink-low-not-soft.svg)

  ## Why "hit it softer" is the wrong instruction

  There is a woman at my Monday morning game I will call Dot, who is seventy-three, and who spent a whole winter being told to hit it softer.

  She did it, too. She hit the ball beautifully softly, with a gentle little push and a tidy follow-through, and it kept floating up around somebody's shoulder and coming back through her shoelaces.

  She had done exactly what everybody told her, and it was not working, which is about the most demoralizing thing that can happen to a person on a court.

  Then a woman on the next court told her to quit watching her own paddle and start watching the far side of the net. So Dot watched. What she saw was that her lovely soft ball was arriving at her opponent somewhere around the belt buckle every single time, which is a height from which a human being can do absolutely anything they want.

  The next one she hit was not softer. It was flatter and shorter, it landed about a foot past the net, and her opponent had to bend her knees and scoop it back up at half the speed. Dot has told me about that one shot maybe four times.

  Softness is a fact about your end of the court, and low is a fact about theirs, and only one of them decides the rally.

  Plenty of gentle, well-meant dinks lose points, because a ball that arrives at somebody's chest is a gift no matter how tenderly you struck it. Plenty of firm ones win, because they land short and stay under the tape the whole way. The question is never "was that soft enough," it is "where was the ball when they got to it."

  So aim at their contact point rather than at the net tape, and still give yourself real clearance on the way over, because a dink that clips the net has cost you the point exactly as thoroughly as a pop-up would ([Better Pickleball](https://betterpickleball.com/think-you-need-to-add-spin-to-your-dink-strategy-think-again/)).

  You can hear a good dink rally from the parking lot, and it does not sound like sport. It sounds like somebody tapping a screen door, on and on, well past the point where anything ought to still be happening. What you are actually listening to is four people being extremely polite to each other and meaning none of it.

  ## Six keys to a dink you can repeat

  Every one of these is the same instruction wearing a different hat: take energy out of the shot.

  1. **Start where you want to finish.** Feet about shoulder width, weight on the front of your feet, and bend at the knees rather than the hips, because folding forward drops your eyes toward the ground and you stop seeing the ball ([Better Pickleball](https://betterpickleball.com/three-steps-to-a-consistent-dink/)).
  2. **Feet first, then paddle.** Shuffle sideways with your hips square to the net, because crossing your feet over turns your hips away and opens a hole behind you ([Better Pickleball](https://betterpickleball.com/three-steps-to-a-consistent-dink/)).
  3. **Grip at about a three or four out of ten.** Squeeze the handle and the tension runs up through the forearm into the paddle face and straight into the ball ([The Dink](https://www.thedinkpickleball.com/pickleball-dinking-technique-the-complete-beginners-guide/)). Selkirk's coaching says the same thing at a two or three ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/dinking-in-pickleball-the-shot-that-changes-everything-6-keys-to-success)).
  4. **Contact the ball in front of you. Always.** Beside your body pops it up and behind your body sends your whole momentum upward with it, so when a ball comes deep, step back to keep it in front ([The Dink](https://www.thedinkpickleball.com/pickleball-dinking-technique-the-complete-beginners-guide/)).
  5. **Push from the shoulder, lift with the legs, keep the wrist quiet.** Using the wrist or the elbow can pop the ball up ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/dinking-in-pickleball-the-shot-that-changes-everything-6-keys-to-success)), and the paddle should go back only a few inches, because a windup is power you are actively trying not to have ([The Dink](https://www.thedinkpickleball.com/pickleball-dinking-technique-the-complete-beginners-guide/)).
  6. **Recover to the line, and to the middle.** The kitchen line is the best real estate on the court, so take a ball off it if you must and then walk straight back onto it ([The Dink](https://www.thedinkpickleball.com/pickleball-dinking-technique-the-complete-beginners-guide/)).

  ![Six numbered rows: start where you want to finish, feet first then paddle, grip at a three or four out of ten, contact in front, push from the shoulder and lift with the legs, and recover to the line and the middle](/studio/pickle-jam/dink-six-keys.svg)

  ## The five dinks worth knowing

  You do not need a dozen shots. You need five, and you need to know which one you are hitting before you hit it.

  The cross-court dink is your workhorse, and the reason is geometry rather than style. The diagonal is over twice as long as a straight-ahead dink ([Pickleball Kitchen](https://pickleballkitchen.com/ultimate-guide-dinking-pickleball/)), and it crosses the net at its lowest point, in the middle, where the tape sits at 34 inches instead of 36 ([Pickleheads](https://www.pickleheads.com/guides/what-is-a-dink-in-pickleball)). The straight-ahead dink is the bailout for when somebody threads an angle you cannot answer in kind, and the shorter path means it needs a much softer touch than feels right ([Pickleball Kitchen](https://pickleballkitchen.com/ultimate-guide-dinking-pickleball/)).

  | The dink | When you hit it | What it does | How you blow it |
  | --- | --- | --- | --- |
  | Cross-court | Your default, most of the rally | Longest path, lowest net, most margin | Giving a sharp angle and getting one back |
  | Straight ahead | Their angle has beaten you | Slows everything back down | Hitting it as hard as a cross-court |
  | Dead dink | Against a team dying to speed it up | Lands flat and shallow, almost unattackable | Hitting it dead but not shallow, which is just a slow ball |
  | Pressure dink | You are balanced and they are not | Forces the air-or-bounce decision on them | Reaching for it instead of moving your feet |
  | Reset | You are in trouble anywhere on court | Absorbs their pace and buys the point back | A tight grip, which sends their pace right back out |

  The dead dink gets sneered at as the lazy one, and that is wrong: kept shallow it is very hard for anybody to speed up ([PlayPickleball](https://www.playpickleball.com/pickleball-dinking-master-class-with-drills/)), and a flat dink that lands where you wanted it is simply a good dink ([Better Pickleball](https://betterpickleball.com/think-you-need-to-add-spin-to-your-dink-strategy-think-again/)).

  The reset, sometimes called the defensive dink, is the one that saves your afternoon. Set your feet first, open the paddle face, and use a soft arm and a light grip so the paddle swallows their pace instead of returning it ([Better Pickleball](https://betterpickleball.com/score-more-points-with-this-shot-the-defensive-dink-to-score-points/)).

  ![Five cards describing the cross-court dink, the straight-ahead dink, the dead dink, the pressure dink, and the reset, plus a rule of thumb about taking the ball at the top of its bounce](/studio/pickle-jam/dink-five-types.svg)

  ## Where to aim: a spot, not a person

  Most players dink at their opponent. It feels careful, and it is the single most expensive habit in the soft game.

  Aim at a spot on the court instead, and pick spots outside the range where they can comfortably attack ([Better Pickleball](https://betterpickleball.com/think-you-need-to-add-spin-to-your-dink-strategy-think-again/)). There are four worth memorizing.

  1. **The outside corner, straight ahead.** Close to the sideline and close to the net, which drags them out of position.
  2. **The middle seam.** Underused, and it does something clever: a speed-up out of the middle has to come back through the middle, because a cross-court speed-up from there sails out ([PlayPickleball](https://www.playpickleball.com/pickleball-dinking-master-class-with-drills/)).
  3. **The cross-court corner.** The longest path, the lowest part of the net, and the most margin you will ever get. Aim it close to their sideline and close to the net ([Pickleball Kitchen](https://pickleballkitchen.com/ultimate-guide-dinking-pickleball/)).
  4. **Deep at their feet, on their kitchen line.** A ball landing right at the line makes them choose in a quarter of a second between taking it out of the air and backing up for it, and that choice is where errors come from ([PlayPickleball](https://www.playpickleball.com/pickleball-dinking-master-class-with-drills/)).

  Just do not fall in love with the angles. Players below 4.0 get married to the cross-court dink and go for angle after angle after angle, and every angle you give is an angle you are likely to get back ([PlayPickleball](https://www.playpickleball.com/pickleball-dinking-master-class-with-drills/)).

  ![An overhead view of a pickleball court with four numbered targets in the opponent's kitchen: the outside corner, the middle seam, the cross-court corner, and deep at their feet on the kitchen line](/studio/pickle-jam/dink-target-map.svg)

  ## Out of the air, or let it bounce?

  This is the decision you make most often at the kitchen line, and there is a physical reason it is hard.

  A ball taken out of the air still carries its speed, so it comes off your paddle faster and travels farther. The same ball after a bounce has left a chunk of its energy on the court, which is why the identical swing produces two completely different shots ([Pickleball Kitchen](https://pickleballkitchen.com/ultimate-guide-dinking-pickleball/)).

  So take it out of the air when you can reach it in front of you without leaning in, and hit it softer than feels right. When you cannot, step back and meet it at the very top of its bounce, where it has the least energy left ([Better Pickleball](https://betterpickleball.com/level-up-your-game-with-the-ultimate-dink-technique/)).

  What you must not do is retreat for every ball. Backing off the kitchen line hands them every angle on the court, and reaching so far in that you lose control hands them the smash ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/dinking-in-pickleball-the-shot-that-changes-everything-6-keys-to-success)).

  ![A decision diagram: if you can reach the ball in front of you at a comfortable height without leaning into the kitchen, take it out of the air but softer; if not, let it bounce and meet it at the top of the hop](/studio/pickle-jam/dink-air-or-bounce.svg)

  ## Ten ways the ball goes up, and which one it was

  Almost nobody pops a ball up for a mysterious reason. Watch what the ball did and you will know what you did, which is more useful than a list of things to remember mid-rally.

  1. **It popped straight up off the face.** You squeezed. Get the grip back down to a three or four.
  2. **It flew long, past their kitchen.** You met it behind you, so your body went up with the ball.
  3. **It left faster than you meant it to.** There was a backswing in there you did not notice taking.
  4. **It went somewhere you did not aim.** Your wrist steered it.
  5. **You finished stretched out and off balance.** You reached instead of moving. A lunge is a shot you have already lost the right to hit.
  6. **Your hips ended up facing the sideline.** You crossed your feet over, and the paddle face went around with them.
  7. **You lost sight of the ball late.** You bent from the hips, so your eyes went to the floor at the worst moment.
  8. **They keep finding sharper angles on you.** You have drifted back off the kitchen line without noticing.
  9. **It clipped the tape and died.** You were aiming at the net, and the net is not where the ball is supposed to land.
  10. **You sped it up out of nowhere.** You got bored, which is the cause and the fix in one.

  ![Ten symptoms paired with their causes: the ball popping off the face, flying long, leaving too fast, missing the target, leaving you stretched, turning your hips, dropping your eyes, opening angles, clipping the tape, and getting sped up out of boredom](/studio/pickle-jam/dink-popup-diagnosis.svg)

  That last one is the one that actually gets you, and it is the one the professionals are best at. Matt Wright, somewhere inside those eighty-five dinks, was keeping track of the fact that it was match point the entire time, because without that awareness a player risks a strategic error at the most critical moment of the match ([PPA Tour](https://ppatour.com/97-shots-an-inside-look-at-a-mesmerizing-rally-on-championship-point/)).

  Selkirk's version is plainer: walk out there thinking you could dink all day if that is what they want, and wait for the ball that comes up ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/dinking-in-pickleball-the-shot-that-changes-everything-6-keys-to-success)). Dot's is shorter still. She decided she was not going to be the one who got tired of it first.

  ## Where good coaches disagree

  Most dink advice is unanimous, which makes the three places it splits worth knowing about.

  **The wrist.** Selkirk and The Dink both say push from the shoulder and keep the wrist firm, while Pickleheads describes using the wrist and forearm together with very little shoulder ([Pickleheads](https://www.pickleheads.com/guides/what-is-a-dink-in-pickleball)). If your problem is pop-ups, quiet the wrist first, because the wrist is the joint most likely to add height you did not ask for.

  **Spin.** Pickleball.com puts spin at number nine on its list of dink fundamentals and calls it a bonus rather than a crutch, for players who are already consistent ([Pickleball.com](https://pickleball.com/learn/the-top-10-fundamentals-needed-for-a-great-dink)). CJ Johnson goes further and argues that rolling and cutting every ball is actively costing recreational players points ([Better Pickleball](https://betterpickleball.com/think-you-need-to-add-spin-to-your-dink-strategy-think-again/)). Both agree on the practical version: reach for spin deliberately, never out of habit.

  **How much room over the net.** Pickleball.com's fundamentals say the ideal dink clears the net by just a few inches ([Pickleball.com](https://pickleball.com/learn/the-top-10-fundamentals-needed-for-a-great-dink)), while CJ Johnson grants that a lower ball really is harder to attack and says the players who chase the tape end up buying errors for it, so they should take a comfortable clearance instead ([Better Pickleball](https://betterpickleball.com/think-you-need-to-add-spin-to-your-dink-strategy-think-again/)).

  Both are after the same unattackable ball and disagree about where to spend your risk. Spend it wherever you are losing more points: on margin if you keep finding the net, on height if you keep getting attacked.

  ![Three coaching disagreements set side by side with a practical rule for each: the wrist, spin, and how much room to leave over the net](/studio/pickle-jam/dink-coaches-disagree.svg)

  ## Four drills that fix a dink

  Twenty minutes of these beats two hours of games, because a game will not give you the same shot twice.

  - **Protect the castle.** Put a marker on the court in front of each of you and dink to hit theirs while defending yours. It drills contact out front, a compact swing, and holding the line, all at once ([The Dink](https://www.thedinkpickleball.com/pickleball-dinking-technique-the-complete-beginners-guide/)).
  - **The figure eight.** You hit only diagonal, your partner hits only straight, and the ball traces a figure eight around the court. It is built for the player working on their middle dink ([PlayPickleball](https://www.playpickleball.com/pickleball-dinking-master-class-with-drills/)).
  - **Twenty in a row.** No targets, no winners, just twenty consecutive dinks that stay in the kitchen ([Pickleball.com](https://pickleball.com/learn/the-top-10-fundamentals-needed-for-a-great-dink)).
  - **Outside foot, inside foot.** Alternate between your partner's outside foot and inside foot, to practice moving somebody without handing them an angle ([PlayPickleball](https://www.playpickleball.com/pickleball-dinking-master-class-with-drills/)).

  ## The bottom line

  The soft game is where the score actually gets decided, quietly, by whoever is willing to give the other team nothing for one more shot than feels reasonable.

  So stop trying to hit a nice dink. Pick a spot in their kitchen, take the energy out of your hands and your swing, and get the ball there under the tape.

  Go do twenty in a row before your next game. Not fifty, not an hour, just twenty consecutive dinks that stay in the kitchen.

  Back in Mesa, Matt and Riley saved that championship point, and the Johns brothers went on to win the game anyway, 14-12 ([PPA Tour](https://ppatour.com/97-shots-an-inside-look-at-a-mesmerizing-rally-on-championship-point/)). Eighty-five dinks, four of the best players alive, and not one of them missed.

  On the broadcast, Dave Fleming said the only sensible thing there was to say: "That's why you need to practice your dinks at home."

  Dot practices hers on Monday mornings, on a court with a crack running through the left service box that everybody has agreed to ignore. She is still not the biggest hitter out there. She is just, reliably, the last one still willing to hit one more.
