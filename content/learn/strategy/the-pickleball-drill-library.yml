faq:
- question: How long should I drill before playing games?
  answer: Even fifteen to twenty focused minutes before you play makes a real difference, and it beats an extra hour of casual games for improving a specific shot. Consistency matters more than length.
- question: Can I really practice pickleball alone?
  answer: Yes, and it is one of the fastest ways to improve. A wall, a ball, and thirty minutes let you groove serves, drops, dinks, and volleys with nobody else needed.
- question: What is the single most valuable drill?
  answer: If you can only do one partner drill, do the slinky, because it trains the drop, the reset, the footwork, and the patience of the whole transition game at once.
- question: How do I know which drill I need?
  answer: Play a few games and watch for the shot that keeps ending points badly for you. Whatever that shot is, its section above holds your drill.
- question: Do I need a partner to drill?
  answer: No. Wall drills, target serving, footwork patterns, and shadow swings are all solo, and a ball machine can stand in for a partner if you have access to one.
- question: How many reps until a shot sticks?
  answer: 'There is no magic number, but chase a count you can repeat: 25 dinks in a row against a wall, or 40 of 50 drops on target, is a session worth showing up for.'
- question: Isn't just playing more games enough?
  answer: Games find your weaknesses; they do not fix them, because you hit your worst shot only a handful of times and never twice the same way. Drilling gives you the fifty controlled reps a game never will.
body: |
  There is a man at my Wednesday morning game I will call Sal, and for one entire year Sal played three mornings a week and did not get any better.

  He was not lazy. He hustled, he sweated, he wanted it badly. He just kept losing the same point over and over: his third shot floated up, somebody smashed it, and Sal jogged back to serve again, a little more baffled each time.

  Then a woman on the far court told him to stop playing for twenty minutes and hit nothing but soft drops into an empty kitchen. Six weeks later Sal was beating people who used to feed him for lunch. He had not gotten stronger or younger. He had drilled the one shot that kept losing him the point.

  This is the library of those drills, sorted by the skill each one fixes and the level you are playing at, so you can find yours by Wednesday.

  ## The short answer

  Games show you what is broken. Drilling is the only place you fix it. So find the one shot that keeps losing you the point, and drill that shot on purpose until it stops.

  Everything below is that single idea, organized. Pick your weakest link (the dink, the drop, the reset, the volley, the serve, or your own feet), go to its section, and steal the drill.

  > **The one idea to keep:** You do not get better by playing more pickleball. You get better by drilling the one shot that keeps losing you the point.

  ## Why twenty minutes of drilling beats two hours of playing

  Here is the uncomfortable part, and every coach already knows it. A rec game is a wonderful time and a terrible classroom.

  In an hour of games you might hit your weakest shot four times, always from a slightly different spot, always with the score rattling around in your head, and then it is somebody else's turn. Your bad shot never gets isolated, so it never gets fixed. It just gets quietly buried in the fun.

  Drilling flips that. You hit the one shot fifty times in a row, same spot, no score, until your hand learns it without asking your brain first. The Dink says it plainly: fifteen to thirty minutes of focused solo work beats an hour of unfocused rallying every time ([The Dink](https://www.thedinkpickleball.com/how-to-practice-pickleball-alone-7-solo-drills/)).

  Pickleheads, whose drill guide runs from raw beginner to advanced, says the same thing in gentler words: good drills turbo-boost your skills much faster than practice play does ([Pickleheads](https://www.pickleheads.com/guides/pickleball-drills)). Open play is where you find the leak. Drilling is the only place you patch it.

  ![A two-panel comparison: two hours of rec play where the weak shot is hit only a few times and the leak stays, versus twenty minutes of drilling where the same shot is hit fifty times at a target and the leak is fixed](/studio/pickle-jam/drilling-beats-playing.svg)

  > **The reframe:** Stop counting how many games you played this week. Start counting how many reps of your worst shot you got.

  ## How to use this library

  Three steps, and the first one is the whole game.

  1. **Find your leak.** Play a few games and notice the shot that keeps ending points badly for you. That is the one. It is almost always the drop, the reset, or a panicked hand at the net.
  2. **Pick one drill for it.** Go to that skill's section below and choose a single drill. Just one. A library is only useful if you check out one book at a time.
  3. **Drill it with a target and a number.** A cone, a towel, a chalk line, and a count you are chasing. No target means no feedback, and no feedback means you are only hitting, not practicing.

  ![A map of the drill library laid out as seven skill cards, each naming the skill, the leak it fixes, and a drill for it, under the rule to find your leak and pick its drill](/studio/pickle-jam/the-drill-library-map.svg)

  If you want a running start, here are ten drills worth stealing first, one per common leak. Each one has a full home in the sections below.

  1. Straight-ahead dinks, for touch.
  2. The figure 8, for dinking while you move.
  3. The 100-ball dink rally, for patience.
  4. Baseline third shot drops, for the walk to the net.
  5. Wall drops, for when you have no partner.
  6. The slinky, for the whole transition at once.
  7. Midcourt resets, for surviving a firefight.
  8. Dead-dink hands, for winning one.
  9. Serve to a target, for free points.
  10. Wall dinking, for any spare half hour.

  ## Dinking drills: win the kitchen

  The dink is the softest shot in the sport and the one that wins the most games. It is a push and a lift, not a swing, dropped just over the net into the seven-foot no-volley zone the rulebook calls the kitchen ([USA Pickleball](https://usapickleball.org/pickleball-skills/level-one/how-to-play-pickleball/)). Here is how you build one.

  - **Straight-ahead dinks.** Stand at the kitchen line across from a partner and trade soft dinks into the zone, no attacking allowed, for five honest minutes ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/an-easy-practice-drill-routine-to-level-up-your-pickleball-game)). The goal is boredom: land every single one.
  - **Crosscourt dinks, forehand then backhand.** Slide to the diagonal and do the same, five minutes each side, mixing them wide, at the body, and at the back foot ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/an-easy-practice-drill-routine-to-level-up-your-pickleball-game)). Crosscourt is where most real dink rallies actually live.
  - **Triangle dinking.** Set three targets around your partner (left, middle, right) and dink to each in turn, so you learn to move the ball instead of feeding the same spot forever ([Pickleheads](https://www.pickleheads.com/guides/pickleball-drills)). Predictable dinks get attacked.
  - **The figure 8.** One of you hits every ball down the line while the other hits every ball crosscourt, and the ball traces a figure eight you have to move your feet to keep ([PrimeTime Pickleball](https://primetimepickleball.com/how-to-increase-your-dink-control-consistency-figure-8-pickleball-dinking-drill/)). It builds touch and feel while you are moving, which is the version you actually need in a game.
  - **The 100-ball dink rally.** Count consecutive dinks with a partner, straight or crosscourt, restarting at zero on any miss, and try to reach 100. Most recreational players cannot get past 30 before someone pops one up ([The Dink](https://www.thedinkpickleball.com/5-pickleball-drills-a-ppa-pro-still-uses-every-practice/)). That number is an honest measure of exactly how much room you have to grow.

  ![A top-down pickleball court diagram showing two players at the kitchen line, one always hitting crosscourt and one always down the line, with arrows tracing a figure-eight ball path across the net](/studio/pickle-jam/figure-8-dink-drill.svg)

  ## Third shot drop drills: earn your walk to the net

  The third shot drop is a long dink from the back of the court that lands soft in the kitchen. It is the shot that buys you the walk from the baseline up to the net, which is the only place points are reliably won.

  - **Baseline drops to a partner.** One player stands at the kitchen line and feeds; the other stands at the baseline and drops shot after shot into the zone, then you switch ([Pickleheads](https://www.pickleheads.com/guides/pickleball-drills)). It is pure repetition, and repetition is the entire point.
  - **Crosscourt drops.** Do the same on the diagonal, forehand side then backhand side, five minutes each, resisting the urge to swat it when it hangs up ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/an-easy-practice-drill-routine-to-level-up-your-pickleball-game)). The crosscourt drop travels over the lowest part of the net and has the most room to land.
  - **Wall drops.** No partner? Drop-feed a ball at an imaginary baseline, let it bounce, and lift it at a net-height line on a wall so it peaks and falls. Aim for at least fifty a session ([The Dink](https://www.thedinkpickleball.com/how-to-practice-pickleball-alone-7-solo-drills/)). A wall gives you the reps a partner runs out of patience for.

  > **Why it matters:** A good drop forces the other team to hit up instead of down. Every soft shot in pickleball is really trying to do that one job.

  ## Reset and transition drills: the slinky

  The transition zone, that stretch of no-man's-land between the baseline and the kitchen, is where most games are quietly lost. A reset is a soft drop you hit while you are caught out there and under fire, taking the pace off so the ball dies in the kitchen and you get to keep walking forward.

  - **Midcourt resets.** Stand in the transition zone while a partner at the kitchen line hits firm balls at your feet and chest, and block each one softly back into the kitchen with a loose grip so the paddle absorbs the pace ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/an-easy-practice-drill-routine-to-level-up-your-pickleball-game)). Do not move up until the resets start landing.
  - **The slinky.** One player starts at the net and the other at the baseline, and the baseline player uses drops and resets to slowly walk all the way in, then you swap roles and stretch back out, over and over. Give it fifteen to twenty minutes, because the real skill is decision-making while your feet are moving ([The Dink](https://www.thedinkpickleball.com/5-pickleball-drills-a-ppa-pro-still-uses-every-practice/)).

  ![A pickleball court diagram showing one player advancing from the baseline through the transition zone to the kitchen line using drops and resets, while a partner feeds from the far kitchen line](/studio/pickle-jam/the-slinky-drill.svg)

  The slinky is the closest thing to a single drill that trains the whole soft game at once: the drop, the reset, the footwork, and the patience, all in one. If you only ever have time for one partner drill, make it this one.

  ## Volley and hands drills: win the firefight

  When everyone is at the net and the ball speeds up, the point becomes a hands battle. The good news is that hands are trainable, same as anything else.

  - **Volley battle.** Stand a few feet apart at the net and volley back and forth without letting the ball bounce, paddle up, swing compact ([Pickleheads](https://www.pickleheads.com/guides/pickleball-drills)). Start slow and speed it up only as fast as you can hold it together.
  - **Dead-dink hands.** Dink softly until someone feeds a slightly high, dead dink, then whoever gets it speeds it up and you play out the fast exchange to the point. Keep score, because this is the drill that separates the players who flinch from the players who counter ([The Dink](https://www.thedinkpickleball.com/5-pickleball-drills-a-ppa-pro-still-uses-every-practice/)).
  - **Wall volleys.** Alone, stand six to eight feet from a wall and volley continuously: sixty seconds forehand, sixty backhand, then alternating, edging closer as your hands wake up ([The Dink](https://www.thedinkpickleball.com/how-to-practice-pickleball-alone-7-solo-drills/)).

  ## Serve and return drills: the free points

  The serve and the return are the two shots you hit the exact same way on every single point, which makes them the easiest free points in the game to drill.

  - **Serve to a target.** Put a cone or a towel in the back third of each service box and serve to it: twenty to your weak side, twenty to your strong side, twenty alternating, tracking how many you hit ([The Dink](https://www.thedinkpickleball.com/how-to-practice-pickleball-alone-7-solo-drills/)). A serve that lands deep steals time from the returner.
  - **Deep return practice.** Shadow your split-step and return stance, then feed yourself balls and groove a controlled, deep return from a few spots along the baseline, keeping the footwork honest and the swing simple ([The Dink](https://www.thedinkpickleball.com/how-to-practice-pickleball-alone-7-solo-drills/)). A deep return is the most underrated shot in the sport: it pins the serving team behind their own baseline and keeps them out of the kitchen.
  - **Serving accuracy, solo.** Set a few targets across the net and hit the same serve at them again and again until the motion no longer needs your attention ([Pickleheads](https://www.pickleheads.com/guides/pickleball-drills)). The repetition is the whole skill.

  ## Footwork and solo drills: no partner required

  The best players are not the ones swinging hardest. They are the ones who arrived at the ball early and balanced, which is feet, and feet drill just fine alone.

  - **Side-to-side shuffle.** Mark two lines a few feet apart and shuffle between them, staying low, knees bent, weight on the balls of your feet ([Pickleheads](https://www.pickleheads.com/guides/pickleball-drills)). Never cross your feet.
  - **Figure-8 footwork.** Set two cones near the kitchen line and move a figure eight between them, facing the net and shadow-swinging at the middle, two minutes on and one off, three rounds ([The Dink](https://www.thedinkpickleball.com/how-to-practice-pickleball-alone-7-solo-drills/)).
  - **Wall dinking.** Stand about seven feet from a wall (roughly a kitchen's depth) and dink against a line on it, alternating forehand and backhand, chasing 25 in a row before you let yourself stop ([The Dink](https://www.thedinkpickleball.com/how-to-practice-pickleball-alone-7-solo-drills/)). A wall never misses and never gets tired of you.
  - **Shadow swings.** Swing your forehand and backhand with no ball at all, in front of a mirror if you can stand the sight, grooving the plain shape of the stroke ([Pickleheads](https://www.pickleheads.com/guides/pickleball-drills)). It feels a little silly, and it works.

  ## Which drills to start with, by level

  You do not need every drill in the library. You need the two or three that fix where your game actually is right now.

  | Where you are | The leak to fix first | Drill it with |
  |---|---|---|
  | Brand new, learning the rules | Clean contact and basic control | Paddle-up, wall dinking, straight-ahead dinks |
  | Improving, rallies hold up | The third shot drop and dink direction | Baseline drops, triangle dinking, the figure 8 |
  | Solid, holding your own | Resets and hands at the net | The slinky, midcourt resets, dead-dink hands |
  | Advanced, chasing consistency | Control under pressure and on the move | 100-ball dink rally, crosscourt drops, figure-8 footwork |

  The levels above track the way most coaches group drills, from a beginner's paddle-up to an advanced player's moving dink rally ([Pickleheads](https://www.pickleheads.com/guides/pickleball-drills)). Treat the rows as a rough map, not a verdict on your worth as a human being.

  ## How to run a drill session

  Give a session a shape and it will do more in forty-five minutes than a month of drifting around the court.

  A clean template, borrowed from a coach's routine, splits forty-five minutes into three fifteen-minute blocks: dinks, then resets, then drops, each done straight-ahead and then crosscourt on both sides ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/an-easy-practice-drill-routine-to-level-up-your-pickleball-game)). Warm your hands up with a few easy dinks first, and finish with a handful of live points so the new shot meets real speed before you leave.

  ![A timeline of a forty-five-minute drill session: a short warm-up, then fifteen-minute blocks of dinks, resets, and drops, then a few live points, with three rules underneath](/studio/pickle-jam/run-a-drill-session.svg)

  - Pick a number to chase in every block (25 in a row, or 40 of 50 on target) so you can tell if you improved.
  - Change one thing per session, not five. One grip cue, one target, one shot.
  - End on a make, not a miss, so your hand walks away remembering the good one.

  ## Common mistakes that waste your drilling

  Most wasted drilling comes down to the same five habits. Fix these and the reps finally start paying you back.

  - **Only drilling what you are already good at.** It is more fun and it teaches you nothing. Drill the shot you secretly hate.
  - **Drilling with no target.** Dinking "over there" is not practice; dinking at a towel is. A target is what turns hitting into feedback.
  - **Drilling at game speed.** Fast reps groove sloppy mechanics. Slow down until it is clean, then add the pace back.
  - **Turning the drill into a match.** The moment you start trying to win, you abandon the weak shot and retreat to your safe one. Cooperate first, compete later.
  - **Never keeping a count.** Without a number you cannot tell a good day from a bad one, and you will quit the drill right as it was starting to work.

  ## The bottom line

  Sal did not get better because he found a magic paddle or a secret grip. He got better because he stopped hoping his third shot would repair itself mid-game and started dropping fifty of them into an empty kitchen before anyone else showed up.

  That is the whole library in one sentence: the shot that keeps losing you the point will not fix itself while you are busy keeping score. Pick it, drill it, count your reps, and let the games be the place you enjoy the results instead of the place you keep trying to make the repair.

  So find your one shot this week. Go to its section, steal its drill, and give it twenty honest minutes. The pop-pop-pop of a clean rally is out there waiting for you, and it sounds even sweeter when the clean shot is finally yours.
