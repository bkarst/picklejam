keyTakeaways:
- You do not win pickleball by hitting hard. You win by making the other team hit the ball up.
- Every tactic (get to the kitchen line, drop the third shot, dink, go middle, be patient) is that one idea in a different outfit.
- The net sags to 34 inches in the exact middle nobody aims at, two full inches lower than the sidelines.
- Roughly 28 to 40 percent of points are unforced errors, and the team that makes fewer of them wins about 70 percent of the time.
faq:
- question: What is the most important pickleball strategy for a beginner?
  answer: Get to the kitchen line and stop trying to hit winners. Keep the ball in play, keep it low, and let the other team make the six mistakes they are statistically going to make anyway.
- question: Should I ever hit the ball hard?
  answer: 'Yes, when they hand you a ball above the height of the net. That is the entire permission slip: if it is above the tape, drive it; if it is below the tape, lift it softly and wait for the next one.'
- question: Why do I keep losing to players who are slower than me?
  answer: Because they are making you hit up and you are letting them. Speed does not help you when the ball is below the net, and that is where patient players will keep putting it.
- question: Where should I aim in doubles?
  answer: The middle, far more often than feels natural. The net is two inches lower there, there is more room to miss, and the ball lands between two people who both have to decide whose it is.
- question: Do I really need a third shot drop?
  answer: 'Yes, and here is the encouraging part: hardly anyone has a good one. More than half of the drops hit by strong players fly too long, so even a mediocre drop puts you ahead of the room.'
- question: How do I beat a banger?
  answer: Do not trade punches. Keep the ball low so there is nothing to drive, make them move side to side, stay glued to your partner, and wait for the error that their whole style guarantees.
- question: Should I lob?
  answer: Sparingly, and almost never from the baseline when you are scrambling. A lob over a player who is leaning into the kitchen line is a legitimate weapon; a lob thrown up in a panic is a donation.
- question: How long before this works?
  answer: 'Faster than you think, because you are not learning a new skill. You are subtracting one: the swing you did not need to take.'
body: |
  The hardest hitter at my Tuesday morning game is a former college tennis player with a forearm like a boat rope. I will call him Danny. Danny loses.

  He loses to a woman I will call Ruth, who is sixty-eight, who has never hit a ball hard in her life, and who beats him about nine times out of ten while apologizing for it.

  Danny has asked me to explain this. He hits the ball twice as hard as Ruth and loses to her twice as often, and to him that is a clerical error, something the universe will get around to fixing.

  It will not. Ruth is not lucky, and she is not sandbagging.

  Pickleball rewards the player who makes the other team hit the ball up, not the player who hits it hardest. Ruth worked that out years ago. Here is how she does it, and how you can steal it from her by Tuesday.

  ## The short answer

  Pickleball strategy is one idea wearing many hats: make the other team hit the ball **up**, and refuse to hit it up yourself. Every tactic you have been yelled at about (get to the kitchen line, drop your third shot, dink, go down the middle, be patient) is that one idea in a different outfit.

  Whoever has to hit up is losing the point. Whoever gets to hit down is winning it. Power changes nothing about who is doing which.

  > **The one idea to keep:** You do not win pickleball by hitting the ball hard. You win it by making the other team hit the ball up.

  ## The sport was built so power would lose

  Here is the part almost nobody tells you, and it is the reason Ruth wins. Pickleball's rulebook is rigged against Danny. Not by accident, and not gently.

  Start with the two-bounce rule. After the serve, the ball has to bounce once on each side before anybody is allowed to volley, and USA Pickleball says the plain purpose of it is that it "reduces the advantage of powerful serves" and stretches the rally out ([USA Pickleball](https://usapickleball.org/what-is-pickleball/)). The governing body's own rules summary puts it even more bluntly: the rule exists to eliminate the serve-and-volley advantage ([USA Pickleball](https://usapickleball.org/rules/summary/)).

  Read that again. The first thing that happens in every single point is a rule whose entire job is to take away the reward for hitting hard.

  Then there is the kitchen, the seven-foot no-volley zone on both sides of the net. You may not volley a ball while any part of you is touching it, and the reason is explicit: it stops players from parking at the net and smashing everything downward ([USA Pickleball](https://usapickleball.org/rules/summary/)). The one spot on the court where raw power would be unstoppable is the one spot you are not allowed to use it from.

  So the sport takes away your big serve, then takes away your smash zone, and hands you a court twenty feet wide where your opponent barely has to move. Pickleheads, whose guide runs through thirteen separate tactics, gets to the same place: the game "is not about brute force," and the small court and the slow ball make placement matter more than being able to hit hard or run fast ([Pickleheads](https://www.pickleheads.com/guides/pickleball-strategy)).

  Danny's arm is a genuine gift. He is just spending it on a game that was built, on purpose, to reward something else.

  ## Every point asks one question

  Once you know the rules are anti-power, the strategy falls out of the geometry, and the geometry is this: there is a net in the way, and it is a little under three feet tall.

  If the ball is above the top of the net when you make contact, you can drive it downward and there is nothing anybody can do about it. If the ball is below the top of the net when you make contact, you have to lift it just to get it over, and now it is arriving at your opponent from underneath, floating, slow, and begging to be hit.

  That is the whole sport. Every rally is a negotiation about which of you has to do the lifting.

  ![Two side-view panels: on the left, a ball contacted above the net tape lets you hit down and attack; on the right, a ball contacted below the tape forces you to lift it up and defend](/studio/pickle-jam/who-has-to-hit-up.svg)

  The Dink, in its own guide to beating players who are better than you, defines the third shot drop as a soft arc into the kitchen that forces opponents "to hit up instead of attacking down" ([The Dink](https://www.thedinkpickleball.com/how-to-beat-a-higher-rated-pickleball-player/)). That phrase is not just about one shot. It is the job description for every shot worth hitting.

  > **The reframe:** Stop asking "how do I win this point?" Start asking "who is going to have to hit up first?" It is the same question, and the second one you can actually answer.

  This is also why speed backfires against good players. The Dink's advice to underdogs is to take pace off, because a higher-rated player generates, absorbs, and redirects pace better than you can, so hitting hard at them is volunteering for the one contest you are guaranteed to lose ([The Dink](https://www.thedinkpickleball.com/how-to-beat-a-higher-rated-pickleball-player/)).

  Danny's drives are not scary to Ruth. They are just the ball, arriving sooner.

  ## The five shots that make them hit up

  None of these are trick shots. Ruth hits all five, badly, at about eleven miles an hour, and it is plenty.

  ![Five numbered rows listing the deep serve, deep return, third shot drop, dink, and reset, when to hit each one, and what each does to the other team](/studio/pickle-jam/five-shots-that-make-them-hit-up.svg)

  1. **The deep serve.** Push them back behind their own baseline so their return has to travel farther and they have less time to move up ([Pickleheads](https://www.pickleheads.com/guides/pickleball-strategy)).
  2. **The deep return.** The most underrated shot in the sport. A high, deep return keeps the serving team pinned at the back and stops them from getting to the kitchen line, which is exactly where they want to be ([Pickleheads](https://www.pickleheads.com/guides/pickleball-strategy)).
  3. **The third shot drop.** A soft arc from the back of the court that lands in their kitchen, so they cannot attack it and you get to walk forward while they wait ([The Dink](https://www.thedinkpickleball.com/how-to-beat-a-higher-rated-pickleball-player/)).
  4. **The dink.** A soft shot that clears the net by inches and lands in their kitchen. It is unattackable by design, and it is where patience gets paid.
  5. **The reset.** A drop hit when the point has already gone sideways. Selkirk describes a reset as simply a third shot drop performed at the moment you have lost control, and notes that two of them in a row will usually walk you back to the net ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/3-keys-to-resetting-a-point-in-pickleball)).

  | Shot | You hit it when | What it does to them | How players blow it |
  | --- | --- | --- | --- |
  | Deep serve | Starting the point | Pins them behind the baseline | Aiming for lines and missing |
  | Deep return | They just served | Keeps them out of the kitchen | Hitting it short and inviting them in |
  | Third shot drop | You are back, they are up | Forces them to hit up | Hitting it long, so it is attackable |
  | Dink | Both teams are at the net | Gives them nothing to hit | Getting bored and speeding it up |
  | Reset | You are losing the point | Buys back the net | Panicking and swinging harder |

  The drop is the one worth practicing, and the numbers on it are lopsided. In one hand count of competitive games, the winning team hit the majority of the successful drop shots 73 percent of the time in one sample and about 90 percent of the time in another ([A Pickleball Life](https://applecountrypickleball.blogspot.com/2016/02/pickleball-statistical-analysis-drop.html)).

  It is also genuinely hard, which is the good news. That same count found roughly 16 percent of attempted drops fault outright, and more than half of the drops hit by strong players sail too long and become attackable ([A Pickleball Life](https://applecountrypickleball.blogspot.com/2016/02/pickleball-statistical-analysis-drop.html)).

  So hardly anyone hits it well, which means the first afternoon you float even a soft, ugly one into the kitchen, you have quietly moved ahead of most of the court. That is a genuinely lovely thing to find out about yourself on a Tuesday.

  ## Down the middle solves the riddle

  There is an old pickleball rhyme, and unlike most old sports rhymes it happens to be measurably true.

  A regulation net is 36 inches high at the sidelines and 34 inches high at the center ([USA Pickleball](https://usapickleball.org/what-is-pickleball/), [Pickleheads](https://www.pickleheads.com/blog/dimensions-of-a-pickleball-court)). It sags. On purpose.

  So the exact middle of the court, the part nobody aims at because it feels boring, is two full inches easier to clear than the sidelines everybody does aim at.

  ![A front view of a pickleball net showing 36 inches at the sidelines sagging to 34 inches at the center, with the middle marked as the target, and three reasons the tactic works](/studio/pickle-jam/why-the-middle-works.svg)

  Better Pickleball lists three reasons the middle works, and the net height is only the first. The second is that a ball hit into the middle lands between two people, which makes them decide, out loud, in about a third of a second, whose ball it is. The third is that the middle simply has more room to miss into ([Better Pickleball](https://betterpickleball.com/down-the-middle-in-pickleball/)).

  That second one is the assassin. You are not hitting at a player. You are hitting at a relationship.

  Selkirk's tournament advice is the same, and it gets more pointed the harder your opponents are swinging: get the ball in the middle, especially against aggressive teams, and dink middle, drive middle, and drop middle ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/11-tournament-tips-to-get-you-ready-for-pickleball-gold)). The Dink adds that a ball at the hip of the weaker player in the middle creates instant confusion ([The Dink](https://www.thedinkpickleball.com/how-to-beat-a-higher-rated-pickleball-player/)).

  Ruth aims at the middle almost every single time. Danny goes for the lines, because the lines are where the highlight lives, and honestly, I get it, the highlight is a wonderful feeling. Ruth just decided a long time ago that she would rather have the point.

  ## The fight is over seven feet

  Here is where new players get the geography wrong. They think the point is a fight over the ball. It is a fight over a piece of ground: the seven-foot kitchen line.

  At that line, balls arrive at you before they have had time to drop, so you get to hit down. Stuck at your baseline, everything reaches you late and low, so you have to hit up. Same players, same paddles, completely different game, decided entirely by where your feet are.

  ![A top-down view of a pickleball court with one team standing at their kitchen line and the other stranded at their baseline with no man's land to cross](/studio/pickle-jam/the-fight-for-the-line.svg)

  The counts on this are brutal. In the same study of competitive play, teams that took a cautious approach to moving up while serving lost to comparable opponents about 90 percent of the time, and no cautious-approach team in the sample reached the medal rounds at all ([A Pickleball Life](https://applecountrypickleball.blogspot.com/2016/02/pickleball-statistical-analysis-getting.html)).

  The trap in between is real, and it has a name. No man's land is the stretch between the kitchen line and the baseline, where you are too far up to hit groundstrokes comfortably and too far back to volley. You should only ever be there on your way somewhere else ([Pickleheads](https://www.pickleheads.com/guides/pickleball-strategy)).

  And when you do get pushed back, go together. Selkirk's blunt line on retreating is that leaving one partner up and one back is target practice ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/3-keys-to-resetting-a-point-in-pickleball)).

  When you and your partner move as one, there is simply no gap to aim at, and there is a real quiet joy in that, two people covering a court like they somehow share the same nervous system.

  ## The points you are already being handed

  Now the part that should genuinely change how you play, because it changed how I play.

  Somebody actually sat down and counted. In a hand count of competitive games, the average game contained about 16 unforced errors, and roughly 6 of a game's points came off them.

  Since most games finish with only 15 to 21 total points scored, that means somewhere between 28 and 40 percent of all points are gifts. Nobody earned them. Somebody just missed ([Gaithersburg Pickleball Club](https://www.gaithersburgpickleballclub.com/blog/pickleball-statistical-analysis-unforced-errors)).

  ![Eighteen dots representing a game's points, six of them marked as donated rather than earned, with three supporting statistics](/studio/pickle-jam/the-points-nobody-earns.svg)

  And the punchline: 70 percent of the time, the winning team is simply the team that made fewer unforced errors ([Gaithersburg Pickleball Club](https://www.gaithersburgpickleballclub.com/blog/pickleball-statistical-analysis-unforced-errors)). The same count found that most players, maybe 85 percent of them, have no idea how much this decides their games.

  > **What this means on Tuesday:** You do not need a weapon. You need to not miss for eleven points while the other team, statistically, misses about six times. That is the strategy. That is Ruth's entire secret.

  The Dink says it in one line: unforced errors are gifts, and you did not lose the point, you donated it ([The Dink](https://www.thedinkpickleball.com/how-to-beat-a-higher-rated-pickleball-player/)).

  Danny does not really lose to Ruth. He loses to the fence, and the net, and his own big-hearted ambition, about six times a game, and Ruth just waits patiently for him to finish doing it.

  ## Six ways players hand the point away

  1. **Hitting every ball hard.** Drives have a place. Being your only idea is not that place ([Pickleheads](https://www.pickleheads.com/guides/pickleball-strategy)).
  2. **Answering pace with pace.** Against a banger, keep it low instead. A low ball cannot be driven well, so blocking and slowing it down beats swinging back ([Pickleheads](https://www.pickleheads.com/guides/pickleball-strategy)).
  3. **Living in no man's land.** Pass through it. Do not move in.
  4. **The short return.** It is an engraved invitation for the serving team to come take the line from you.
  5. **Lobbing from the baseline.** Selkirk calls a baseline lob in a scramble pickleball's version of "the lottery," which is a polite way of saying you will not win it ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/3-keys-to-resetting-a-point-in-pickleball)).
  6. **Getting bored in a dink rally.** The dink rally is not a delay before the point. The dink rally *is* the point, and the first person who gets impatient loses it.

  ## The bottom line

  ![A summary card: make them hit up and do not hit up yourself, with four rules (get to the kitchen line, keep the ball low, aim middle, wait one more shot) and the decision rule for any incoming ball](/studio/pickle-jam/the-whole-strategy-one-card.svg)

  Every tactic in this guide is the same tactic. Make them hit up. Do not hit up yourself.

  Get to the line so the ball reaches you high, keep the ball low so it reaches them at the shoelaces, aim at the middle where the net sags and the confusion lives, and be the more patient of the two of you for about four more shots than feels reasonable.

  You will not look impressive doing this. There is no highlight in a well-struck dink. There is just the score, quietly moving in your direction, and a player across the net swinging harder and harder because it is the only lever they know.

  So the next time somebody rips one past you and grins about it, do not go looking for a bigger swing. Go find the line, get low, and put it back down the middle, softly, one more time than they want you to.

  Danny is still working on it. He has started drilling drops on Thursdays, and he is getting better, and Ruth, who is sixty-eight, tells him so every single week, right before she beats him again.
