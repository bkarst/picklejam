body: |
  Picture a ten-year-old sent north to wait out a hurricane. Her family has fled their Florida home, and they are riding out the storm at her grandparents' place in Pennsylvania. Someone hands her a pickleball paddle, and she starts hitting with her mom.

  That girl was Anna Leigh Waters, and a few years later she would be the most dominant player the sport has ever seen ([PPA Tour](https://ppatour.com/athlete/anna-leigh-waters/)).

  This is the story of how a soccer kid became pickleball's phenom: where her game came from, how she actually plays, the historic deals she has signed, and what you can borrow from all of it for your own Tuesday night. Pull up a chair by the net. This one is a joy.

  ## The short answer

  Anna Leigh Waters is the most dominant player in professional pickleball, and she is still a teenager. She turned pro at 12, the youngest ever, and now sits at world No. 1 in women's singles, doubles, and mixed doubles all at once ([PPA Tour](https://ppatour.com/athlete/anna-leigh-waters/)). Her whole game is built on speed: she attacks early, owns the fastest hands at the net, and helped pioneer the aggressive style the rest of the sport now copies.

  > **The one idea to keep:** Anna Leigh Waters did not just win pickleball. She sped it up, turning a patient dinking game into a fast one, and she started as a kid playing with her mom.

  ## It started with a hurricane and her mom

  Before any of the trophies, there was a kid who wanted to play college soccer. Anna Leigh Waters grew up chasing a ball with her feet, not a plastic one with holes in it, and pickleball was nowhere in the plan ([Wikipedia](https://en.wikipedia.org/wiki/Anna_Leigh_Waters)).

  Then, in 2017, Hurricane Irma pushed the family out of Florida, and they waited out the storm at her grandparents' home in Pennsylvania. That is where her grandfather introduced the family to pickleball, and a ten-year-old Anna Leigh first picked up a paddle and started hitting with her mother, Leigh ([PPA Tour](https://ppatour.com/athlete/anna-leigh-waters/)).

  Here is the part I love. Her mom was not just a warm body across the net. Leigh Waters had played Division I tennis at South Carolina, where both of Anna Leigh's parents were college athletes, and she could actually push her daughter ([Wikipedia](https://en.wikipedia.org/wiki/Anna_Leigh_Waters)).

  So they became a team, and not a metaphorical one. Mother and daughter entered real tournaments together and won them, the only mother-daughter duo in professional pickleball, with Leigh eventually stepping into the role of coach and manager ([Wikipedia](https://en.wikipedia.org/wiki/Anna_Leigh_Waters)).

  That is the quiet engine under this whole story. Before Anna Leigh Waters was a phenom, she was a daughter who found a game she could share with her mom, and the dominance grew out of the joy, not the other way around.

  ## The youngest pro the sport had ever seen

  The climb was almost comically fast. She won a gold medal in her very first tournaments as a kid, and by 2019, at just 12 years old, she claimed her first national title and turned professional ([Wikipedia](https://en.wikipedia.org/wiki/Anna_Leigh_Waters)).

  Read that again: 12 years old. She became the youngest professional pickleball player in the history of the sport, an age when most of us were still losing our gym shoes ([PPA Tour](https://ppatour.com/athlete/anna-leigh-waters/)).

  ![A timeline titled The Rise of a Phenom, tracing Anna Leigh Waters from a 2017 hurricane evacuation when she learned the game with her mom, to turning pro at 12 in 2019, to the first nationally televised pro match in 2022, to her 2026 Franklin and Nike deals, to her spot today as world number one in all three events](/studio/pickle-jam/anna-leigh-waters-timeline.svg)

  The moments kept getting bigger. In 2022 she and her mom played in the first nationally televised professional pickleball match in history, on CBS Sports, a mother and daughter carrying a young sport onto the big stage together ([Wikipedia](https://en.wikipedia.org/wiki/Anna_Leigh_Waters)).

  > **By the numbers (per the [PPA Tour](https://ppatour.com/athlete/anna-leigh-waters/) record books):** World No. 1 in singles, doubles, and mixed doubles at the same time, with 181 gold medals and 39 triple crowns, the most of any player in the sport. Those totals only climb, so treat them as a snapshot and not a ceiling.

  ## How Anna Leigh Waters actually plays

  Ask what makes her different, and the answer is not a single magic shot. It is a speed setting. Waters helped pioneer an aggressive, fast-paced style built on strength and quickness, and the whole sport tilted to catch up ([Wikipedia](https://en.wikipedia.org/wiki/Anna_Leigh_Waters)).

  For years the pro game was a patient one, long soft dinks traded until someone blinked. Waters plays like she is allergic to waiting, taking the ball early and firing it before her opponents are set ([PPA Tour](https://ppatour.com/athlete/anna-leigh-waters/)).

  ![An infographic titled How She Plays, laying out the four habits behind Anna Leigh Waters aggressive game: she speeds the ball up the instant it floats, she wins the hands battle at the net with quick counters, she resets instead of panicking when she is rushed, and she keeps the pressure on from every spot on the court](/studio/pickle-jam/how-anna-leigh-waters-plays.svg)

  But do not mistake fast for reckless. Her aggression is chosen, not sprayed: she speeds the ball up when it floats into her strike zone, and she has the hands to win the frantic net exchanges that her own pace creates.

  The tell is what happens when she gets rushed back. Instead of panicking, she can absorb the pace and reset the point, then wait for the next ball she actually wants. That blend of pressure and poise is why her game is so hard to solve.

  Line up the two styles side by side, and the shift she helped force is easy to see:

  | On this | The patient game | The Anna Leigh game |
  |---|---|---|
  | Tempo | Slow, trade soft dinks | Fast, take time away |
  | The key skill | Touch and patience | Hand speed and nerve |
  | When a ball floats up | Dink it back safely | Speed it up and attack |
  | Who controls the point | Whoever waits longest | Whoever strikes first |

  ## The paddle, the swoosh, and a first for the sport

  Every great player has a tool, and Waters spent most of her rise with one company. She signed with Paddletek in 2018 at just 11 years old, and their partnership ran seven years, spanning almost her entire climb to the top ([Pickleball.com](https://pickleball.com/gear/anna-leigh-waters-paddletek-signal-the-end-of-seven-year-partnership-on-social-media)).

  In 2026 she began a new chapter, signing with Franklin Sports and choosing to compete with new versions of the brand's C45 carbon-fiber paddle while co-designing her own signature line ([Franklin Sports](https://stories.franklinsports.com/alw-chooses-franklin)).

  The bigger statement was the swoosh. Nike signed Waters as its first-ever pickleball athlete, an apparel and footwear deal that made a teenager the face of the brand's entry into the game ([CNBC](https://www.cnbc.com/2026/01/13/nike-anna-leigh-waters-pickleball-deal.html)).

  That is not just a nice payday. Pickleball participation in the United States jumped 311 percent over three years to nearly 20 million players in 2024, and when Nike shows up, it is a sign a backyard pastime has become a real sport ([Sporting Goods Intelligence](https://www.sgieurope.com/brands/nike-signs-world-no-1-pickleball-player/118990.article)).

  ## What you can steal from her game

  The best news about Anna Leigh Waters is that the heart of her game is not a gift you are born with. It is a set of choices, and you can borrow them on any Tuesday night:

  1. **Speed it up when the ball sits up.** If a dink floats above the net, that is your invitation. Take it early instead of politely dinking it back.
  2. **Win the hands battle.** Fast exchanges at the net are a skill, not luck. Drill quick-hands counters with a partner until they stop feeling like chaos.
  3. **Reset instead of panicking.** When the point speeds up on you, soften your hands and put one ball back in play. Live to swing again.
  4. **Play with someone you love.** She started with her mom. Grab a family member or a friend, and the practice stops feeling like practice.
  5. **Start before you feel ready.** She turned pro at 12. You do not need permission or perfect form to begin, only a paddle and a court.

  None of that requires being a teenage prodigy. It just requires showing up and being a little more deliberate, and a little more fearless, than you were last week.

  ## The bottom line

  The best player in pickleball was not handed her game in a box. It was built, and the blueprint is almost sweet in how ordinary it started: a hurricane, a grandparents' house, and a ten-year-old hitting with her mom because it was fun.

  That is the hopeful thing about Anna Leigh Waters. The speed you see on television is not sorcery. It is the will to take the ball early, the hands to survive the scramble, and the nerve to attack when everyone else is waiting.

  So the next time a dink floats up on your side of the net, do the Anna Leigh thing. Do not dink it back out of politeness. Step in, speed it up, and play the fast, fearless game she taught a whole sport to love. You will not be world No. 1 by Thursday. But you will be playing pickleball the way the phenom plays it, and that is a very good place to start.
