keyTakeaways:
- Do not hunt for a channel. Pick a tour, and the tour tells you which screen its matches are on.
- 'Most professional pickleball is free: the APP Tour, MLP and the Champions Series all stream whole days on YouTube.'
- The one paid tier is a few dollars a month, and what big streaming bundles carry for free is the channel, not that app.
- Once you find a stream, watch the feet instead of the ball. That is the part that improves your own game.
faq:
- question: Is there a pickleball TV channel?
  answer: There is, and the confusion is understandable, because the same brand is both a free channel and a paid app. The free version runs around the clock on smart TVs and streaming boxes; the paid tier adds the live courts and the archive.
- question: What is the difference between the PPA, MLP, and the APP?
  answer: The PPA and the APP are both tours of individual pros playing brackets. MLP is the team league, with drafted city rosters and one score built from four games.
- question: Whatever happened to the National Pickleball League?
  answer: It grew up and changed its name. Founded in 2022 with six teams of players over fifty, it is now the MLP Champions Series, running three age divisions.
- question: Is there pro pickleball for players over forty?
  answer: Yes, and it is a whole league rather than a side bracket. The Champions Series runs 40+ Prime, 50+ Champions, and 60+ Masters divisions, and posts its play free on YouTube.
- question: Where do I find out what is on right now?
  answer: Go to the tour's own watch page. Every one of them keeps a live and upcoming list, and that page is always more current than any article, including this one.
- question: Can I watch on my television instead of my phone?
  answer: Yes. The free pickleball channel ships on the major smart TV and streaming platforms, and YouTube is on every television made in the last decade.
- question: What should a beginner watch first?
  answer: A women's or mixed doubles quarterfinal. The rallies are longer, the patterns are more visible, and you will actually be able to follow what is happening.
- question: Why does the schedule feel so hard to keep track of?
  answer: Because four separate organizations run overlapping seasons and each one publishes its own calendar. Pick the one circuit you like most and follow only that, at least to start.
body: |
  Type "pickleball" into your television tonight and it will offer you a fishing show. I have done this. Twice.

  My friend Deb has played three times a week for three years and keeps four paddles in her trunk. She had never seen a single professional point, and not for lack of wanting to. She had been looking for pro pickleball the way you look for football, on a channel, at a time, and it was not there.

  Then somebody turned a phone around on a bench between games, and there it was. Live, in high definition, for nothing. It had been there the whole time.

  Pro pickleball is not a television sport that streams. It is a streaming sport that occasionally rents a television.

  Once you have that, the rest is easy: four circuits, a couple of apps, and one rule that never fails you.

  ## The short answer

  Stop hunting for a channel. Pick a tour, and the tour will tell you the screen.

  Four professional circuits are worth your time, and most of what they play costs nothing. The APP Tour streams entire tournaments on [its YouTube channel](https://www.youtube.com/@TheAPPTour), and Major League Pickleball posts its matches [on YouTube](https://majorleaguepickleball.co/watch/) too.

  The PPA Tour gives away its championship court on the web and charges a few dollars a month for everything else ([PPA Tour](https://ppatour.com/watch/)). The league for older players streams free as well ([Champions Series](https://www.youtube.com/@championsseriespickleball)).

  > **The one idea to keep:** Pro pickleball is not on a channel, it is on a tour. Find the tour and it hands you the screen. Then watch the feet, not the ball, and it starts making you better.

  ## Four circuits and knowing them is the whole trick

  Every frustrated search starts the same way, with a person looking for a channel. A channel does not own a single pickleball match. A tour does, and a tour decides where its matches go.

  The **PPA Tour** is individual pros, week after week, bracket by bracket. Singles, doubles, mixed doubles, the same names climbing the same draws, which is the version of the sport that most resembles tennis.

  **Major League Pickleball**, always MLP, is the team version. Cities own rosters, rosters get drafted, and a single team score comes out of four games in one night: women's doubles, men's doubles, and two mixed. Tie it two-all and they settle it with a singles tiebreaker called the DreamBreaker ([MLP](https://majorleaguepickleball.co/abcs-of-mlp/)).

  Those two used to be rivals and are now the same company. They closed a merger backed by a $75 million investment and kept both brands and both formats intact ([PPA Tour](https://ppatour.com/ppa-tour-and-major-league-pickleball-close-merger/)).

  The **APP Tour** is the second full circuit of individual pros, and it is the most generous with its cameras. It also runs professional and amateur draws at the same events, so the player you land on might be somebody's aunt from Ohio.

  The fourth is the one nobody tells you about, and it might be your favorite. The **MLP Champions Series** started in 2022 as the National Pickleball League with six teams of players over fifty, and it has expanded twice since into three age divisions: 40+ Prime, 50+ Champions, and 60+ Masters ([Champions Series](https://www.champions-series.com/)).

  Deb is fifty-six. There is a division in that league she could technically try out for, which is a fact she has mentioned to me more times than the situation strictly requires.

  Watch it for ten minutes and you will understand why she brings it up. A sixty-two-year-old holding the kitchen line through a hand battle is a genuinely different kind of thrill from a twenty-year-old ending a point with one swing.

  | Circuit | What you are watching | Where it lives | What it costs |
  | --- | --- | --- | --- |
  | PPA Tour | Individual pros, bracket by bracket | The sport's own subscription network, one court free on the web | $0 for the championship court, a few dollars a month for the rest |
  | MLP | Drafted city teams, one score from four games | Same home as the PPA, plus its own YouTube channel | $0 on YouTube |
  | APP Tour | A second full tour, pros and amateurs together | Its own YouTube channel, whole days start to finish | $0 |
  | MLP Champions Series | Team play in 40+, 50+ and 60+ divisions | Its own YouTube channel, plus a broadcast deal | $0 on YouTube |

  ![Four columns comparing the PPA Tour, MLP, the APP Tour and the MLP Champions Series: what each one is, where it lives, and what it costs, under the heading Follow the tour not the channel](/studio/pickle-jam/watch-follow-the-tour.svg)

  One honest wrinkle, and it actually proves the point. Three of those four now sit under or beside a single company, since the Champions Series partnered with MLP too ([Champions Series](https://www.champions-series.com/)). Ownership keeps consolidating, brands keep merging, and the tours themselves keep right on running under their own names.

  ## The free tier is the big one

  Deb assumed for three years that she was locked out of something. She was not, and neither are you.

  The APP Tour puts entire tournament days on YouTube, live, behind nothing. Cameras rolling straight through the changeovers, the rain delays, and the long stretches where nothing much happens.

  Nine straight hours of championship court in one sitting, still parked on [the APPTV channel](https://www.youtube.com/@TheAPPTour) afterward for anyone who wants to scrub back through it.

  MLP does the same with its matches ([Major League Pickleball](https://majorleaguepickleball.co/watch/)), and the Champions Series posts full days from its events on [its own channel](https://www.youtube.com/@championsseriespickleball), some of them running past nine hours as well.

  Even the PPA, the one tour that does charge, gives its championship court away. The address for that is pickleballtv.com, where the day's featured court plays in front of the paywall with no account and no card ([PPA Tour](https://ppatour.com/watch/)). The same brand also runs a free around-the-clock channel that ships on smart TVs and streaming boxes ([Tennis.com](https://www.tennis.com/news/articles/tennis-channel-united-pickleball-association-launch-pickleballtv-app)).

  Add it up and a person can follow this sport for years without ever entering a card number.

  ![Two panels compared side by side, one listing seven things a viewer gets for zero dollars and a smaller one listing the three things a subscription adds, under the heading The free tier is the big one](/studio/pickle-jam/watch-free-vs-paid.svg)

  ## What the subscription actually buys

  The sport's dedicated network is a joint venture between Tennis Channel and the company that now owns both the PPA and MLP. Paying unlocks the other courts, thousands of finished matches on demand, and the genuinely delightful ability to watch up to six courts at once on a single screen ([PPA Tour](https://ppatour.com/watch/)).

  That last one is the feature that converts people. Big tournaments run many courts at once, and the good stuff is very often two courts over from the one a broadcast director picked.

  I know a man named Russ who refused on principle to pay for anything on the internet for two solid years. Then he put six courts on his living room television during a tournament weekend, found a qualifier on court five who no broadcast would ever have cut to, and spent the next month telling everyone at our club about her.

  Before you go looking for it in a bundle, though, know which thing is bundled. Several big streaming services carry the free around-the-clock channel at no extra cost, which is a nice perk and is not the same as the paid app ([Tennis.com](https://www.tennis.com/news/articles/tennis-channel-united-pickleball-association-launch-pickleballtv-app)).

  > **Check this part before you assume, because this part changes:** the full subscription has run about $5.99 a month or $59.99 a year with a 30-day trial ([Tennis.com](https://www.tennis.com/news/articles/tennis-channel-united-pickleball-association-launch-pickleballtv-app)). Prices, tiers, and carriers all get renegotiated. The tour's own watch page is always the current answer.

  ## When pickleball rents a television

  Real television has not ignored this sport. It just visits it, in windows, a few days at a time.

  The APP has put its events on national sports networks, with live match windows, recap telecasts, and hundreds of hours of streaming alongside them ([APP](https://www.theapp.global/news/app-announces-historic-broadcast-deals-with-cbs-sports-and-espn)). Prime Video has held exclusive global streaming rights to four PPA Tour events a year under a multiyear deal ([PPA Tour](https://ppatour.com/prime-video-inks-multiyear-deal-with-the-professional-pickleball-association/)).

  > **Check this part too, because it changes fastest of all:** the network partners above come from deals announced in 2023, and television rights get resold on a cycle of a year or two. Treat any named network as a snapshot. The tour's watch page is the live version.

  So yes, pro pickleball is on television. Just not the way a Sunday NFL game is on television, and never reliably enough to build a habit around.

  Which is exactly why "follow the tour" beats "find the channel." Broadcast partners are renegotiated constantly, ownership consolidates, brands get retired. The tours keep playing under their own names.

  ## The two events that belong to nobody

  Two tournaments sit outside the tour structure, and they are the two most fun weeks of the year to watch.

  The **US Open Pickleball Championships** in Naples, Florida is the sprawling one, thousands of players across dozens of courts, pros and amateurs sharing a park. It runs its own free video portal during the event, a wall of live court feeds with no login required, right down to the 3.0 courts where the amateurs are ([US Open Pickleball](https://app.usopnpc.com/video/live.php)).

  The **USA Pickleball National Championships** is the governing body's event, and its broadcast home is the most delightfully strange in American sport. QVC signed on as USA Pickleball's exclusive broadcast partner in a multi-year deal, streaming the championships on QVC+ and HSN+, which the release describes as "the first free streaming service to mix live streaming sports and commerce" ([USA Pickleball](https://usapickleballnationals.com/news/qvc-and-usa-pickleball-rally-together-for-multi-year-partnership/)).

  Yes, the shopping networks. Yes, it is real, and yes, it is free.

  Tell somebody at your next game that the national championship of their sport has gone out live on a shopping network, and watch their face.

  ## Watch the feet not the ball

  Finding the stream is the first half. This is the second half, and it is the reason to bother at all.

  Watching pro pickleball will make you better, but only if you stop watching the ball. The ball is the least useful thing on the screen. Everybody at your Tuesday game already watches the ball, which is precisely why everybody at your Tuesday game is stuck.

  Watch the feet instead. The pros are standing where the ball is going before it gets there, and the camera shows you this for free, every single rally, and almost nobody looks.

  Pick one player. Follow only that player for one entire game and let the ball go wherever it likes. You will notice the sprint to the kitchen line on the very first opportunity, and the flat refusal to give that line back.

  You will also notice how many of the best shots are soft. The reset, that little floated drop that buys a second and puts the rally back to neutral, is the most valuable shot in professional pickleball, and no crowd has ever cheered for one.

  ![A top view of a pickleball court with the kitchen zones shaded, showing three players parked at the kitchen line and one stranded deep and already sprinting forward, beside a panel listing four things to track in a pro rally](/studio/pickle-jam/watch-the-feet-not-the-ball.svg)

  ## Ten things to look for in one professional rally

  Steal this list. It turns twenty minutes of watching into an actual practice session.

  1. **Whose feet move first**, before contact rather than after it.
  2. **How fast both teams get to the kitchen line**, usually within two shots.
  3. **Who is forced to hit the ball up**, because that team is losing the point.
  4. **The third shot**, and whether it is a drop or a drive, and why they chose it.
  5. **How often the ball goes down the middle**, and how often that wins the point outright.
  6. **The reset**, that soft shot out of trouble that puts the rally back to even.
  7. **Paddle position between shots**, held up and out in front, never down at the hip.
  8. **How long the dink rallies last**, and who blinks first.
  9. **The split step**, that tiny hop as the opponent makes contact.
  10. **What happens after the point**, because pros tap paddles and reset in about four seconds.

  ## Five mistakes that keep people from watching

  - **Searching your TV for "pickleball."** Your television's search box is looking through cable listings. The sport mostly lives in apps and on YouTube.
  - **Assuming you need cable.** You do not. Most professional pickleball is free to watch, and always has been.
  - **Watching only highlight reels.** Highlights are all put-aways and trick shots, which is the least representative and least instructive version of the game.
  - **Starting with a marquee final.** A final is tight, tense, and low on variety. A quarterfinal is more fun and shows more different kinds of points.
  - **Watching the ball.** See above. It is the one habit standing between you and getting better on Tuesday.

  ![Four numbered step cards: pick a tour, open its page, go free first, and watch the feet, under the heading Four steps tonight](/studio/pickle-jam/watch-four-steps-tonight.svg)

  ## The bottom line

  More than twenty-four million Americans play pickleball, roughly six times as many as five years earlier ([SFIA](https://sfia.org/research/u-s-pickleball-participation/)), and a startling number of them have never seen a professional point. The sport is not hiding from them. They went looking for a channel.

  So do not look for a channel. Look for a tour, and let the tour tell you the screen.

  Tonight, open the APP Tour's YouTube channel, find a quarterfinal, and watch one player's feet for one whole game. It is free, it takes twenty minutes, and it will change what you see on your own court.

  Deb does this now, most weeks, on the phone that lives in her bag. She still keeps four paddles in her trunk. She has also started getting to the kitchen line about a second and a half faster than she used to, which she will tell you about at length, and which is the entire point.
