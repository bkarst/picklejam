faq:
- question: Who invented pickleball and when?
  answer: Joel Pritchard, Bill Bell, and Barney McCallum invented it in the summer of 1965 on Bainbridge Island, Washington. Pritchard and Bell improvised the first game, and McCallum joined the following weekend and shaped the equipment and the rules.
- question: Why is it called pickleball?
  answer: Joan Pritchard named it after the pickle boat in crew, which was crewed by the leftover oarsmen from other boats, because the game was assembled from leftover bits of other sports.
- question: Was pickleball really named after a dog?
  answer: No. The Pritchards' dog Pickles came along in 1968, three years after the game was named, and Joel Pritchard said the dog was named after the game.
- question: Why is a pickleball court 20 by 44 feet?
  answer: Because that is a regulation badminton court, and one was already paved in the Pritchards' backyard. The size was inherited, not designed, and it is still the regulation size for both singles and doubles.
- question: Why do you have to serve underhand?
  answer: A madrona tree crowded one end of the original court, which pushed the founders toward an underhand serve with one foot allowed inside the baseline. The rule survived because it keeps any point from ending on the serve.
- question: Who invented the kitchen?
  answer: Barney McCallum. He added the seven-foot non-volley zone to stop taller players from dominating at the net, and the Pickleball Hall of Fame also credits him with the double bounce rule.
- question: Does the original 1965 court still exist?
  answer: Yes. The first court sits on private property on Bainbridge Island, on the front lawn of Scott and Carol Stover. It remains in its original condition, and the Bainbridge Island Historical Museum named the Stovers "History Heroes" in 2021 for looking after it.
- question: Is pickleball an official state sport anywhere?
  answer: Washington made pickleball its official state sport in March 2022, signed into law fifty-seven years after the game was invented there.
body: |
  Every pickleball court in America exists because a thirteen-year-old got smart with his dad.

  Summer 1965, Bainbridge Island, Washington, a short ferry ride across Puget Sound from Seattle. Frank Pritchard was moping around the family's beach cabin with nothing to do, and he said so. His father, Joel, gave him the standard dad answer, which was that back in his day, kids just made up their own games.

  Frank's comeback is the reason you own a paddle. "Then why don't you go make up a game?" he said ([HistoryLink](https://www.historylink.org/File/22417)).

  So his dad went and made one up. What came out of that yard is now played by more than twenty million Americans, and almost every odd rule in it, the kitchen, the underhand serve, the ball that has to bounce on both sides, traces back to something that was already lying around out there.

  This is where pickleball actually came from, and why the weird parts turn out to be the whole point.

  ## The short answer

  Pickleball was invented in a Bainbridge Island backyard in 1965, and its strangest rules exist to stop anyone dominating. Joel Pritchard, Bill Bell, and Barney McCallum improvised the first game on an old paved badminton court with ping-pong paddles and a perforated plastic ball, because they could not find a full set of badminton rackets ([USA Pickleball](https://usapickleball.org/about/)). They were building something for bored kids, so they argued the rules into a shape where no adult could win just by being bigger.

  > **The one idea to keep:** Pickleball did not take over America because it is easy. It took over because three dads deliberately built a game that nobody could dominate.

  ## Summer 1965: the dare that started a sport

  Joel Pritchard was not a man who let a challenge sit there. He had played football, basketball, and tennis at Queen Anne High School, and he was in his seventh year in the Washington State Legislature ([HistoryLink](https://www.historylink.org/File/22417)). He would later spend six terms in Congress and eight years as Washington's lieutenant governor, and none of that is what he is remembered for.

  He and his friend Bill Bell walked out to the backyard. Waiting there was a slab of asphalt that Pritchard's parents had paved as a badminton court, forty-four feet by twenty.

  They went looking for badminton rackets and could not find a full set ([USA Pickleball](https://usapickleball.org/about/)). So they grabbed ping-pong paddles and a perforated plastic ball instead, hung the net at badminton height, and started knocking it around.

  Two things happened over that weekend that decided the future of the sport. The ball bounced beautifully off asphalt, which meant this did not have to be an air game. And Pritchard, who was a tennis player at heart, wanted to actually swing at it.

  "You've got to be able to hit the ball hard," he said. "Nobody plays golf to putt" ([HistoryLink](https://www.historylink.org/File/20195)).

  So the net came down from sixty inches to thirty-six, and the game stopped being badminton. The following weekend a neighbor named Barney McCallum came over, took one look, and effectively never left.

  ## The backyard wrote the rulebook

  The part almost nobody knows is also the best part.

  Pickleball's dimensions were not designed. They were inherited. The court is twenty feet by forty-four feet today, for singles and for doubles, because that was the badminton court already sitting in the yard ([USA Pickleball](https://usapickleball.org/what-is-pickleball/)).

  The serve is stranger still. A madrona tree crowded one end of that court, so the men wrote a rule letting the server keep one foot inside the line, and they made the serve underhand ([HistoryLink](https://www.historylink.org/File/22417)). Every player in America still serves underhand because of a tree in one family's yard.

  ![A diagram of the 1965 backyard court on Bainbridge Island with four numbered callouts: the court was an already-paved 20 by 44 foot badminton court, the net was hung at 60 inches and dropped to 36, a madrona tree forced the underhand serve with one foot allowed inside the line, and the gear was ping-pong paddles and a perforated plastic ball because no badminton rackets could be found](/studio/pickle-jam/history-backyard-rules.svg)

  Now for the line worth drawing, because the two halves of this story usually get mashed together into one.

  The court size and the serve are accidents. They are what a particular yard, with a particular tree in it, happened to hand three men on a Saturday. What came next was not an accident at all.

  They kept working. The Bainbridge Island Historical Museum records that the three friends spent several months debating and experimenting with rules and equipment, and that from the beginning they set out to accommodate players of all ages and abilities ([Bainbridge History Museum](https://www.bainbridgehistorymuseum.org/our-community-past-to-present/pickleball)). The founders later said they crafted the rules on purpose so the game would be fun at any age, with no height advantage for adults ([HistoryLink](https://www.historylink.org/File/20195)).

  So they sat down and asked how to keep a grown man from beating a thirteen-year-old, spent a season on the answer, and built it into the rules. That is not a quirky origin story. That is a design brief.

  ## The kitchen: the rule that made it fair

  Every new player thinks the kitchen is a joke. Seven feet of court where you are not allowed to volley, with a silly name, seemingly invented to make you look foolish in front of strangers.

  The kitchen is the most serious thing in pickleball. It is the load-bearing wall.

  Barney McCallum is the one responsible for it, and his reason was specific: a seven-foot non-volley zone on each side of the net stops taller players from having an advantage over shorter ones ([HistoryLink](https://www.historylink.org/File/22417)). Without it, the tallest person on the court simply stands at the net and swats everything down, forever, and the game is over before it starts.

  McCallum did the same thing again with the two-bounce rule. The Pickleball Hall of Fame, which inducted him in its inaugural class in 2017, credits him with introducing both the non-volley zone and the double bounce rule ([Pickleball Hall of Fame](https://pickleballhalloffame.global/inductees/barney-mccallum/)).

  ![Three cards explaining pickleball's fairness rules: the kitchen, seven feet where neither side may volley, which neutralizes the tall player who would otherwise camp at the net; the two-bounce rule, where the serve and the return must both bounce, which neutralizes the big serve and the rush behind it; and the underhand serve, struck below the waist on the way up, which neutralizes the unreturnable ace](/studio/pickle-jam/history-fairness-engine.svg)

  Line the three rules up and the design intent is impossible to miss.

  The underhand serve means nobody aces you off the court. The two-bounce rule means nobody serves and storms the net. The kitchen means nobody wins by being tall.

  ## What the kitchen still does on a Tuesday

  There is a court near me where the eight o'clock game is usually a retired machinist I will call Ray, a high schooler who comes because his mother makes him, and whoever else turns up with a paddle. Ray is seventy-six. He takes the first three steps of every point like a man walking to the mailbox.

  I have watched him take four straight points off that kid by doing nothing except dropping the ball soft into seven feet of forbidden concrete. Each one landed with that dull little tock a dying ball makes, and each time the kid's shoes squealed on the paint as he came up for it a half second late.

  He is faster, stronger, and a foot taller than Ray. Inside the kitchen, not one of those things is worth anything to him.

  For a while I filed that under charming flukes of the sport, the kind of thing that just happens on a small court. It is not a fluke. It is three men on Bainbridge Island arguing through a summer about how to keep a bored thirteen-year-old in the game, and settling the argument so completely that it still holds on a Tuesday morning they never lived to see.

  > **What this means on your Tuesday:** When the seventy-six-year-old with the soft dink beats the kid who hits it twice as hard, nobody has been upset. The machine is working exactly as three dads built it in 1965.

  ## What it borrowed, and what came out of the yard

  Pickleball gets described as a mashup of tennis, badminton, and ping-pong, which is true and also a little unfair to the people who made it.

  The borrowed parts are the obvious ones. The court and the net came from badminton, and the men wrote their first rules leaning heavily on badminton ([USA Pickleball](https://usapickleball.org/about/)). The paddles came off a ping-pong table, and the urge to smash, along with the fight for the net, came straight from tennis.

  But the three rules that make pickleball feel like pickleball came from none of them.

  ![A four-column infographic: badminton contributed the 20 by 44 foot court, the net first hung at 60 inches and cut to 36, and the skeleton of the rules; table tennis contributed the paddles, the short flat swing, and rallies decided by touch; tennis contributed the overhead smash, doubles and the fight for the net, and the instinct to hit it hard; and the backyard itself contributed the kitchen, the two-bounce rule, and the underhand serve](/studio/pickle-jam/history-where-the-parts-came-from.svg)

  The kitchen, the two-bounce rule, and the underhand serve are homegrown. One of them came from a tree and two of them came from months of arguing, and all three are the fingerprints of people who cared more about whether everybody got to play than about whether the best athlete won.

  ## Why on earth it is called pickleball

  You have heard the dog story. It is charming, it is repeated constantly, and the family has spent decades explaining that it did not happen that way.

  Joan Pritchard, Joel's wife, said she started calling it pickleball because the mix of borrowed sports reminded her of the pickle boat in crew, the boat whose oarsmen were the leftovers from the other boats ([HistoryLink](https://www.historylink.org/File/22417)). A game assembled from spare parts, named after a boat assembled from spare parts.

  Pickles the dog was real. Pickles the dog arrived in 1968, three years after the game already had its name, and Joel Pritchard said flatly that the dog was named after the game ([HistoryLink](https://www.historylink.org/File/20195)).

  ![A timeline showing that the game was named in 1965, when Joan Pritchard called it pickleball after the pickle boat in crew, and that Pickles the dog arrived three years later in 1968, named after the game rather than the other way around](/studio/pickle-jam/history-dog-did-not-name-it.svg)

  So why does the myth refuse to die? Because it is a better story, and Pritchard knew it. He said people kept advising him to stick with the dog version because it worked better.

  | The claim | What the record shows |
  | --- | --- |
  | Named after the family dog | Pickles arrived in 1968, three years after the naming ([HistoryLink](https://www.historylink.org/File/22417)) |
  | Named after a crew term | Joan Pritchard's pickle boat, the boat crewed by leftovers, is the family's consistent account |
  | Barney McCallum's version | He said it came from telling opponents he had them in a pickle ([HistoryLink](https://www.historylink.org/File/20195)) |
  | The near miss | "Tenny pong" was under consideration. Joel Pritchard just wanted a nutty name ([HistoryLink](https://www.historylink.org/File/20195)) |

  We came within one conversation of all playing tenny pong. Sit with that for a second.

  ## The three founders, and what each actually did

  The shorthand is "three dads invented pickleball," which flattens three quite different contributions into one sentence.

  | Founder | Years | What he actually did |
  | --- | --- | --- |
  | Joel Pritchard | 1925 to 1997 | Took the dare, lowered the net so the game could be hit hard, and spent the rest of his life promoting it. A six-term U.S. Representative and Washington's lieutenant governor. |
  | Barney McCallum | 1926 to 2019 | Built the paddles on a bandsaw in his Bainbridge basement, and gave the sport the kitchen and the two-bounce rule. Drove its growth for the rest of his life. |
  | Bill Bell | 1924 to 2006 | Was there on the first afternoon. A Battle of the Bulge veteran with a Purple Heart, he later built courts and promoted the game across Southeast Asia and Australia. |

  Sources: [HistoryLink](https://www.historylink.org/File/22417), [Pickleball Hall of Fame](https://pickleballhalloffame.global/inductees/barney-mccallum/).

  Frank Pritchard, the bored kid who started all of it, was clear about who deserved the credit later on. People call his dad the father of pickleball, he said, but Barney was the parent who nurtured it ([HistoryLink](https://www.historylink.org/File/22417)).

  ## From one backyard to all fifty states

  The spread was slower than the current boom makes it look, and it went through exactly the places you would expect a family game to go: schools, community centers, retirement communities, and the homes of Joel Pritchard's political friends.

  Chase that last one, because it is the best small detour in the story. Pritchard carried the game down to Olympia and infected the state's political class with it, and they were not content to borrow a court.

  Senator Slade Gorton put pickleball courts in at both of his houses, in Olympia and on Whidbey Island ([HistoryLink](https://www.historylink.org/File/22417)). Representative Norm Dicks and his wife built what Suzie Dicks called the first outdoor pickleball court in the District of Columbia ([HistoryLink](https://www.historylink.org/File/20195)).

  That is how this sport has always moved. Somebody plays one game at a friend's place, goes home slightly obsessed, and pours a slab of their own.

  In 1968 Pritchard, McCallum, Bell and others incorporated Pickle Ball Inc., each putting in five hundred dollars, and sold boxed sets with paddles, balls, and a net for $29.95 ([HistoryLink](https://www.historylink.org/File/22417)). Nobody got rich off it. The company was profitable, Pritchard later told a reporter, but a 1974 financial disclosure put its net assets under fifteen hundred dollars and he said they had never taken a dime out of it ([HistoryLink](https://www.historylink.org/File/20195)).

  ![A vertical timeline of pickleball history: 1965, a bored thirteen-year-old dares his dad and the game is invented on a paved badminton court; 1968, Pickle Ball Inc. is incorporated with 500 dollars from each founder and boxed sets sell for 29.95; 1976, the first known tournament is played in Tukwila, Washington, eleven years after the backyard; 1984, the USAPA forms and publishes the first rulebook, and by 1990 the game is played in all fifty states; 2022, Washington makes pickleball its official state sport; and today, tens of millions of Americans play while the 1965 rules stay put](/studio/pickle-jam/history-pickleball-timeline.svg)

  The first known tournament in the world was played in the spring of 1976 at the South Center Athletic Club in Tukwila, Washington ([USA Pickleball](https://usapickleball.org/about/)). Many of the entrants were college tennis players who barely knew the rules.

  Then the slow part. A national association and a first rulebook in 1984, courts in all fifty states by 1990, and decades of unglamorous growth in school gyms, community centers, and retirement communities ([HistoryLink](https://www.historylink.org/File/20195)).

  In March 2022, Washington made pickleball its official state sport, fifty-seven years after the backyard. The bill passed the state Senate 46 to 1 ([Washington State Legislature](https://app.leg.wa.gov/billsummary?billnumber=5615&year=2022)).

  > **The numbers, as of the most recent count:** The Sports and Fitness Industry Association put U.S. pickleball participation at 24.3 million people in 2025, up from about 4.2 million in 2020 ([SFIA](https://sfia.org/research/u-s-pickleball-participation/)). These figures move every year. The 1965 rules have not.

  ## Six things people get wrong about pickleball history

  1. **The founders agreed on when they did it.** They did not. Joel Pritchard once said the summer of 1963, Joan Pritchard wrote that it was 1966, and 1965 is the year most accounts settled on and the governing body designates ([HistoryLink](https://www.historylink.org/File/20195)).
  2. **The first purpose-built court was on Bainbridge Island.** The two best sources on this disagree. USA Pickleball puts the first permanent court at the Pritchards' Seattle home in Magnolia Bluff in 1967 ([USA Pickleball](https://usapickleball.org/about/)), while HistoryLink credits a Bainbridge Island neighbor the same year ([HistoryLink](https://www.historylink.org/File/20195)).
  3. **It was invented for retirees.** Bored kids came first by decades. The retirement communities are a consequence of a design built to include everybody, not the reason for it.
  4. **The boom means the sport just arrived.** It was invented in 1965, waited eleven years for its first known tournament, and had reached all fifty states by 1990 ([USA Pickleball](https://usapickleball.org/about/)). The boom is recent. The sport is not.
  5. **Joel Pritchard saw it as a footnote to his political career.** After six terms in Congress and eight years as lieutenant governor, his daughter Peggy Pritchard-Olson said that of everything he had done in his life, the game was what he was proudest of ([HistoryLink](https://www.historylink.org/File/22417)).
  6. **Pickle Ball Inc. was founded in 1972.** You will see 1968 and 1972 and both are defensible. The articles of incorporation were filed on February 13, 1968, but the first annual report came in 1972, which the founders called the year the business actually got underway ([HistoryLink](https://www.historylink.org/File/20195)).

  ![A reference card of pickleball's founding facts: invented summer 1965 on Bainbridge Island, Washington, by Joel Pritchard, Bill Bell and Barney McCallum, on an already-paved backyard badminton court, with ping-pong paddles and a perforated plastic ball, named by Joan Pritchard after crew's pickle boat; the court is 20 by 44 feet for singles and doubles, the net is 36 inches at the sidelines and 34 at center, the kitchen is 7 feet either side, the first known tournament was spring 1976 in Tukwila, and Washington made it the official state sport on March 28, 2022](/studio/pickle-jam/history-pickleball-on-the-record.svg)

  ## The bottom line

  A thirteen-year-old complained he was bored, his dad took it as a challenge, and the three of them spent the next several months arguing about how to keep that kid in the game. The argument is the sport. They were right by about twenty-four million people.

  You do not need a plane ticket to Bainbridge Island to see the evidence. Go find your local courts, stand at the fence for one round of open play, and count how many different decades are out there on that one small rectangle. Every one of them is standing inside somebody's old argument about fairness, and none of them will know it.

  That is the invention. The paddles were just the delivery method.
