- Pickleball was invented in the summer of 1965 on Bainbridge Island, Washington, after a bored 13-year-old dared his father to make up a game.
- 'The court is 20 by 44 feet and the serve is underhand because of what happened to be in that backyard: a paved badminton court and a madrona tree in the way.'
