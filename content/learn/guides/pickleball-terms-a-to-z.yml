keyTakeaways:
- Almost every strange word in pickleball is somebody's name, somebody's joke, or somebody's mistake.
- The kitchen is the 7-foot non-volley zone, and the word 'kitchen' appears nowhere in the official rulebook.
- The Erne is named for Erne Perry, the Nasty Nelson for Timothy Nelson, and the Bert for Ernie's companion on Sesame Street.
- The sport cannot agree on where its own name came from, so you are allowed to not know what a Bert is.
faq:
- question: Why is the kitchen called the kitchen?
  answer: Nobody knows for certain. The leading theory borrows it from shuffleboard, which has a penalty area by the same name, and the runner-up is the old line about not standing the heat.
- question: What is a dink in pickleball?
  answer: A soft shot, hit after the bounce from near the kitchen line, that just clears the net and drops into your opponent's kitchen. The point is to give them nothing worth attacking.
- question: What does getting pickled mean?
  answer: It means you lost the game 11-0. If you also never got to serve, that is a golden pickle, and you will hear about it.
- question: What is an Erne?
  answer: A volley hit from outside the sideline, beside the kitchen rather than in it, which makes it legal. It is named for Erne Perry.
- question: What is a Bert?
  answer: The same shot as an Erne, but played on your partner's side after you cross in front of them. It is named for Bert of Sesame Street, Ernie's companion.
- question: What is a Nasty Nelson?
  answer: A serve aimed on purpose at the opponent at the net who is not receiving. It wins the server the point, and it is named for Timothy Nelson.
- question: What does 0-0-2 mean?
  answer: 'It is the score at the start of a game: zero for you, zero for them, and you are the second server. The starting team only gets one server, which is why the first call skips straight to two.'
- question: What is no man's land?
  answer: The stretch of court between the kitchen line and the baseline, also called the transition zone. It is where balls land at your feet, which is how it got the name.
- question: What is a banger?
  answer: A player who hits almost everything hard and flat instead of playing the soft game. Every court has one. Some courts have four.
body: |
  There is a man at my Thursday-night game, I will call him Walt, who spent his whole first evening believing the kitchen was a real room. Somebody hollered "get out of the kitchen!" and he turned and looked, politely, for a door.

  He is sixty-four. He now owns three paddles and a hat with a pickle on it.

  Walt worked the rest out by his second week. Pickleball's vocabulary sounds like a prank because it more or less is one. These words were not handed down by a committee in a conference room.

  They were invented by people goofing around in a backyard, and they have never stopped sounding like it. So you are not behind. You are just new to a language that was built to be learned in one evening.

  Here is every word you will actually hear, what it means, and the good part: which specific human being it is named after.

  ## The short answer

  Pickleball terms are mostly three things: places on the court (the kitchen, the baseline, no man's land), shots (the dink, the drive, the third shot drop), and jokes (getting pickled, a body bag, a Nasty Nelson). Learn about a dozen and you can follow any game in America. The rest you pick up by being yelled at, kindly, on a Tuesday.

  > **The one idea to keep:** Almost every strange word in pickleball is somebody's name, somebody's joke, or somebody's mistake. The vocabulary is not a gate. It is a guest list.

  ## The sport cannot agree on its own name

  Start here, because it takes the pressure off everything that follows. Pickleball does not actually know what its own name means. There are three stories, and they have never stopped arguing with each other.

  Story one belongs to Joan Pritchard, wife of co-inventor Joel Pritchard. She said the game reminded her of "the pickle boat" in crew, the boat thrown together from the rowers nobody else picked ([Wikipedia](https://en.wikipedia.org/wiki/Pickleball)). Which fits, because the game itself was assembled from leftovers: an old badminton court, some ping-pong paddles, a perforated plastic ball, a net dropped to hip height ([USA Pickleball](https://usapickleball.org/about/)).

  Story two is the dog. The Pritchards had one named Pickles, and for decades people have said the sport was named after him. The family insisted it went the other way, and USA Pickleball says its own research confirms the dog was born after the game already had its name ([Wikipedia](https://en.wikipedia.org/wiki/Pickleball)).

  Story three barely gets told. Bill Bell, the third co-inventor, said he named it because he enjoyed putting his opponent in a pickle ([Wikipedia](https://en.wikipedia.org/wiki/Pickleball)).

  > **Why this is your permission slip:** The three people who invented this sport could not settle what its name meant. You are allowed to not know what a Bert is.

  ## Every line and zone, named

  The court is a 20-foot by 44-foot rectangle, and every line on it has a nickname that is more used than its real name ([Wikipedia](https://en.wikipedia.org/wiki/Glossary_of_pickleball)).

  ![A top-down map of a pickleball court with every line and zone numbered and named: the sidelines, the baseline, the centerline, the kitchen line, the kitchen or non-volley zone, the service courts, the transition zone, and the net](/studio/pickle-jam/court-vocabulary-map.svg)

  **The kitchen.** The seven-foot zone on both sides of the net. You may not volley (hit the ball out of the air) while any part of you is touching it, and that includes the line ([USA Pickleball](https://usapickleball.org/rules/summary/)). Its actual name is the non-volley zone, or NVZ.

  **The kitchen line.** The line marking the front edge of that zone, also called the non-volley line. It is the one line on the court that counts as out when a serve lands on it ([USA Pickleball](https://usapickleball.org/rules/summary/)).

  **The baseline.** The back line, 22 feet from the net, where you stand to serve. **The sidelines** are the long edges, and **the centerline** splits the two service courts ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/pickleball-glossary-terms-definitions)).

  **No man's land.** The stretch between the kitchen line and the baseline, also called the transition zone. The name is the coaching advice: standing there gets you hit ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/pickleball-glossary-terms-definitions)).

  ## The shots, named for the shape of their flight

  Most shot names are just the path of the ball, said out loud. Once you see that, the whole list stops being vocabulary and starts being geometry.

  ![Four side-view panels comparing the flight path of a dink, a drop, a drive, and a lob, each shown crossing the net with the kitchen marked on both sides](/studio/pickle-jam/shot-trajectories.svg)

  **Dink.** A soft shot hit from near the kitchen line, after the bounce, that just clears the net and lands in their kitchen ([Wikipedia](https://en.wikipedia.org/wiki/Glossary_of_pickleball)). It is the whole soft game, and it is why nobody can smash you.

  **Drop.** The same soft landing, but hit from the backcourt. A **third shot drop** is just this shot hit third, and it is the move that buys the serving team the net ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/pickleball-glossary-terms-definitions)).

  **Drive.** A hard, flat groundstroke aimed at their feet. Hit nothing but these and the regulars will call you a **banger**, which is affectionate about forty percent of the time ([Wikipedia](https://en.wikipedia.org/wiki/Glossary_of_pickleball)).

  **Lob.** A high arc over their heads to the back of the court, usually answered by an **overhead smash** if they get back in time ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/pickleball-glossary-terms-definitions)).

  **Volley.** Any ball hit before it bounces. **Groundstroke.** Any ball hit after it bounces. **Speed-up.** The moment somebody decides the dinking has gone on long enough ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/pickleball-glossary-terms-definitions)).

  **Around-the-post (ATP).** A shot that goes around the outside of the net post instead of over the net. It is fully legal, it may travel below net height, and it is the single most fun thing in the sport ([Wikipedia](https://en.wikipedia.org/wiki/Glossary_of_pickleball)).

  ## The people who became words

  Here is the part nobody tells you, and it is the reason this language feels the way it does. Several of these words are just names. Real people, who did a thing on a court and got a word for it.

  **Erne.** A volley hit while standing (or leaping) outside the sideline, right beside the kitchen. It is legal because the kitchen line stops at the sideline, so you are next to the zone rather than in it ([Pickleheads](https://www.pickleheads.com/guides/pickleball-kitchen-rules)). It is named for Erne Perry, who made it famous at a 2010 tournament, and the name was actually coined by a videographer, Jeff Shank, who kept noticing Perry doing it ([Pickleheads](https://www.pickleheads.com/guides/erne-in-pickleball)).

  Sit with that one. The shot carries a player's first name because a guy with a camera got tired of describing it.

  **Bert.** The identical shot, except you cross in front of your partner and do it on their side of the court ([Wikipedia](https://en.wikipedia.org/wiki/Glossary_of_pickleball)). No player named Bert was ever involved. The Erne already sounded like Ernie, so its partner shot got named for Ernie's partner on Sesame Street ([PlayPickleball](https://www.playpickleball.com/pickleball-erne-rules/)).

  ![A top-down diagram of one side of a pickleball court showing the Erne played from outside your own sideline beside the kitchen, and the Bert played from outside your partner's sideline after crossing in front of them](/studio/pickle-jam/erne-and-bert.svg)

  **Nasty Nelson.** A serve deliberately aimed at the opponent standing at the net who is not the receiver. It is a legal point for the server, because the non-receiving player is not allowed to interfere with a serve ([Wikipedia](https://en.wikipedia.org/wiki/Glossary_of_pickleball)). It is named for Timothy Nelson ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/pickleball-glossary-terms-definitions)).

  **Joey.** Returning an around-the-post shot by sending one straight back around the post at the person who just hit it. Named for Joe Valenti ([Wikipedia](https://en.wikipedia.org/wiki/Glossary_of_pickleball)).

  **Chainsaw serve.** Spinning the ball against your paddle before you toss it. Zane Navratil popularized it so thoroughly it carries his name, and then it was legislated out of USA Pickleball's rulebook ([Wikipedia](https://en.wikipedia.org/wiki/Glossary_of_pickleball)). The shot is gone, but the word stayed.

  ![A roster listing four pickleball terms and the real person each is named for: the Erne for Erne Perry, the Nasty Nelson for Timothy Nelson, the Joey for Joe Valenti, and the chainsaw serve for Zane Navratil](/studio/pickle-jam/named-after-a-person.svg)

  ## The words for losing, which are the best ones

  A sport tells you what it thinks of itself by what it names its humiliations. Pickleball named all of them, and it named them like a friend teasing you.

  1. **Pickled.** You lost 11-0 ([The Dink](https://www.thedinkpickleball.com/slang-terms/)).
  2. **Golden pickle.** You lost 11-0 without ever getting to serve ([The Dink](https://www.thedinkpickleball.com/slang-terms/)).
  3. **Bagel.** Same as getting pickled, borrowed from tennis ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/pickleball-glossary-terms-definitions)).
  4. **Body bag.** Somebody hit you with the ball, on purpose, and won the point ([The Dink](https://www.thedinkpickleball.com/slang-terms/)).
  5. **Fly swatter.** You had a sitter overhead and swatted it straight into the net ([The Dink](https://www.thedinkpickleball.com/slang-terms/)).
  6. **Lettuced.** Your opponent's serve clipped the net, landed in, and you never touched it ([The Dink](https://www.thedinkpickleball.com/slang-terms/)).
  7. **Chicken wing.** The ball came at your shoulder and your elbow flew up like a wing ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/pickleball-glossary-terms-definitions)).
  8. **Pop-up.** You hit it high and soft, and everyone at the net licked their chops ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/pickleball-glossary-terms-definitions)).
  9. **Nutmeg.** The ball went between your legs ([The Dink](https://www.thedinkpickleball.com/slang-terms/)).
  10. **The yips.** Your muscle memory left, taking your serve with it ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/pickleball-glossary-terms-definitions)).

  ![An infographic of the ten pickleball words for losing, each numbered and defined: pickled, golden pickle, bagel, body bag, fly swatter, lettuced, chicken wing, pop-up, nutmeg, and the yips](/studio/pickle-jam/words-for-losing.svg)

  Notice that not one of these is cruel. They are all the sort of thing you would say to somebody you intend to play with again next Thursday.

  ## What they yell, and what it means

  | What you hear | What it means | What you do |
  | --- | --- | --- |
  | "Kitchen!" | You are standing in the non-volley zone | Step out before you hit anything out of the air |
  | "Bounce it!" | Your partner thinks that ball is going out | Let it land, do not touch it |
  | "Ball on!" | A stray ball rolled onto your court | Stop immediately, then replay the point |
  | "Out!" | The ball landed past a line | Stop the rally, the point is over |
  | "Zero, zero, two" | The score at the start of a game | Nothing. Just receive the serve |
  | "Nice Erne" | Somebody volleyed from beside the kitchen | Applaud, then quietly look it up |

  Sources for the calls above: [USA Pickleball](https://usapickleball.org/rules/summary/), [Wikipedia](https://en.wikipedia.org/wiki/Glossary_of_pickleball), and [Selkirk](https://www.selkirk.com/blogs/pickleball-education/pickleball-glossary-terms-definitions).

  ## Mistakes almost everybody makes

  **Thinking you cannot stand in the kitchen.** You can, whenever you want, for as long as you want. The rule is only about volleying: no hitting the ball out of the air while you are touching that zone ([Pickleheads](https://www.pickleheads.com/guides/pickleball-kitchen-rules)).

  **Looking for "kitchen" in the rulebook.** It is not in there. The rulebook says non-volley zone, every time, and the word everybody actually uses appears nowhere in it ([Pickleheads](https://www.pickleheads.com/guides/pickleball-kitchen-rules)).

  **Mixing up a dink and a drop.** They land in the same place. The difference is where you hit it from: a dink from up at the kitchen line, a drop from way back ([Selkirk](https://www.selkirk.com/blogs/pickleball-education/pickleball-glossary-terms-definitions)).

  **Assuming your serve on the kitchen line is good.** Every other line counts as in. That one counts as out ([USA Pickleball](https://usapickleball.org/rules/summary/)).

  **Calling it a racket.** It is a paddle. It is solid, it has no strings, and somebody will tell you within four minutes.

  ## The bottom line

  The vocabulary is the friendliest thing about this sport, and it hides in plain sight. A kitchen. A pickle.

  A guy named Erne who jumped somewhere nobody had thought to jump, and now ten thousand strangers a night say his first name without knowing it is a first name. A shot named after a Muppet, because somebody thought it was funny and everybody agreed.

  That is the whole idea worth keeping. These words are not a gate somebody built to keep you out. They are a guest list of people who were there, jokes that stuck, and mistakes named gently enough that you would come back Thursday.

  So here is the next step, and it is small: pick one word off this page, the kitchen is the easy one, and go use it wrong in front of people.

  That is the entire initiation. Say it out loud, get corrected, laugh, keep playing.

  Walt looked for a door on his first night. Last week I heard him yell "nice Erne!" across two courts at a man he had never met, and mean it.

  That took him eleven weeks. It is going to take you less.
