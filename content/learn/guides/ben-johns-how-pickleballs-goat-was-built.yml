keyTakeaways:
- Ben Johns is widely called pickleball's GOAT, ranked at the top of singles, men's doubles, and mixed doubles.
- A bookshelf in the family basement forced the backhand that became his signature two-handed roll.
- He 'Frankensteined' his game from tennis, table tennis, and an engineer's eye for shot selection.
- He plays a Joola Perseus, the elongated carbon-fiber paddle he helped design.
faq:
- question: Why is Ben Johns called the GOAT of pickleball?
  answer: Because no one has matched his dominance across all three events. He has more tour titles and triple crowns than any male player and once won 108 straight singles matches.
- question: When did Ben Johns start playing pickleball?
  answer: In 2016, at age 17, on a family vacation in Florida. He entered the US Open about two months later and finished fifth in pro singles.
- question: What paddle does Ben Johns use?
  answer: He plays with a Joola Perseus, an elongated carbon-fiber paddle he helped design after moving to Joola in 2022.
- question: What is Ben Johns' signature shot?
  answer: His two-handed backhand roll, which the PPA Tour calls one of the most effective weapons in professional pickleball, and which he traces all the way back to hours of basement table tennis.
- question: What is a triple crown in pickleball?
  answer: Winning gold in singles, men's doubles, and mixed doubles at a single tournament. Ben was the first man ever to do it, in 2019.
- question: Does Ben Johns play singles or doubles?
  answer: 'All three: singles, men''s doubles, and mixed doubles. Holding the top spot across multiple events at once is a big part of his case as the GOAT.'
- question: Who is Ben Johns' doubles partner?
  answer: In men's doubles, most often his older brother Collin Johns. His famous mixed-doubles run came with Anna Leigh Waters.
- question: Did Ben Johns play another sport before pickleball?
  answer: Yes. He played competitive tennis from age seven and table tennis growing up, and he helped his brother train for the pro tennis tour.
body: |
  Picture a kid in a Maryland basement, pinned behind a ping-pong table. There is a bookshelf to his left, close enough that he cannot slide over to smack the forehand every table-tennis player wants to hit. So he hits backhands instead. Thousands of them. Tens of thousands.

  That kid was Ben Johns, and that bookshelf, of all the unlikely things, helped build the most feared shot in professional pickleball ([The Dink](https://www.thedinkpickleball.com/bookshelf-that-built-ben-johns-backhand/)).

  This is the story of how a homeschooled engineering student became the player everyone in the sport just calls the GOAT: where his game came from, how he actually plays, the paddle he helped design, the record book he keeps quietly rewriting, and what you can borrow from all of it for your own Tuesday game. Grab a spot on the bench. This one is a good one.

  ## The short answer

  Ben Johns is the most dominant player in pickleball history, and nearly everyone in the sport simply calls him the GOAT. Born in 1999 and carrying a materials-science degree, he plays the game like an engineering problem: relentless spin, a two-handed backhand roll nobody wants to face, and shot selection that is a step ahead of everyone. He wins in singles, men's doubles, and mixed doubles, and he has often won all three at the very same tournament ([PPA Tour](https://ppatour.com/athlete/ben-johns/)).

  > **The one idea to keep:** Ben Johns was not born the greatest player in pickleball. He was built into one, starting with a bookshelf in a basement, and then engineered piece by deliberate piece.

  ## The bookshelf that built a backhand

  Long before the trophies, there were two brothers and a ping-pong table. Ben and his older brother Collin played for hours in the family basement, and the way the room was arranged, a bookshelf sat right off Ben's left shoulder ([The Dink](https://www.thedinkpickleball.com/bookshelf-that-built-ben-johns-backhand/)).

  In table tennis, the natural move is to shuffle around your backhand and rip a forehand. Ben could not shuffle. The shelf was in the way, so ball after ball, he had to stand his ground and answer with his backhand.

  Here is the part I love. That basement was the perfect gym for the shot. A table-tennis paddle has a grippy rubber face and a small light ball, which the Dink calls "training wheels" for learning to roll topspin ([The Dink](https://www.thedinkpickleball.com/bookshelf-that-built-ben-johns-backhand/)).

  ![A three-step diagram showing how a bookshelf beside the basement ping-pong table pinned Ben Johns to his left, forced him to hit every ball with his backhand, and built his two-handed backhand roll](/studio/pickle-jam/ben-johns-bookshelf-backhand.svg)

  And a quiet coincidence sealed it. A table-tennis net and a pickleball net both stand 36 inches tall at the ends, so a roll struck from the kitchen line meets the ball at about the same height it did back in the basement ([The Dink](https://www.thedinkpickleball.com/bookshelf-that-built-ben-johns-backhand/)). The constraint that should have held him back handed him a weapon instead.

  ## From a Florida vacation to the world's best

  Ben did not grow up dreaming of pickleball, because barely anyone did. He grew up on racket sports, playing competitive tennis from the age of seven and learning table tennis in that same basement, and he helped Collin train for the pro tennis tour ([Tennis.com](https://www.tennis.com/news/articles/goat-23-meet-pickleball-top-player-ben-johns-has-tennis-background)).

  Then, in 2016, on a family vacation in Florida, a 17-year-old Ben picked up a pickleball paddle for the first time ([Ben Johns](https://www.benjohns.me/bio)). Two months later he entered the US Open and finished fifth in pro singles. Two months.

  The homeschooled kid kept climbing, and he did it while earning a degree in materials science and engineering from the University of Maryland ([Wikipedia](https://en.wikipedia.org/wiki/Ben_Johns)). That engineer's brain turns out to matter, because it is exactly how he plays.

  ## The Frankenstein game: how Ben Johns plays

  Ask Ben where his game came from and he will tell you he stole it. "I 'Frankensteined' a lot of my game together by borrowing elements from other players and sports," he told Tennis.com ([Tennis.com](https://www.tennis.com/news/articles/goat-23-meet-pickleball-top-player-ben-johns-has-tennis-background)). It is the most honest scouting report he could give.

  Tennis gave him topspin drives and the footwork to cover a court. Table tennis gave him the backhand roll and hands quick enough to reset a bullet. And the engineer gave him the rarest gift of all, the patience to hit the right shot instead of the exciting one.

  ![An infographic showing the four sources Ben Johns stitched his game from: tennis, table tennis, an engineer's mind, and relentless curiosity](/studio/pickle-jam/ben-johns-frankenstein-game.svg)

  His spin obsession is real and teachable. "The easiest way to generate spin is off volleys. You can roll the ball out of the air with top spin," he explains ([Tennis.com](https://www.tennis.com/news/articles/goat-23-meet-pickleball-top-player-ben-johns-has-tennis-background)). Notice what that is: not a bigger swing, a smarter one.

  The hardest skill to copy is the one between his ears. Ben names shot selection as the thing tennis players struggle with most, and it is the quiet engine under all the highlight reels ([Tennis.com](https://www.tennis.com/news/articles/goat-23-meet-pickleball-top-player-ben-johns-has-tennis-background)). Where most players ask "can I hit this," he asks "should I."

  | The instinct | The Ben Johns way |
  |---|---|
  | See a ball, hit it hard | Ask whether the shot is even on |
  | Win the point right now | Build the point, then win it |
  | Reach for a winner | Reset, and wait for a better ball |
  | Blame a missed shot | Treat the miss as data for the next one |

  Best of all, he refuses to think the sport is finished. "Pickleball is an unsolved sport. Everyone is adding new shots and strategies all the time," he says ([Tennis.com](https://www.tennis.com/news/articles/goat-23-meet-pickleball-top-player-ben-johns-has-tennis-background)). The best player alive still shows up like a student.

  ## The paddle: an engineer's favorite tool

  You cannot tell the Ben Johns story without the paddle, because the materials-science kid is obsessive about his gear. He signed with Franklin in 2019, then moved to Joola on April 1, 2022, and helped design the paddle he would carry ([Wikipedia](https://en.wikipedia.org/wiki/Ben_Johns)).

  That collaboration became the Perseus, an elongated carbon-fiber paddle now built around how he plays ([Joola](https://joola.com/collections/perseus)). Every choice in it is a choice about his game.

  ![A labeled diagram of Ben Johns' elongated carbon-fiber paddle, showing how its shape gives reach and power, its grit face grabs spin, its sixteen-millimeter core adds control, and its longer handle fits a two-handed backhand](/studio/pickle-jam/ben-johns-perseus-paddle.svg)

  The elongated shape lends reach and head-heavy pop for his drives. The gritty carbon face grabs the ball so he can roll on that heavy topspin, and the longer handle leaves room for two hands on the backhand ([Joola](https://joola.com/collections/perseus)). It is less a bat than a purpose-built instrument.

  | Era | Paddle | The through-line |
  |---|---|---|
  | 2019 | Franklin signature | His first pro paddle deal |
  | 2022 | Joola Hyperion (co-designed) | Joola's debut paddle, built with his input |
  | 2023 onward | Joola Perseus line | The spin-first paddle he plays today |

  ## The resume: a triple crown king

  Here is the stat that best captures him. In pickleball, winning gold in singles, men's doubles, and mixed doubles at the same tournament is called a triple crown, and in 2019 at the Tournament of Champions in Brigham City, Utah, Ben Johns became the first man ever to do it ([Wikipedia](https://en.wikipedia.org/wiki/Ben_Johns)).

  ![A diagram explaining a pickleball triple crown as gold in singles, men's doubles, and mixed doubles at one tournament, noting Ben Johns was the first man ever to win one in 2019](/studio/pickle-jam/ben-johns-triple-crown.svg)

  He does not do it alone. In men's doubles his longtime partner is his brother Collin, and his most dominant mixed-doubles run was a stretch of 16 straight titles alongside Anna Leigh Waters ([PPA Tour](https://ppatour.com/athlete/ben-johns/)). The GOAT is, fittingly, a very good teammate.

  > **By the numbers (per the [PPA Tour](https://ppatour.com/athlete/ben-johns/) record books):** More than 120 tour titles, over 20 triple crowns, a 108-match singles winning streak in 2019, a medal in every PPA event he has entered, and all of it from a right-hander who stands 6 feet 1. Those totals only climb, so treat them as a snapshot, not a ceiling.

  ## What you can steal from his game

  The best news about Ben Johns is that the foundation of his game is not a gift you are born with. It is a set of habits, and you can borrow them the same way he borrowed them:

  1. **Hit more backhands on purpose.** The shot everyone avoids is the shot he built a career on. Stop running around it.
  2. **Learn the roll off a grippy paddle.** Topspin comes from brushing up the back of the ball, not from swinging harder.
  3. **Pick the shot, then hit it.** Ask "should I" before "can I." The reset is often the winning play.
  4. **Be patient in the kitchen.** Long dink rallies are not stalling. They are you, waiting for the ball you actually want.
  5. **Treat every miss as data.** The engineer does not sulk over an error. He files it and adjusts.

  None of that requires being 6 foot 1 or 23 years into a racket sport. It just requires showing up on a Tuesday and being a little more deliberate than you were on Monday.

  ## The bottom line

  The greatest player in pickleball was not handed his game. It was built, and the blueprint is almost funny in how ordinary it started: a bookshelf that forced a backhand, a basement that taught a roll, an engineer's habit of asking which shot is actually the right one.

  That is the hopeful thing about Ben Johns. The genius is not some gift you either have or you don't. It is spin you can practice, patience you can choose, and a backhand you can decide, starting today, to stop hiding.

  So the next time you are on a court, do the Ben Johns thing. Stand your ground on your backhand side. Brush up the back of the ball. Take the point the game gives you instead of the one your ego wants. You will not be the GOAT by Thursday. But you will be a little more built, and a little less born, and that is where every great player started.
