faq:
- question: What are the exact dimensions of a pickleball court?
  answer: Twenty feet wide by 44 feet long, for both singles and doubles. That works out to 880 square feet of playing surface.
- question: How big is the kitchen?
  answer: The non-volley zone extends 7 feet from the net on each side and spans the full 20-foot width. You can stand in it, you simply cannot volley while you are there.
- question: How high is a pickleball net?
  answer: It is 36 inches at the posts and 34 inches at the center. That 2-inch dip in the middle is intentional, not a droopy net.
- question: Can you fit a pickleball court on a tennis court?
  answer: Yes, easily. A tennis court has roughly three times the surface area, and many clubs stripe up to four pickleball courts inside one tennis court's fenced space.
- question: How much total space do I need for one court?
  answer: Plan for at least 30 by 60 feet, and 34 by 64 if you can spare it, so players have room to chase a ball safely past the lines.
- question: Is a pickleball court really the same size as a badminton court?
  answer: Yes. A doubles badminton court is also 20 by 44 feet, which is exactly where pickleball's dimensions came from.
- question: How wide are the court lines?
  answer: Every line is 2 inches wide, and the court is always measured to the outside edge of the lines.
- question: Do singles and doubles use different court sizes?
  answer: No. Both are played on the same 20-by-44-foot court, which is exactly what makes singles such a workout.
body: |
  On a Tuesday night, at the four courts behind the rec center, a first-timer named Rosa borrowed a paddle, stepped onto the surface, looked down at the fresh painted lines around her sneakers, and asked the only question that mattered right then. Where, exactly, is the kitchen?

  She had been playing for ninety seconds. She was standing on a rectangle the size of a badminton court, and suddenly the lines on the ground mattered more than she had expected. That is the funny thing about this game. The whole joyful mess of it fits inside a box you can measure with a tape and a free afternoon.

  This guide is that tape measure: every line, every zone, every inch, laid out so the court stops being a mystery and starts being home.

  ## The short answer

  A regulation pickleball court is a rectangle 20 feet wide and 44 feet long, and it is the same size for singles and doubles. A 7-foot non-volley zone, the kitchen, sits on each side of the net. The net stands 36 inches high at the posts and 34 inches at the center, and every line is 2 inches wide ([USA Pickleball Official Rulebook](https://usapickleball.org/docs/rules/USAP-Official-Rulebook.pdf)). That is the entire court, and it is smaller than you think.

  > **The one idea to keep:** A pickleball court is small on purpose. Its 20-by-44-foot footprint is not a compromise, it is the whole design: close enough that four strangers end up in the same tiny box, laughing, by the second point.

  ## Every line, from the outside in

  Start at the edges and work toward the net. The outer boundary is a rectangle 20 feet wide and 44 feet long, which encloses 880 square feet of playing surface ([Pickleheads](https://www.pickleheads.com/blog/dimensions-of-a-pickleball-court)). The two long edges are the sidelines, and the two short edges are the baselines.

  The net cuts that rectangle in half, 22 feet from each baseline. On each side, a line 7 feet from the net marks off the non-volley zone. Everything between that line and the baseline is the service area, 15 feet deep, and a centerline splits it into two service courts of 15 by 10 feet each ([The Dink](https://www.thedinkpickleball.com/pickleball-court-dimensions-every-measurement-you-need/)).

  ![Top-down diagram of a pickleball court showing the 20 by 44 foot boundary, the 7-foot kitchen on each side of the net, and the 15 by 10 foot service courts split by the centerline](/studio/pickle-jam/pickleball-court-dimensions-diagram.svg)

  Here is every measurement on the court, in one place:

  | Feature | Measurement |
  |---|---|
  | Overall court | 20 ft × 44 ft (880 sq ft) |
  | Sidelines (the long edges) | 44 ft |
  | Baselines (the short edges) | 20 ft |
  | Non-volley zone (the kitchen) | 7 ft from the net, each side |
  | Service court (each of four) | 15 ft deep × 10 ft wide |
  | Centerline | splits each side into two service courts |
  | Line width | 2 in |

  One quiet rule surprises people. The court does not shrink for singles. A lone player defends the same 20 by 44 feet that two players share, which is exactly why singles pickleball feels like running a marathon in a phone booth.

  ## The kitchen: seven feet that change everything

  The non-volley zone, universally called the kitchen, is a 7-foot band of court on each side of the net, running the full 20-foot width ([PlayPickleball, USA Pickleball Rules Section 2](https://www.playpickleball.com/2025-usa-pickleball-rules-section-2-court-and-equipment/)). You are allowed to stand in it. You are not allowed to volley from it, meaning you cannot hit the ball out of the air while your feet are inside that line.

  That single restriction is the soul of the game. Without it, the tall and the strong would camp at the net and smash every ball straight down, and the long, popping dink rallies that make pickleball pickleball would never get a chance to happen.

  So the kitchen is not a penalty box. It is a peace treaty. It is the reason a soft, patient game beats a big, fast one more often than it has any right to, and why the best point of your whole night is usually a dink rally that went eleven shots before anyone dared to end it.

  > **Why call it "the kitchen"?** Nobody is completely sure. The most-repeated story borrows from shuffleboard, where the zone you do not want to land in is also called the kitchen. The name stuck, the way the good nicknames always do.

  ## The net: why it dips in the middle

  The net is 36 inches high at the posts and 34 inches at the center, and the posts sit 22 feet apart ([USA Pickleball Official Rulebook](https://usapickleball.org/docs/rules/USAP-Official-Rulebook.pdf)). That 2-inch dip is not a loose, sagging net. It is the standard, and it is worth knowing.

  ![Side-view diagram of a pickleball net that is 36 inches high at the posts and 34 inches at the center, with the posts 22 feet apart](/studio/pickle-jam/pickleball-net-height-diagram.svg)

  Because the net is lowest in the middle, the safest ball to hit over is often the one straight down the center. It clears by the widest margin, and it splits two opponents who each assume the other one has it. When in doubt, aim for the dip.

  ## How much room you actually need

  The painted lines are only half the answer. A court needs runoff space around it so players can chase a wide ball without meeting a fence, a wall, or each other.

  USA Pickleball sets the minimum total playing surface at 30 feet by 60 feet, and recommends 34 by 64 for new construction and tournament play ([PlayPickleball, USA Pickleball Rules Section 2](https://www.playpickleball.com/2025-usa-pickleball-rules-section-2-court-and-equipment/)). In plain terms, leave at least 5 feet beyond each sideline and around 8 to 10 feet behind each baseline, and more if you have it ([Net World Sports](https://www.networldsports.com/buyers-guides/pickleball-court-dimensions-guide)).

  ![Diagram of a 20 by 44 foot court centered inside the minimum 30 by 60 foot area and the recommended 34 by 64 foot area, with buffer space labeled](/studio/pickle-jam/pickleball-court-space-needed.svg)

  | Layout | Total area | Buffer beyond the lines |
  |---|---|---|
  | Court only | 20 × 44 ft | none |
  | Minimum | 30 × 60 ft | about 5 ft sides, 8 ft ends |
  | Recommended | 34 × 64 ft | about 7 ft sides, 10 ft ends |

  A court squeezed against a wall is still a legal court. It just is not as fun, and it is not as safe.

  ## Why the court is so small

  Here is the fact that makes people grin. A pickleball court is the exact size of a doubles badminton court, 20 by 44 feet, and that is no accident ([Pickleheads](https://www.pickleheads.com/blog/dimensions-of-a-pickleball-court)). The sport was improvised on a backyard badminton court, and the lines that were already painted on the ground simply became the pickleball court. They never changed.

  ![To-scale comparison showing a pickleball court is the same footprint as a badminton court and fits easily inside a doubles tennis court](/studio/pickle-jam/pickleball-vs-tennis-vs-badminton.svg)

  Set it against a tennis court and the difference is almost funny. A tennis court runs 78 feet long and up to 36 feet wide, roughly 2,808 square feet for doubles. A pickleball court is 880. Two of them would fit in the space tennis gives a single match ([PlayPickleball](https://www.playpickleball.com/pickleball-vs-tennis-court/)).

  | | Pickleball | Tennis (doubles) |
  |---|---|---|
  | Court size | 20 × 44 ft | 36 × 78 ft |
  | Playing surface | 880 sq ft | 2,808 sq ft |
  | Net at the center | 34 in | 36 in |
  | Net at the posts | 36 in | 42 in |
  | Singles vs doubles | same court | narrower for singles |

  That smallness is the secret the whole sport is built on. A shorter court means shorter sprints, easier on the knees, and four people standing close enough to trade friendly trash talk between points. It is why Rosa, ninety seconds into her first game, was already near enough to laugh with the strangers across the net. The court was designed, almost by accident, to keep people close.

  ## How to lay out your own court

  You can chalk a temporary court on any flat 30-by-60-foot slab in an afternoon. This is the order that keeps the math honest:

  1. **Mark the outer rectangle,** 20 by 44 feet. Set the four corners, then check that the two diagonals match corner to corner, so the court is truly square.
  2. **Snap the boundary lines:** two baselines at 20 feet, two sidelines at 44 feet.
  3. **Find the net line at 22 feet,** the exact middle of the court.
  4. **Measure 7 feet from the net** on each side and mark the two non-volley zone lines.
  5. **Draw the centerline** from each non-volley line back to the baseline, splitting the service area into two 15-by-10-foot courts. The centerline stops at the kitchen. It never crosses it.
  6. **Keep every line 2 inches wide,** and measure to the outside edge of each line so the court does not quietly shrink.

  Set the net posts 22 feet apart, run the tape to 36 inches at the post and 34 at the center, and you are done. Then go find three people.

  ## Common measuring mistakes

  The same few errors show up again and again, on driveways and in city parks:

  - **Measuring to the wrong edge of the line.** The court is measured to the outside of the lines. Measure to the inside and you lose about four inches in every direction.
  - **Running the centerline through the kitchen.** It stops at the non-volley zone line on each side. The kitchen itself has no centerline.
  - **Forgetting the runoff.** A 20-by-44 court with nothing around it plays cramped and bruises shins. Plan for 30 by 60 at the very least.
  - **Copying the tennis net height.** Pickleball nets are lower, 34 inches at the center, not tennis's 36. A tennis net used for pickleball sits 2 inches too tall right where it matters most.

  ## The bottom line

  A pickleball court is a small, honest rectangle: 20 by 44 feet, a 7-foot kitchen on each side, a net that dips to 34 inches in the middle, and lines exactly 2 inches wide. Learn those few numbers and the court stops being a puzzle. It becomes a place.

  That was the whole design, going back to a borrowed badminton court and a handful of people who just wanted to play. The dimensions are small because the game is about closeness, about four people ending up near enough to become a standing Thursday-night habit.

  Rosa found the kitchen line that Tuesday. By the end of the night she had a doubles game for Thursday. So take a tape measure out to the driveway, or just walk onto the nearest court and stand right where the kitchen begins, and this time, know the answer. Now go find the game.
