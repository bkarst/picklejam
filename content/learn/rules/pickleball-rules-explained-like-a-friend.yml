keyTakeaways:
- 'Serve underhand and crosscourt, and you get exactly one try: there are no second serves.'
- 'The two-bounce rule: let the serve bounce, let the return bounce, then anyone can volley.'
- Stay out of the kitchen, the seven-foot zone by the net, whenever you volley.
- Only the serving team scores, games go to 11 (win by 2), and the score is called with three numbers.
faq:
- question: Do I have to serve underhand?
  answer: Yes. Every legal serve, volley or drop, is made below the waist with an underhand motion. There is no overhead serve in pickleball, which is part of why rallies start so gently.
- question: Can I step into the kitchen?
  answer: Absolutely. You can stand in the kitchen anytime you like. You just cannot volley (hit the ball out of the air) while touching it or its line.
- question: What is the two-bounce rule again?
  answer: After the serve, the ball must bounce once on the receiving side and once on the serving side before anyone volleys. Two bounces, one per side, then the air is fair game.
- question: Why does the score have three numbers?
  answer: In doubles, the third number tells everyone whether you are the first or second server on your team. It is how the table keeps track of who serves next after a side-out.
- question: How do you win?
  answer: Games are played to 11 points and you must win by 2, so a game can stretch to 12-10, 15-13, or beyond. Only the serving team can score.
- question: Is pickleball actually that popular, or does it just feel that way?
  answer: It is not in your head. The Sports and Fitness Industry Association's national survey counted 24.3 million American players and named pickleball the country's fastest-growing sport for the fourth year running. Those courts full of people you keep driving past are real.
- question: Where can I read the actual rules?
  answer: The full, official rulebook is free from USA Pickleball, and it is more readable than you would expect. You will almost never need it, but it settles arguments.
body: |
  There is a woman at my Tuesday-night game, I will call her Rosa, and on her very first evening somebody hollered "zero, zero, two!" and served the ball before she could ask what that meant. She stood there in borrowed shoes, paddle held in both hands, pretty sure everyone else had been handed a rulebook that skipped her.

  She lost every game that night. She has not missed a Tuesday since.

  Here is what Rosa figured out, and it is the whole reason for this guide. Pickleball feels like a secret handshake for exactly one evening, and then it never does again. Underneath the funny words and the odd little zones, there are only a handful of rules that actually decide anything.

  Learn those, and you stop being a beginner. You become a person who plays. Think of this as the friend leaning over the net to walk you through it: no rulebook voice, no jargon, just the parts that matter.

  ## The short answer

  You serve underhand and diagonally and get only one try, and the ball has to bounce once on each side before anyone smacks it out of the air. You cannot volley while standing in the seven-foot zone by the net (the kitchen). Only the serving team can score, and games go to 11, win by 2 ([USA Pickleball](https://usapickleball.org/rules/summary/)).

  That is the whole game. Everything else is a footnote.

  > **The one idea to keep:** Every rule that sounds weird at first (the kitchen, the double bounce, the three-number score) exists for the same reason: to keep the game fair and fun for everybody in the box, the 70-year-old and the 25-year-old alike. Pickleball is not hard. It is just generous.

  ## The court, in one breath

  Before the rules make sense, you need the shape of the thing. A pickleball court is a rectangle 20 feet wide and 44 feet long, the same size as a doubles badminton court, and it is the same court whether one person is playing or four ([USA Pickleball](https://usapickleball.org/what-is-pickleball/)).

  The net splits it down the middle, 36 inches high at the sidelines and dipping to 34 inches in the center. A seven-foot zone on each side of that net is the non-volley zone, better known as the kitchen. Hold those three facts (the box, the net, the kitchen) and the rest of this guide clicks into place.

  The paddle is solid, not strung like a tennis racket, and the ball is light plastic with 26 to 40 holes drilled through it ([USA Pickleball](https://usapickleball.org/what-is-pickleball/)). Because that ball does not fly far, the whole court can stay small, just 20 by 44 feet, close enough that you end up talking to the people across the net between points.

  ## The serve, from the ground up

  The serve is where most newcomers tense up, and it is honestly the friendliest part of the game. You have two legal ways to do it, and you get to pick.

  The classic is the **volley serve**, where you hit the ball out of your hand. Three things have to be true at the moment you strike it: you contact the ball below your waist, the head of your paddle is below your wrist, and your arm is moving in an upward arc ([USA Pickleball](https://usapickleball.org/rules/summary/)). In plain English, it is a gentle underhand swing, not an overhead cannon.

  If that feels fiddly, use the **drop serve** instead. You just drop the ball from your hand, let it bounce, and hit it, with no rule about your wrist or the arc of your swing ([USA Pickleball](https://usapickleball.org/pickleball-skills/level-one/most-important-rules-in-pickleball/)). The one catch is that the ball has to fall on its own: no throwing it down, no adding spin on the release.

  Either way, the rest is the same. You serve diagonally into the box across from you, at least one foot behind the baseline, and you get exactly one attempt ([USA Pickleball](https://usapickleball.org/rules/summary/)). Miss it and the serve simply moves along, because there are no second serves in pickleball to slow the night down.

  ## The two-bounce rule

  If there is one rule that separates the people who have played from the people who have not, it is this one. After the serve, the ball has to bounce once on each side before anybody is allowed to volley it ([USA Pickleball](https://usapickleball.org/rules/summary/)).

  Walk through it slowly. You serve, and the receiving team must let your serve bounce before they return it.

  Then their return comes back, and your team must let that bounce too. Only after those two bounces can anyone hit the ball out of the air.

  New players break this constantly. They serve, then charge the net to smash the return, and their partner quietly reminds them that no, we let this one land. It feels wrong for about a week.

  Then you understand what it is for. The two-bounce rule kills the serve-and-rush that dominates so many racket sports, and it hands the returning team a fair shot at every point ([Pickleheads](https://www.pickleheads.com/guides/pickleball-doubles-rules)).

  It is the reason rallies breathe. It is the reason your first game is fun instead of a wall of aces.

  ## The kitchen: seven feet that run the game

  The kitchen is the seven-foot strip of court on each side of the net, running the full width, and it is the most misunderstood real estate in the sport. Here is the rule, clean: you may not volley (hit the ball out of the air) while you are touching the kitchen or its line ([USA Pickleball](https://usapickleball.org/rules/summary/)).

  Notice what the rule does *not* say. It does not say you cannot go in there. You are welcome to stand in the kitchen all day, step in to scoop up a ball that has bounced, and walk right back out.

  ![A top-down diagram of the kitchen: the 7-foot non-volley zone on each side of the net, showing that you may stand in it to play a bounced ball but may not volley while touching it, and that your momentum after a volley may not carry you in](/studio/pickle-jam/the-kitchen-rule.svg)

  The trap is momentum. If you volley a ball just outside the line and your follow-through carries you in, that is a fault, even if you touch the kitchen a full second later ([USA Pickleball](https://usapickleball.org/pickleball-skills/level-one/most-important-rules-in-pickleball/)).

  The rally does not end when you hit the ball. It ends when you stop moving.

  That little seven-foot leash is the whole reason the game rewards touch over muscle. Take it away and the tallest, hardest hitter would just camp at the net and hammer everything straight down. Leave it in, and a patient dinker with soft hands can out-think a big swing.

  > **Where does "kitchen" come from?** Nobody can prove it, but the best story borrows from shuffleboard, where the space you do not want to land in is also the kitchen. Great nicknames rarely need a paper trail. This one just stuck.

  ## Keeping score without losing your mind

  Pickleball scoring sounds like a math test until someone shows you the trick, and then it is easy for life. Two rules do the heavy lifting: only the serving team can score a point, and games go to 11, win by 2 ([USA Pickleball](https://usapickleball.org/rules/summary/); [PPA Tour](https://ppatour.com/ppa-blog/pickleball-scoring-guide/)).

  Because only the server scores, you spend a lot of the game earning back the serve rather than piling up points. That is exactly why the comebacks are so good: lose the rally on your serve and you do not hand over a point, you hand over the ball.

  ![An infographic decoding the three-number pickleball score call: the first number is your team's score, the second is the other team's score, and the third is the server number, 1 or 2, plus an explanation of why every game starts at 0-0-2](/studio/pickle-jam/scoring-three-numbers.svg)

  In doubles, the score is always called as three numbers, and this is the part that stumps everyone. The first number is your team's score, the second is the other team's, and the third is whether you are the first or second server ([USA Pickleball](https://usapickleball.org/pickleball-skills/level-one/pickleball-scoring-positioning-side-out-scoring/)).

  Which explains the "zero, zero, two" that stopped Rosa cold on her first night. The team serving first at the very start of a game gets only one server, so the game opens at 0-0-2, a small handicap so going first is not a runaway advantage ([USA Pickleball](https://usapickleball.org/pickleball-skills/level-one/pickleball-scoring-positioning-side-out-scoring/)).

  After that first turn, each side gets two servers, one for each partner, before the serve passes over. Call the three numbers out loud before you serve, and you will sound like a regular by your second game.

  ## Faults: the quick ways to lose a rally

  A fault just means the rally is over and you lost it. You do not need to memorize a list, but it helps to know the usual suspects, because nearly every point ends with one of them ([USA Pickleball](https://usapickleball.org/rules/summary/)):

  1. **The ball lands out of bounds.** Outside the lines on a serve or a rally, and it is out. On the lines is in.
  2. **You hit it into the net,** or it fails to clear.
  3. **You volley in the kitchen,** or your momentum carries you in after the volley.
  4. **You volley before the two bounces** have happened, one on each side.
  5. **The ball bounces twice** on your side before you get to it.
  6. **You (or your paddle, or your hat) touch the net** while the ball is in play.
  7. **Your serve lands in the kitchen,** including on the kitchen line.

  Read that list once and you have already met almost every way a point can end. The rest of pickleball is just trying not to be the one who does them.

  ## Singles and doubles, side by side

  Most people learn on doubles, because four players and a small court is a party. Singles is the same rules with a lonelier floor plan and a lot more running. Here is what actually changes:

  | | Doubles | Singles |
  |---|---|---|
  | Players | 2 per side | 1 per side |
  | Court size | 20 ft × 44 ft | 20 ft × 44 ft (same) |
  | Scoring call | 3 numbers (0-0-2 to start) | 2 numbers (score, score) |
  | Servers per turn | 2 (one per partner) | 1 |
  | Where you serve from | based on the server number | based on your own score: even from the right, odd from the left |
  | The vibe | social, chatty, forgiving | a cardio test with a paddle |

  The court never shrinks for singles, which is the cruel joke of it. One person covers the same 20 by 44 feet that two people share in doubles, which is why singles feels like running a marathon inside a phone booth.

  ## The bottom line

  Remember the "zero, zero, two" that had Rosa frozen on her first night? By now you know it was just a friendly game telling her it was the very first serve. That is really all the rules are: a shared language that lets four strangers trust each other for an hour.

  So here is the only assignment. Serve underhand and crosscourt, let the ball bounce twice, stay out of the kitchen on your volleys, and call the three numbers before you hit.

  Get those, and you stop looking up rules. You start looking up from a rally you did not want to end, wondering where the last hour went.

  Then go find a court and lose your first game on purpose, the way Rosa did, the way everybody does. You will barely notice the score. You will notice the pop-pop-pop of a long rally on a quiet morning, and the four new friends you did not have when you woke up.
