<!-- @dsCard group="Spacing" viewport="700x150" name="Radii & Sticker Shadow" subtitle="Rounded corners and the offset outline shadow" -->
<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<body style="margin:0;font-family:var(--font-body);background:var(--surface-page);padding:20px">
<div style="display:flex;gap:22px;align-items:center">
  <div style="text-align:center"><div style="width:70px;height:52px;background:#fff;border:2px solid var(--pj-green-900);border-radius:var(--radius-sm)"></div><div style="font-size:10px;margin-top:6px;font-weight:700">sm · 8</div></div>
  <div style="text-align:center"><div style="width:70px;height:52px;background:#fff;border:2px solid var(--pj-green-900);border-radius:var(--radius-md)"></div><div style="font-size:10px;margin-top:6px;font-weight:700">md · 12</div></div>
  <div style="text-align:center"><div style="width:70px;height:52px;background:#fff;border:2px solid var(--pj-green-900);border-radius:var(--radius-lg)"></div><div style="font-size:10px;margin-top:6px;font-weight:700">lg · 20</div></div>
  <div style="text-align:center"><div style="width:70px;height:52px;background:#fff;border:2px solid var(--pj-green-900);border-radius:var(--radius-pill)"></div><div style="font-size:10px;margin-top:6px;font-weight:700">pill</div></div>
  <div style="width:1px;height:60px;background:var(--pj-gray-200)"></div>
  <div style="text-align:center"><div style="width:90px;height:52px;background:var(--pj-lime-500);border:2px solid var(--pj-green-900);border-radius:var(--radius-md);box-shadow:var(--shadow-sticker)"></div><div style="font-size:10px;margin-top:8px;font-weight:700">--shadow-sticker</div></div>
</div>
</body>
