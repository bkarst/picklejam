<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid, tokens --space-1…9" -->
<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<body style="margin:0;font-family:var(--font-body);background:#fff;padding:20px">
<div style="display:flex;align-items:flex-end;gap:14px">
  <div style="text-align:center"><div style="width:var(--space-1);height:var(--space-1);background:var(--pj-green-900)"></div><div style="font-size:10px;margin-top:6px;font-weight:700">4</div></div>
  <div style="text-align:center"><div style="width:var(--space-2);height:var(--space-2);background:var(--pj-green-900)"></div><div style="font-size:10px;margin-top:6px;font-weight:700">8</div></div>
  <div style="text-align:center"><div style="width:var(--space-3);height:var(--space-3);background:var(--pj-green-900)"></div><div style="font-size:10px;margin-top:6px;font-weight:700">12</div></div>
  <div style="text-align:center"><div style="width:var(--space-4);height:var(--space-4);background:var(--pj-green-900)"></div><div style="font-size:10px;margin-top:6px;font-weight:700">16</div></div>
  <div style="text-align:center"><div style="width:var(--space-5);height:var(--space-5);background:var(--pj-green-900)"></div><div style="font-size:10px;margin-top:6px;font-weight:700">24</div></div>
  <div style="text-align:center"><div style="width:var(--space-6);height:var(--space-6);background:var(--pj-green-900)"></div><div style="font-size:10px;margin-top:6px;font-weight:700">32</div></div>
  <div style="text-align:center"><div style="width:var(--space-7);height:var(--space-7);background:var(--pj-green-900)"></div><div style="font-size:10px;margin-top:6px;font-weight:700">48</div></div>
  <div style="text-align:center"><div style="width:var(--space-8);height:var(--space-8);background:var(--pj-green-900)"></div><div style="font-size:10px;margin-top:6px;font-weight:700">64</div></div>
</div>
</body>
