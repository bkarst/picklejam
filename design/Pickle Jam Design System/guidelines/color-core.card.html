<!-- @dsCard group="Colors" viewport="700x150" name="Core Palette" subtitle="Court green, electric lime, hot pink" -->
<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<body style="margin:0;font-family:var(--font-body);background:#fff">
<div style="display:flex;padding:16px;gap:0">
  <div style="flex:1"><div style="height:72px;background:var(--pj-green-900);border-radius:10px 0 0 10px"></div><div style="padding:8px 4px;font-size:11px;font-weight:700"><div>Court Green</div><div style="color:var(--text-muted)">#0F3D2E</div></div></div>
  <div style="flex:1"><div style="height:72px;background:var(--pj-lime-500)"></div><div style="padding:8px 4px;font-size:11px;font-weight:700"><div>Electric Lime</div><div style="color:var(--text-muted)">#C6F045</div></div></div>
  <div style="flex:1"><div style="height:72px;background:var(--pj-pink-500)"></div><div style="padding:8px 4px;font-size:11px;font-weight:700"><div>Hot Pink</div><div style="color:var(--text-muted)">#FF4FA3</div></div></div>
  <div style="flex:1"><div style="height:72px;background:var(--pj-pink-200)"></div><div style="padding:8px 4px;font-size:11px;font-weight:700"><div>Soft Pink</div><div style="color:var(--text-muted)">#FFD6E6</div></div></div>
  <div style="flex:1"><div style="height:72px;background:var(--pj-cream-100);border:1px solid var(--pj-gray-200)"></div><div style="padding:8px 4px;font-size:11px;font-weight:700"><div>Cream</div><div style="color:var(--text-muted)">#FFF7E6</div></div></div>
  <div style="flex:1"><div style="height:72px;background:var(--pj-gray-200);border-radius:0 10px 10px 0"></div><div style="padding:8px 4px;font-size:11px;font-weight:700"><div>Light Gray</div><div style="color:var(--text-muted)">#E6E6E6</div></div></div>
</div>
</body>
