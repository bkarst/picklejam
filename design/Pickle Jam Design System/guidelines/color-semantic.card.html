<!-- @dsCard group="Colors" viewport="700x150" name="Semantic Roles" subtitle="Ink, action, surface & status aliases" -->
<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<body style="margin:0;font-family:var(--font-body);background:#fff;padding:16px">
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
  <div style="display:flex;align-items:center;gap:8px"><span style="width:26px;height:26px;border-radius:7px;background:var(--action-primary)"></span><b style="font-size:12px">--action-primary</b></div>
  <div style="display:flex;align-items:center;gap:8px"><span style="width:26px;height:26px;border-radius:7px;background:var(--action-accent)"></span><b style="font-size:12px">--action-accent</b></div>
  <div style="display:flex;align-items:center;gap:8px"><span style="width:26px;height:26px;border-radius:7px;background:var(--surface-ink)"></span><b style="font-size:12px">--surface-ink</b></div>
  <div style="display:flex;align-items:center;gap:8px"><span style="width:26px;height:26px;border-radius:7px;background:var(--surface-tint)"></span><b style="font-size:12px">--surface-tint</b></div>
  <div style="display:flex;align-items:center;gap:8px"><span style="width:26px;height:26px;border-radius:7px;background:var(--text-strong)"></span><b style="font-size:12px">--text-strong</b></div>
  <div style="display:flex;align-items:center;gap:8px"><span style="width:26px;height:26px;border-radius:7px;background:var(--text-accent)"></span><b style="font-size:12px">--text-accent</b></div>
  <div style="display:flex;align-items:center;gap:8px"><span style="width:26px;height:26px;border-radius:7px;background:var(--status-success)"></span><b style="font-size:12px">--status-success</b></div>
  <div style="display:flex;align-items:center;gap:8px"><span style="width:26px;height:26px;border-radius:7px;background:var(--status-warning)"></span><b style="font-size:12px">--status-warning</b></div>
</div>
</body>
