<!-- @dsCard group="Platform" viewport="1200x760" name="Pickle Jam Platform" subtitle="News feed, tournaments, courts & groups — click-through app" -->
<!-- @startingPoint section="Screens" subtitle="Full Pickle Jam platform app shell (news, tournaments, courts, groups)" viewport="1200x820" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pickle Jam — Platform</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--surface-page); font-family: var(--font-body); color: var(--text-body); }
  a { color: var(--text-accent); }
  a:hover { color: var(--pj-pink-600); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--pj-gray-200); border-radius: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel">
const { useState } = React;
function App() {
  const [view, setView] = useState("home");
  const [q, setQ] = useState("");
  const [filter, setFilter] = useState("All");
  const S = window.PJ_SCREENS;
  return (
    <div>
      <S.TopNav view={view} setView={setView} q={q} setQ={setQ} />
      <main style={{ maxWidth: 1160, margin: "0 auto", padding: "28px 24px 64px" }}>
        {view === "home" && <S.HomeScreen filter={filter} setFilter={setFilter} />}
        {view === "tournaments" && <S.TournamentsScreen />}
        {view === "courts" && <S.CourtsScreen />}
        {view === "groups" && <S.GroupsScreen />}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
