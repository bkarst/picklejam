<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body style="margin:0;background:var(--surface-page);font-family:var(--font-body)">
<div id="root" style="padding:24px"></div>
<script type="text/babel">
const { Button, IconButton, Input, Icon } = window.PickleJamDesignSystem_26eda6;
const Row = ({children, gap=12}) => <div style={{display:"flex",gap,alignItems:"center",flexWrap:"wrap"}}>{children}</div>;
function Demo(){
  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <Row>
        <Button variant="primary" iconRight={<Icon name="arrow-right" size={17}/>}>Read more</Button>
        <Button variant="accent" iconRight={<Icon name="bell" size={17}/>}>Subscribe</Button>
        <Button variant="ink">View scores</Button>
        <Button variant="outline">View scores</Button>
        <Button variant="ghost">Skip</Button>
      </Row>
      <Row>
        <Button size="sm" variant="primary">Small</Button>
        <Button size="md" variant="primary">Medium</Button>
        <Button size="lg" variant="primary">Large</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </Row>
      <Row>
        <IconButton variant="ink" label="Menu"><Icon name="menu"/></IconButton>
        <IconButton variant="lime" label="Play"><Icon name="play" size={20}/></IconButton>
        <IconButton variant="pink" label="Alerts" round><Icon name="bell"/></IconButton>
        <IconButton variant="outline" label="Share"><Icon name="share" size={20}/></IconButton>
        <div style={{width:260}}><Input full iconLeft={<Icon name="search" size={18}/>} placeholder="Search players, events…"/></div>
      </Row>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
